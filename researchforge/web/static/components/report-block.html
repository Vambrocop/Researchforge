<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>report-block · ResearchForge A</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* ---- standalone wrapper (preview-only) ---- */
  body{margin:0;background:var(--bg);color:var(--ink);font:var(--font);padding:32px}
  .preview{max-width:840px;margin:0 auto}
  .preview h1{font-size:18px;font-weight:650;letter-spacing:.2px;margin:0 0 4px}
  .preview .sub{color:var(--muted);font-size:var(--fs-meta);margin-bottom:22px}
  h2{font-size:var(--fs-h2);letter-spacing:.4px;text-transform:uppercase;color:var(--muted);
     font-weight:600;margin:22px 0 10px}

  /* shared card shell */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-card);
        padding:var(--space-card);box-shadow:var(--shadow)}

  /* ======================================================================
     COMPONENT: report-block  (the ⑤ result panel)
     Composes: summary (accent left-rule, ⚠ disclosures kept inline) +
       estimate table + output file links (png inline / others link) +
       download-all button.
     ----------------------------------------------------------------------
     ASSUMPTION: index.html shows summary/report/file-links/download but does
     NOT render the estimates dict in the DOM. We add an A-styled key→value
     estimate table built purely from existing tokens (accent-soft header,
     hairline rows) so the run-result.estimates shape has a home. Flagged for
     review — drop the table block if the app intentionally omits estimates.
     ====================================================================== */
  .sumtext{border-left:3px solid var(--accent);padding:4px 0 4px 14px;font-size:14px;
           line-height:1.65;white-space:pre-wrap}

  /* estimate table (NEW — additive, tokens only) */
  .est-table{width:100%;border-collapse:collapse;font-size:var(--fs-small);margin-top:4px}
  .est-table thead th{text-align:left;background:var(--accent-soft);color:var(--accent);
        font-weight:600;padding:7px 12px;border-radius:0}
  .est-table thead th:first-child{border-top-left-radius:var(--radius-btn)}
  .est-table thead th:last-child{border-top-right-radius:var(--radius-btn)}
  .est-table tbody td{padding:7px 12px;border-bottom:1px solid var(--line)}
  .est-table tbody tr:last-child td{border-bottom:none}
  .est-table td.k{color:var(--muted)}
  .est-table td.v{font-variant-numeric:tabular-nums;color:var(--ink)}

  /* report body (markdown → html), from .report */
  .report{font-size:var(--fs-meta);line-height:1.6}
  .report h1,.report h2,.report h3{text-transform:none;letter-spacing:0;color:var(--ink);
        border:none;margin:14px 0 6px}
  .report code{background:#f4f4f0;padding:1px 5px;border-radius:var(--radius-bar);font-size:12.5px}

  /* file links + download, from .file-links / .btn-download */
  .file-links{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
  .file-links a{font-size:12.5px;color:var(--accent);border:1px solid var(--line);
        border-radius:var(--radius-btn);padding:7px 12px;text-decoration:none;background:#fff}
  .inline-fig{max-width:420px;width:100%;border:1px solid var(--line);border-radius:10px}
  .meta{color:var(--muted);font-size:var(--fs-meta)}
  .btn-download{display:inline-block;background:var(--accent);color:#fff;padding:8px 18px;
        border-radius:var(--radius-btn);font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="preview">
  <h1>report-block</h1>
  <div class="sub">结果报告 · 摘要(含 ⚠) + 估计表 + 报告正文 + 输出文件 + 下载</div>

  <div class="card">
    <div id="result-summary" class="sumtext"></div>

    <h2>关键估计</h2>
    <table class="est-table" id="est-table"></table>

    <h2>报告</h2>
    <div class="report" id="result-report"></div>

    <h2>输出文件</h2>
    <div class="file-links" id="result-files"></div>

    <div style="margin-top:14px">
      <a id="btn-download-all" class="btn-download" href="#">⬇ 下载全部产物</a>
    </div>
  </div>
</div>

<script>
  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  // minimal markdown → html (mirrors index.html mdToHtml)
  function mdToHtml(md){
    if(!md) return '<p>(无报告)</p>';
    const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
    const out=[];let ul=false;const closeUl=()=>{if(ul){out.push('</ul>');ul=false;}};
    for(const raw of md.split('\n')){const line=raw.trimEnd();
      if(/^### /.test(line)){closeUl();out.push(`<h3>${inl(line.slice(4))}</h3>`);}
      else if(/^## /.test(line)){closeUl();out.push(`<h2>${inl(line.slice(3))}</h2>`);}
      else if(/^# /.test(line)){closeUl();out.push(`<h1>${inl(line.slice(2))}</h1>`);}
      else if(/^- /.test(line)){if(!ul){out.push('<ul>');ul=true;}out.push(`<li>${inl(line.slice(2))}</li>`);}
      else if(line===''){closeUl();}
      else{closeUl();out.push(`<p>${inl(line)}</p>`);}
    }
    closeUl();return out.join('\n');
  }

  // fake run-result
  const RESULT={
    summary:'双重差分估计：处理组在政策实施后人均产出相对对照组提升约 +6.8%（p=0.004）。\n⚠ 平行趋势假定经事前 3 期安慰剂检验未见显著差异，但仍属不可直接验证的识别假定；交错处理时点已采用 Sun-Abraham 加权以避免负权重。',
    output_dir:'C:\\rf\\outputs\\did_20260619_153012',
    files:['did_event_study.png','coefficients.csv','report.html'],
    report:'## 模型设定\n采用 **两期双向固定效应** 估计 `Y ~ treat*post + unit + year`。\n\n## 稳健性\n- 多带宽 / 安慰剂检验通过\n- 聚类标准误（按单位列）',
    estimates:{ATT:'+0.068','标准误':'0.023','t 值':'2.96','p 值':'0.004','N (obs)':'4200','N (units)':'350'},
  };

  // summary (textContent preserves the ⚠ + newlines via white-space:pre-wrap)
  document.getElementById('result-summary').textContent=RESULT.summary;

  // estimate table
  const est=RESULT.estimates||{};
  const rows=Object.keys(est).map(k=>
    `<tr><td class="k">${escHtml(k)}</td><td class="v">${escHtml(est[k])}</td></tr>`).join('');
  document.getElementById('est-table').innerHTML=
    `<thead><tr><th>参数</th><th>值</th></tr></thead><tbody>${rows||'<tr><td class="meta" colspan="2">无估计</td></tr>'}</tbody>`;

  // report body
  document.getElementById('result-report').innerHTML=mdToHtml(RESULT.report);

  // file links (png inline, html interactive, others plain)
  const base=RESULT.output_dir.replace(/\\/g,'/').split('/').pop();
  const fel=document.getElementById('result-files');
  fel.innerHTML=(RESULT.files||[]).map(f=>{
    const url=`/outputs/${encodeURIComponent(base)}/${encodeURIComponent(f)}`;
    if(f.toLowerCase().endsWith('.png'))
      return `<div><img src="${url}" class="inline-fig" alt="${escHtml(f)}" `+
             `onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'meta',textContent:'🖼 ${escHtml(f)} (预览图占位)'}))">`+
             `<div class="meta" style="font-size:11.5px">${escHtml(f)}</div></div>`;
    if(f.toLowerCase().endsWith('.html'))
      return `<a href="${url}" target="_blank">🔍 ${escHtml(f)}（交互版）</a>`;
    return `<a href="${url}" target="_blank">${escHtml(f)}</a>`;
  }).join('')||'<span class="meta">无输出文件</span>';

  // download-all
  document.getElementById('btn-download-all').href=`/api/download/${encodeURIComponent(base)}`;
</script>
</body>
</html>
