<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchForge</title>
<style>
  :root{
    --bg:#fbfbfa; --panel:#fff; --ink:#1c1c1a; --muted:#6b6b66; --line:#e7e7e2;
    --accent:#2f6f4f; --accent-soft:#e8f1ec; --green:#2f8f5b; --yellow:#c9952b; --red:#c0492f;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
  header{padding:20px 32px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px}
  header h1{font-size:18px;margin:0;font-weight:650;letter-spacing:.2px}
  header .tag{font-size:12px;color:var(--muted)}
  .wrap{max-width:940px;margin:0 auto;padding:26px 32px 90px}
  h2{font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:600;margin:26px 0 12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
  .meta{color:var(--muted);font-size:13.5px}
  button{font:inherit;cursor:pointer;border-radius:8px}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:9px 20px;font-size:14px}
  .btn-primary:hover{background:#27543d}
  .btn-primary:disabled{background:#a9c3b5;cursor:not-allowed}
  .spinner{display:none;color:var(--muted);font-size:13px;margin-left:8px}
  #error{display:none;background:#fdecea;border:1px solid #f3c0b8;color:#9a2b1a;padding:10px 14px;border-radius:10px;margin:14px 0;font-size:14px}
  /* upload */
  .drop{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .drop input[type=file]{flex:1;min-width:200px;font-size:13.5px;padding:8px;border:1px dashed var(--line);border-radius:10px;background:#fdfdfc}
  /* data summary */
  .databar{display:flex;flex-wrap:wrap;gap:9px 12px;align-items:center}
  .pill{font-size:12px;padding:3px 11px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
  .pill.grey{background:#f0f0ec;color:var(--muted)}
  .qual{margin-left:auto;font-size:13px;color:var(--muted)}
  .row-actions{margin-top:12px}
  .btn-soft{background:#fff;border:1px solid var(--line);color:var(--ink);padding:7px 14px;font-size:13px}
  .btn-soft:hover{border-color:#cfcfc8}
  /* issues */
  .issue-row{display:flex;gap:10px;align-items:baseline;font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .issue-row:last-child{border-bottom:none}
  .issue-kind{font-weight:600;color:#7a5a2a}
  .issue-col{color:var(--accent);font-size:12px}
  .issue-sev{margin-left:auto;color:var(--muted);font-size:12px}
  /* clean */
  .plan-row{font-size:13px;padding:3px 0}
  .plan-action{font-weight:600;color:var(--accent)}
  /* goals */
  .goals{display:flex;flex-wrap:wrap;gap:8px}
  .goal{font-size:13px;padding:6px 13px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;color:var(--muted)}
  .goal.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600}
  /* rec cards */
  .rec{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:13px;box-shadow:var(--shadow)}
  .rec.infeasible{opacity:.74}
  .rec .top{display:flex;align-items:center;gap:11px}
  .light{width:11px;height:11px;border-radius:50%;flex:none}
  .light.green{background:var(--green)} .light.yellow{background:var(--yellow)} .light.red{background:var(--red)}
  .mname{font-weight:640;font-size:15px}
  .fam{font-size:11.5px;color:var(--muted);background:#f4f4f0;padding:2px 8px;border-radius:6px}
  .fit-badge{font-size:12px;color:var(--muted)}
  .run{margin-left:auto;font-size:13px;border:1px solid var(--accent);color:var(--accent);background:#fff;padding:6px 16px}
  .run:hover{background:var(--accent);color:#fff}
  .run.override{border-color:var(--yellow);color:#946a1c}
  .run.override:hover{background:var(--yellow);color:#fff}
  .run:disabled{opacity:.5;cursor:wait}
  .why{color:var(--muted);font-size:13.5px;margin:9px 0 11px}
  .sc{display:grid;grid-template-columns:repeat(3,1fr);gap:7px 22px}
  .sc .d{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .sc .d .lab{width:30px;flex:none}
  .bar{flex:1;height:6px;background:#eee;border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent)}
  .bar.cost i{background:var(--yellow)}
  .sc .d .v{width:22px;text-align:right;color:#a4a49c}
  details{margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}
  summary{cursor:pointer;font-size:13px;color:var(--accent);font-weight:600}
  .bias{font-size:13px;color:#7a5a2a;background:#fdf7ea;border:1px solid #f0e2bf;border-radius:8px;padding:10px 12px;margin-top:9px;line-height:1.6}
  .bias li{margin:2px 0}
  /* config form */
  .cfg-form{margin-top:11px;border-top:1px dashed var(--line);padding-top:12px}
  .cfg-hint{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .cfg-field{margin-bottom:11px}
  .cfg-field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .cfg-field .req{color:var(--red);margin-left:3px}
  .cfg-field .desc{font-weight:400;color:var(--muted);font-size:12.5px;margin-left:6px}
  .cfg-field .def{display:block;font-weight:400;color:#a4a49c;font-size:11.5px;margin-top:3px}
  .cfg-field select,.cfg-field input[type=text],.cfg-field input[type=number]{
    width:100%;max-width:320px;font:inherit;font-size:13.5px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fdfdfc;color:var(--ink)}
  .cfg-field select[multiple]{height:auto;min-height:80px}
  .cfg-field input[type=checkbox]{width:auto;transform:translateY(1px);margin-right:6px}
  .cfg-field .checks{display:flex;flex-wrap:wrap;gap:5px 16px}
  .cfg-field .checks label{display:inline-flex;align-items:center;font-weight:400;font-size:13px;margin:0}
  .cfg-field .checks label input{margin-right:5px}
  .cfg-actions{display:flex;align-items:center;gap:10px;margin-top:6px}
  .cfg-run{font-size:13px;border:1px solid var(--accent);color:#fff;background:var(--accent);padding:7px 18px}
  .cfg-run:hover{background:#27543d}
  .cfg-run:disabled{opacity:.5;cursor:wait}
  .cfg-cancel{font-size:13px;border:1px solid var(--line);color:var(--muted);background:#fff;padding:7px 14px}
  .cfg-cancel:hover{border-color:#cfcfc8}
  /* result */
  .sumtext{border-left:3px solid var(--accent);padding:4px 0 4px 14px;font-size:14px;line-height:1.65;white-space:pre-wrap}
  .report{font-size:13.5px;line-height:1.6}
  .report h1,.report h2,.report h3{text-transform:none;letter-spacing:0;color:var(--ink);border:none}
  .report code{background:#f4f4f0;padding:1px 5px;border-radius:4px;font-size:12.5px}
  .file-links{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
  .file-links a{font-size:12.5px;color:var(--accent);border:1px solid var(--line);border-radius:8px;padding:7px 12px;text-decoration:none;background:#fff}
  .inline-fig{max-width:420px;width:100%;border:1px solid var(--line);border-radius:10px}
  .btn-download{display:inline-block;background:var(--accent);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px}
  #profile-section,#clean-section,#result-section{display:none}
</style>
</head>
<body>
<header>
  <h1>🔨 ResearchForge</h1>
  <span class="tag">方法学大杂烩引擎 · 丢数据 → 识别 → 推荐(🟢🟡🔴 + 评分卡) → 跑 → 报告</span>
</header>

<div class="wrap">
  <div id="error"></div>

  <!-- UPLOAD -->
  <h2>① 上传数据</h2>
  <div class="card">
    <div class="drop">
      <input type="file" id="csv-input" accept=".csv,.xlsx,.xls">
      <button class="btn-primary" id="btn-analyze" onclick="doAnalyze()">识别 + 推荐</button>
      <span class="spinner" id="analyze-spinner">处理中…</span>
    </div>
    <div class="meta" style="margin-top:8px">CSV / Excel · 自动识别类型、结构、质量，并给出按严谨度排序的可行分析。</div>
  </div>

  <!-- PROFILE + RECS -->
  <div id="profile-section">
    <h2>② 数据画像</h2>
    <div class="card">
      <div class="databar" id="data-meta"></div>
      <div class="row-actions">
        <button class="btn-soft" id="btn-clean" onclick="doClean()">查看清洗方案</button>
        <span class="spinner" id="clean-spinner">处理中…</span>
      </div>
    </div>

    <div id="issues-section" style="display:none">
      <h2>数据质量问题</h2>
      <div class="card" id="issues-list"></div>
    </div>

    <div id="clean-section">
      <h2>清洗方案</h2>
      <div class="card">
        <div id="clean-plan"></div>
        <div id="clean-log-summary" class="meta" style="margin-top:8px"></div>
        <div class="row-actions">
          <button class="btn-soft" id="btn-reanalyze" onclick="doReanalyze()">用清洗后数据重新分析</button>
          <span class="spinner" id="reanalyze-spinner">处理中…</span>
        </div>
      </div>
    </div>

    <h2>③ 分析目标</h2>
    <div class="goals" id="goal-chips"></div>

    <h2>④ 推荐方法 · 🟢可行 🟡需注意 🔴不匹配</h2>
    <div id="rec-list"></div>
  </div>

  <!-- RESULT -->
  <div id="result-section">
    <h2>⑤ 结果报告</h2>
    <div class="card">
      <div id="result-summary" class="sumtext"></div>
      <h2>报告</h2>
      <div class="report" id="result-report"></div>
      <h2>输出文件</h2>
      <div class="file-links" id="result-files"></div>
      <div style="margin-top:14px">
        <a id="btn-download-all" class="btn-download" style="display:none;text-decoration:none" href="#">⬇ 下载全部产物</a>
      </div>
    </div>
  </div>
</div>

<script>
let currentFileId = null;
let cleanedFileId = null;
let lastRecs = [];
let lastColumns = [];        // [{name,kind}] from the fingerprint — feeds column/columns selectors
let goalList = [];            // [{key,label}] supplied by the backend (mirrors goals.py, no drift)
let activeGoal = 'all';
let openCfgId = null;         // id of the rec whose inline config form is currently expanded

const DOTS = { green: 'green', yellow: 'yellow', red: 'red' };
const SC_DIMS = [
  ['popularity','流'],['publishability','发'],['aesthetics','美'],
  ['difficulty','难'],['fit','合'],['novelty','新'],
];

function showError(msg){const el=document.getElementById('error');el.textContent=msg;el.style.display='block';}
function clearError(){const el=document.getElementById('error');el.textContent='';el.style.display='none';}
function spin(id,on){const el=document.getElementById(id);if(el)el.style.display=on?'inline':'none';}
function setBusy(id,l){const b=document.getElementById(id);if(b){b._o=b.textContent;b.textContent=l||'…处理中';b.disabled=true;}}
function setIdle(id){const b=document.getElementById(id);if(b){b.textContent=b._o||b.textContent;b.disabled=false;}}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function mdToHtml(md){
  if(!md) return '<p>(无报告)</p>';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  const out=[];let ul=false;const closeUl=()=>{if(ul){out.push('</ul>');ul=false;}};
  for(const raw of md.split('\n')){const line=raw.trimEnd();
    if(/^### /.test(line)){closeUl();out.push(`<h3>${inl(line.slice(4))}</h3>`);}
    else if(/^## /.test(line)){closeUl();out.push(`<h2>${inl(line.slice(3))}</h2>`);}
    else if(/^# /.test(line)){closeUl();out.push(`<h1>${inl(line.slice(2))}</h1>`);}
    else if(/^- /.test(line)){if(!ul){out.push('<ul>');ul=true;}out.push(`<li>${inl(line.slice(2))}</li>`);}
    else if(line===''){closeUl();}
    else{closeUl();out.push(`<p>${inl(line)}</p>`);}
  }
  closeUl();return out.join('\n');
}

// --------------------------------------------------------------------------
async function doAnalyze(){
  clearError();
  ['profile-section','result-section','issues-section','clean-section'].forEach(id=>document.getElementById(id).style.display='none');
  cleanedFileId=null;
  const input=document.getElementById('csv-input');
  if(!input.files.length){showError('请先选择一个 CSV / Excel 文件');return;}
  setBusy('btn-analyze');spin('analyze-spinner',true);
  const fd=new FormData();fd.append('file',input.files[0]);
  let data;
  try{
    const res=await fetch('/api/analyze',{method:'POST',body:fd});
    data=await res.json();
    if(!res.ok){showError(data.detail||'分析失败');setIdle('btn-analyze');spin('analyze-spinner',false);return;}
  }catch(e){showError('网络错误：'+e.message);setIdle('btn-analyze');spin('analyze-spinner',false);return;}
  setIdle('btn-analyze');spin('analyze-spinner',false);
  currentFileId=data.file_id;
  renderProfile(data.fingerprint);
  renderIssues(data.fingerprint.issues||[]);
  lastColumns=(data.fingerprint&&data.fingerprint.columns)||[];
  lastRecs=data.recommendations||[];
  goalList=data.goals||[];
  activeGoal='all';openCfgId=null;
  renderGoals();renderRecs();
  document.getElementById('profile-section').style.display='';
}

function renderProfile(fp){
  const struct=fp.is_panel?'面板数据':(fp.is_timeseries?'时间序列':'截面数据');
  const bits=[
    `<span class="pill grey">${fp.n_rows} 行 × ${fp.n_cols} 列</span>`,
    `<span class="pill">${struct}</span>`,
    fp.unit_col?`<span class="pill">单位列 ${escHtml(fp.unit_col)}</span>`:'',
    fp.time_col?`<span class="pill">时间列 ${escHtml(fp.time_col)}</span>`:'',
    `<span class="qual">质量问题 <b>${fp.n_issues||0}</b> 项 · ${fp.columns.length} 列已识别类型</span>`,
  ].filter(Boolean);
  document.getElementById('data-meta').innerHTML=bits.join('');
}

function renderIssues(issues){
  const sec=document.getElementById('issues-section');
  if(!issues.length){sec.style.display='none';return;}
  document.getElementById('issues-list').innerHTML=issues.map(i=>`
    <div class="issue-row">
      <span class="issue-kind">${escHtml(i.kind)}</span>
      <span class="issue-col">${i.column?escHtml(i.column):'—'}</span>
      <span>${escHtml(i.detail)}</span>
      <span class="issue-sev">[${escHtml(i.severity)}]</span>
    </div>`).join('');
  sec.style.display='';
}

function renderGoals(){
  const el=document.getElementById('goal-chips');
  // only show goals that actually have a recommendation for this dataset (+ 全部); membership is
  // computed server-side per rec (rec.goals), so this never drifts from goals.py.
  const present=new Set();
  for(const r of lastRecs) for(const k of (r.goals||[])) present.add(k);
  const chips=[{key:'all',label:'全部'},...goalList.filter(g=>present.has(g.key))];
  el.innerHTML=chips.map(g=>`<span class="goal${g.key===activeGoal?' on':''}" onclick="pickGoal('${g.key}')">${escHtml(g.label)}</span>`).join('');
}
function pickGoal(k){activeGoal=k;renderGoals();renderRecs();}

function renderRecs(){
  const el=document.getElementById('rec-list');
  let recs=lastRecs;
  if(activeGoal!=='all'){recs=lastRecs.filter(r=>(r.goals||[]).includes(activeGoal));}
  if(!recs.length){el.innerHTML='<div class="card meta">该目标下暂无可行推荐。</div>';return;}
  el.innerHTML=recs.map(r=>{
    const ms=r.methodology_score||{};
    const bars=SC_DIMS.map(([k,lab])=>{
      const v=ms[k]||0;const cost=k==='difficulty'?' cost':'';
      return `<div class="d"><span class="lab">${lab}</span><span class="bar${cost}"><i style="width:${v}%"></i></span><span class="v">${v}</span></div>`;
    }).join('');
    const biases=(r.biases||[]).map(b=>`<li>${escHtml(b)}</li>`).join('');
    const biasBlock=biases?`<details><summary>⚠ 偏差披露 / 假定（知情覆盖）</summary><div class="bias"><ul style="margin:0;padding-left:18px">${biases}</ul></div></details>`:'';
    const btnCls=r.feasible?'run':'run override';
    const btnLabel=r.feasible?'运行 →':'知情覆盖 →';
    const idAttr=escHtml(r.id);
    return `<div class="rec${r.feasible?'':' infeasible'}">
      <div class="top">
        <span class="light ${DOTS[r.light]||'red'}"></span>
        <span class="mname">${escHtml(r.method)}</span>
        <span class="fam">${escHtml(r.family)}</span>
        <span class="fit-badge">契合 ${r.score}</span>
        <button class="${btnCls}" onclick="clickRun('${idAttr}',this)">${btnLabel}</button>
      </div>
      <div class="why">${escHtml(r.note||'')}</div>
      <div class="sc">${bars}</div>
      ${biasBlock}
      <div class="cfg-form" id="cfg-${idAttr}" style="display:none"></div>
    </div>`;
  }).join('');
  // re-open a config form if one was expanded before a re-render
  if(openCfgId){const rec=lastRecs.find(r=>r.id===openCfgId);if(rec)renderCfgForm(rec);}
}

// --------------------------------------------------------------------------
// Per-analysis config form (rendered from rec.params; single source of truth)
// --------------------------------------------------------------------------
function colOptions(selected){
  // a blank "auto/default" option + every dataset column name
  const blank=`<option value="">（自动 / 默认）</option>`;
  const opts=lastColumns.map(c=>`<option value="${escHtml(c.name)}"${selected===c.name?' selected':''}>${escHtml(c.name)}${c.kind?' · '+escHtml(c.kind):''}</option>`).join('');
  return blank+opts;
}

function paramFieldHtml(p,idx){
  const fid=`cfgp-${idx}`;
  const req=p.required?'<span class="req" title="必填">*</span>':'';
  const desc=p.description?`<span class="desc">${escHtml(p.description)}</span>`:'';
  const def=p.default?`<span class="def">默认：${escHtml(p.default)}</span>`:'';
  const t=p.type||'column';
  let control='';
  if(t==='column'){
    control=`<select id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="column">${colOptions('')}</select>`;
  }else if(t==='columns'){
    const checks=lastColumns.map(c=>
      `<label><input type="checkbox" value="${escHtml(c.name)}">${escHtml(c.name)}</label>`).join('');
    control=`<div id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="columns" class="checks">${checks||'<span class="meta">无可选列</span>'}</div>`;
  }else if(t==='choice'){
    const opts=`<option value="">（自动 / 默认）</option>`+
      (p.choices||[]).map(ch=>`<option value="${escHtml(ch)}">${escHtml(ch)}</option>`).join('');
    control=`<select id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="choice">${opts}</select>`;
  }else if(t==='int'){
    control=`<input type="number" step="1" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="int" placeholder="${escHtml(p.default||'留空用默认')}">`;
  }else if(t==='float'){
    control=`<input type="number" step="any" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="float" placeholder="${escHtml(p.default||'留空用默认')}">`;
  }else if(t==='bool'){
    control=`<label style="font-weight:400"><input type="checkbox" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="bool"> 启用</label>`;
  }else{ // str (and any unknown type) -> text input
    control=`<input type="text" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="str" placeholder="${escHtml(p.default||'留空用默认')}">`;
  }
  return `<div class="cfg-field">
    <label for="${fid}">${escHtml(p.name)}${req}${desc}</label>
    ${control}
    ${def}
  </div>`;
}

function renderCfgForm(rec){
  const box=document.getElementById(`cfg-${rec.id}`);
  if(!box)return;
  const params=rec.params||[];
  if(!params.length){
    box.innerHTML=`<div class="cfg-hint">此分析未声明可配置参数（按自动默认运行）。</div>
      <div class="cfg-actions">
        <button class="cfg-run" onclick="submitRun('${escHtml(rec.id)}',this)">运行 →</button>
        <button class="cfg-cancel" onclick="closeCfgForm()">取消</button>
        <span class="spinner" id="cfg-spin-${escHtml(rec.id)}">处理中…</span>
      </div>`;
  }else{
    const fields=params.map((p,i)=>paramFieldHtml(p,i)).join('');
    box.innerHTML=`<div class="cfg-hint">配置参数（全部可留空 → 引擎用自动默认；<span class="req">*</span> 为关键参数）。</div>
      ${fields}
      <div class="cfg-actions">
        <button class="cfg-run" onclick="submitRun('${escHtml(rec.id)}',this)">运行 →</button>
        <button class="cfg-cancel" onclick="closeCfgForm()">取消</button>
        <span class="spinner" id="cfg-spin-${escHtml(rec.id)}">处理中…</span>
      </div>`;
  }
  box.style.display='';
}

function clickRun(analysisId,btn){
  // toggle: clicking Run again on an open form closes it
  if(openCfgId===analysisId){closeCfgForm();return;}
  closeCfgForm();
  const rec=lastRecs.find(r=>r.id===analysisId);
  if(!rec)return;
  openCfgId=analysisId;
  renderCfgForm(rec);
  const box=document.getElementById(`cfg-${analysisId}`);
  if(box)box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeCfgForm(){
  if(openCfgId){const box=document.getElementById(`cfg-${openCfgId}`);if(box){box.style.display='none';box.innerHTML='';}}
  openCfgId=null;
}

// Collect a config object from the open form: only non-blank fields are included
// so the engine falls back to its auto defaults for anything left blank.
function collectConfig(analysisId){
  const box=document.getElementById(`cfg-${analysisId}`);
  if(!box)return {};
  const cfg={};
  // single-value controls (column / choice / int / float / str / bool)
  box.querySelectorAll('[data-pname]').forEach(el=>{
    const name=el.getAttribute('data-pname');
    const type=el.getAttribute('data-ptype');
    if(type==='columns'){
      const picked=[...el.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
      if(picked.length)cfg[name]=picked;
      return;
    }
    if(type==='bool'){
      if(el.checked)cfg[name]=true;   // unchecked => omit, engine uses its default
      return;
    }
    const raw=(el.value||'').trim();
    if(raw==='')return;               // blank => omit
    if(type==='int'){const n=parseInt(raw,10);if(!Number.isNaN(n))cfg[name]=n;}
    else if(type==='float'){const n=parseFloat(raw);if(!Number.isNaN(n))cfg[name]=n;}
    else cfg[name]=raw;               // column / choice / str
  });
  return cfg;
}

async function submitRun(analysisId,btn){
  const cfg=collectConfig(analysisId);
  await doRun(analysisId,btn,Object.keys(cfg).length?cfg:null);
}

async function doClean(){
  if(!currentFileId)return;clearError();
  document.getElementById('clean-section').style.display='none';
  setBusy('btn-clean');spin('clean-spinner',true);
  let data;
  try{
    const res=await fetch('/api/clean',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_id:currentFileId})});
    data=await res.json();
    if(!res.ok){showError(data.detail||'清洗失败');setIdle('btn-clean');spin('clean-spinner',false);return;}
  }catch(e){showError('网络错误：'+e.message);setIdle('btn-clean');spin('clean-spinner',false);return;}
  setIdle('btn-clean');spin('clean-spinner',false);
  cleanedFileId=data.cleaned_file_id;
  const planEl=document.getElementById('clean-plan');
  planEl.innerHTML=(data.plan&&data.plan.length)
    ? data.plan.map(s=>`<div class="plan-row"><span class="plan-action">${escHtml(s.action)}</span>${s.column?' — '+escHtml(s.column):''} <span class="meta">${escHtml(s.reason)}</span></div>`).join('')
    : '<div class="meta">无清洗步骤（数据已干净）</div>';
  const applied=(data.log||[]).filter(l=>l.applied).length,total=(data.log||[]).length;
  document.getElementById('clean-log-summary').textContent=`共 ${total} 步，${applied} 步已执行。清洗后文件已保存 (ID: ${cleanedFileId||'—'})`;
  document.getElementById('clean-section').style.display='';
  document.getElementById('clean-section').scrollIntoView({behavior:'smooth'});
}

async function doReanalyze(){
  if(!cleanedFileId)return;clearError();
  setBusy('btn-reanalyze');spin('reanalyze-spinner',true);
  let data;
  try{
    const res=await fetch('/api/reanalyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_id:cleanedFileId})});
    data=await res.json();
    if(!res.ok){showError(data.detail||'重新分析失败');setIdle('btn-reanalyze');spin('reanalyze-spinner',false);return;}
  }catch(e){showError('网络错误：'+e.message);setIdle('btn-reanalyze');spin('reanalyze-spinner',false);return;}
  setIdle('btn-reanalyze');spin('reanalyze-spinner',false);
  currentFileId=cleanedFileId;cleanedFileId=null;
  document.getElementById('clean-section').style.display='none';
  document.getElementById('result-section').style.display='none';
  renderProfile(data.fingerprint);renderIssues(data.fingerprint.issues||[]);
  lastColumns=(data.fingerprint&&data.fingerprint.columns)||[];
  lastRecs=data.recommendations||[];goalList=data.goals||[];activeGoal='all';openCfgId=null;renderGoals();renderRecs();
  document.getElementById('profile-section').scrollIntoView({behavior:'smooth'});
}

async function doRun(analysisId,btn,config){
  if(!currentFileId)return;clearError();
  document.getElementById('result-section').style.display='none';
  if(btn){btn._o=btn.textContent;btn.textContent='…处理中';btn.disabled=true;}
  const payload={file_id:currentFileId,analysis_id:analysisId};
  if(config&&Object.keys(config).length)payload.config=config;  // omit entirely when empty
  let data;
  try{
    const res=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    data=await res.json();
    if(!res.ok){if(btn){btn.textContent=btn._o;btn.disabled=false;}showError(data.detail||'运行失败');return;}
  }catch(e){if(btn){btn.textContent=btn._o;btn.disabled=false;}showError('网络错误：'+e.message);return;}
  if(btn){btn.textContent=btn._o;btn.disabled=false;}
  closeCfgForm();
  renderResult(data);
  document.getElementById('result-section').style.display='';
  document.getElementById('result-section').scrollIntoView({behavior:'smooth'});
}

function renderResult(data){
  document.getElementById('result-summary').textContent=data.summary||'(无摘要)';
  document.getElementById('result-report').innerHTML=mdToHtml(data.report||'');
  const base=data.output_dir.replace(/\\/g,'/').split('/').pop();
  const dl=document.getElementById('btn-download-all');
  dl.href=`/api/download/${encodeURIComponent(base)}`;dl.style.display='inline-block';
  const el=document.getElementById('result-files');
  if(data.files&&data.files.length){
    el.innerHTML=data.files.map(f=>{
      const url=`/outputs/${encodeURIComponent(base)}/${encodeURIComponent(f)}`;
      if(f.toLowerCase().endsWith('.png'))
        return `<div><img src="${url}" class="inline-fig" alt="${escHtml(f)}"><div class="meta" style="font-size:11.5px">${escHtml(f)}</div></div>`;
      if(f.toLowerCase().endsWith('.html'))
        return `<a href="${url}" target="_blank">🔍 ${escHtml(f)}（交互版）</a>`;
      return `<a href="${url}" target="_blank">${escHtml(f)}</a>`;
    }).join('');
  }else{el.innerHTML='<span class="meta">无输出文件</span>';}
}
