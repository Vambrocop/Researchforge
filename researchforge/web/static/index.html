<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchForge</title>
<style>
  :root{
    --bg:#f7f8f7; --panel:#fff; --ink:#1b1c1a; --muted:#6b6f6a; --line:#e6e8e3;
    --accent:#2f6f4f; --accent-hover:#27543d; --accent-soft:#e8f1ec;
    --green:#2f8f5b; --yellow:#c9952b; --red:#c0492f;
    --radius:14px; --radius-sm:9px;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 10px 30px rgba(20,40,30,.05);
    --shadow-sm:0 1px 2px rgba(0,0,0,.05);
    --ring:0 0 0 3px rgba(47,111,79,.18);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

  /* header */
  header{position:sticky;top:0;z-index:20;background:rgba(247,248,247,.85);backdrop-filter:saturate(150%) blur(10px);
    padding:14px 32px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header .brand{display:flex;align-items:baseline;gap:11px;min-width:0}
  header h1{font-size:18px;margin:0;font-weight:680;letter-spacing:.2px;white-space:nowrap}
  header .tag{font-size:12.5px;color:var(--muted);min-width:0}
  header .grow{flex:1}
  /* language toggle (segmented control) */
  .lang-toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;background:#fff;
    padding:2px;box-shadow:var(--shadow-sm);flex:none}
  .lang-toggle button{border:none;background:transparent;color:var(--muted);
    font-size:12.5px;font-weight:600;padding:5px 13px;border-radius:999px;line-height:1;transition:.15s}
  .lang-toggle button:hover{color:var(--ink)}
  .lang-toggle button.on{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}

  .wrap{max-width:960px;margin:0 auto;padding:24px 32px 100px}
  h2{font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:30px 0 13px}
  h2:first-child{margin-top:6px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
  .meta{color:var(--muted);font-size:13.5px}

  /* buttons */
  button{font:inherit;cursor:pointer;border-radius:var(--radius-sm);transition:background .15s,border-color .15s,color .15s,box-shadow .15s,transform .05s}
  button:active{transform:translateY(1px)}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:none;box-shadow:var(--ring)}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:10px 22px;font-size:14px;font-weight:600;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-primary:disabled{background:#a9c3b5;cursor:not-allowed;box-shadow:none}

  /* spinner */
  .spinner{display:none;align-items:center;gap:7px;color:var(--muted);font-size:13px;margin-left:8px}
  .spinner.show{display:inline-flex}
  .spinner::before{content:"";width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #error{display:none;background:#fdecea;border:1px solid #f3c0b8;color:#9a2b1a;
    padding:11px 15px;border-radius:var(--radius-sm);margin:14px 0;font-size:14px}

  /* upload */
  .drop{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .drop input[type=file]{flex:1;min-width:200px;font-size:13.5px;padding:10px;border:1.5px dashed var(--line);
    border-radius:var(--radius-sm);background:#fbfcfb;transition:border-color .15s,background .15s;cursor:pointer}
  .drop input[type=file]:hover{border-color:#b9d3c5;background:#f6faf8}

  /* data summary */
  .databar{display:flex;flex-wrap:wrap;gap:9px 12px;align-items:center}
  .pill{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--accent-soft);color:var(--accent);
    font-weight:500;max-width:100%;overflow-wrap:anywhere;word-break:break-word}
  .pill.grey{background:#f0f1ed;color:var(--muted)}
  .qual{margin-left:auto;font-size:13px;color:var(--muted)}
  .row-actions{margin-top:14px;display:flex;align-items:center;flex-wrap:wrap}
  .btn-soft{background:#fff;border:1px solid var(--line);color:var(--ink);padding:8px 15px;font-size:13px;font-weight:500}
  .btn-soft:hover{border-color:#bcd0c4;background:#f7faf8}

  /* issues */
  .issue-row{display:flex;gap:10px;align-items:baseline;font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .issue-row:last-child{border-bottom:none}
  .issue-kind{font-weight:600;color:#7a5a2a}
  .issue-col{color:var(--accent);font-size:12px}
  .issue-sev{margin-left:auto;color:var(--muted);font-size:12px}

  /* clean / plan */
  .plan-row{font-size:13px;padding:4px 0}
  .plan-action{font-weight:600;color:var(--accent)}

  /* goals */
  .goals{display:flex;flex-wrap:wrap;gap:8px}
  .goal{font-size:13px;padding:7px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;
    cursor:pointer;color:var(--muted);font-weight:500;transition:.15s}
  .goal:hover{border-color:#bcd0c4;color:var(--ink)}
  .goal.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:600}

  /* rec cards */
  .rec{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:13px;
    box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s}
  .rec:hover{box-shadow:0 2px 4px rgba(0,0,0,.05),0 14px 36px rgba(20,40,30,.07);border-color:#dbe2dc}
  .rec.infeasible{opacity:.78}
  .rec .top{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .light{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(0,0,0,.025)}
  .light.green{background:var(--green)} .light.yellow{background:var(--yellow)} .light.red{background:var(--red)}
  .mname{font-weight:650;font-size:15px;overflow-wrap:anywhere;word-break:break-word;min-width:0}
  .fam{font-size:11.5px;color:var(--muted);background:#f3f4f0;padding:3px 9px;border-radius:6px;flex:none}
  .fit-badge{font-size:12px;color:var(--muted)}
  .run{margin-left:auto;font-size:13px;font-weight:600;border:1px solid var(--accent);color:var(--accent);
    background:#fff;padding:7px 17px}
  .run:hover{background:var(--accent);color:#fff}
  .run.override{border-color:var(--yellow);color:#946a1c}
  .run.override:hover{background:var(--yellow);color:#fff}
  .run:disabled{opacity:.5;cursor:wait}
  .why{color:var(--muted);font-size:13.5px;margin:10px 0 12px;line-height:1.6}
  .sc{display:grid;grid-template-columns:repeat(3,1fr);gap:9px 24px}
  .sc .d{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .sc .d .lab{width:34px;flex:none}
  .bar{flex:1;height:6px;background:#edeeea;border-radius:4px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);border-radius:4px}
  .bar.cost i{background:var(--yellow)}
  .sc .d .v{width:22px;text-align:right;color:#a4a89f;font-variant-numeric:tabular-nums}
  details{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px}
  summary{cursor:pointer;font-size:13px;color:var(--accent);font-weight:600}
  .bias{font-size:13px;color:#7a5a2a;background:#fdf7ea;border:1px solid #f0e2bf;border-radius:var(--radius-sm);padding:11px 13px;margin-top:9px;line-height:1.6}
  .bias li{margin:2px 0}

  /* config form */
  .cfg-form{margin-top:12px;border-top:1px dashed var(--line);padding-top:13px}
  .cfg-hint{font-size:12.5px;color:var(--muted);margin-bottom:11px;line-height:1.55}
  .cfg-field{margin-bottom:12px}
  .cfg-field label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:5px}
  .cfg-field .req{color:var(--red);margin-left:3px}
  .cfg-field .desc{font-weight:400;color:var(--muted);font-size:12.5px;margin-left:6px}
  .cfg-field .def{display:block;font-weight:400;color:#a4a89f;font-size:11.5px;margin-top:3px}
  .cfg-field select,.cfg-field input[type=text],.cfg-field input[type=number]{
    width:100%;max-width:340px;font:inherit;font-size:13.5px;padding:8px 10px;border:1px solid var(--line);
    border-radius:var(--radius-sm);background:#fbfcfb;color:var(--ink);transition:border-color .15s}
  .cfg-field select:hover,.cfg-field input:hover{border-color:#bcd0c4}
  .cfg-field select[multiple]{height:auto;min-height:80px}
  .cfg-field input[type=checkbox]{width:auto;transform:translateY(1px);margin-right:6px;accent-color:var(--accent)}
  .cfg-field .checks{display:flex;flex-wrap:wrap;gap:6px 16px}
  .cfg-field .checks label{display:inline-flex;align-items:center;font-weight:400;font-size:13px;margin:0}
  .cfg-field .checks label input{margin-right:5px}
  .cfg-actions{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .cfg-run{font-size:13px;font-weight:600;border:1px solid var(--accent);color:#fff;background:var(--accent);padding:8px 19px}
  .cfg-run:hover{background:var(--accent-hover)}
  .cfg-run:disabled{opacity:.5;cursor:wait}
  .cfg-cancel{font-size:13px;border:1px solid var(--line);color:var(--muted);background:#fff;padding:8px 15px}
  .cfg-cancel:hover{border-color:#bcd0c4;color:var(--ink)}

  /* result */
  .sumtext{border-left:3px solid var(--accent);padding:6px 0 6px 15px;font-size:14px;line-height:1.65;
    white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word}
  .report{font-size:13.5px;line-height:1.65;overflow-wrap:anywhere;word-break:break-word}
  .report h1,.report h2,.report h3{text-transform:none;letter-spacing:0;color:var(--ink);border:none}
  .report code{background:#f3f4f0;padding:1px 5px;border-radius:4px;font-size:12.5px;
    overflow-wrap:anywhere;word-break:break-all}
  .file-links{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
  .file-links a{font-size:12.5px;color:var(--accent);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:8px 13px;text-decoration:none;background:#fff;transition:.15s;
    max-width:100%;word-break:break-all;overflow-wrap:anywhere}
  .file-links>div{max-width:100%}
  .file-links .meta{word-break:break-all;overflow-wrap:anywhere}
  .file-links a:hover{border-color:var(--accent);background:var(--accent-soft)}
  .inline-fig{max-width:440px;width:100%;border:1px solid var(--line);border-radius:10px}
  .btn-download{display:inline-block;background:var(--accent);color:#fff;padding:9px 19px;border-radius:var(--radius-sm);
    font-size:13px;font-weight:600;box-shadow:var(--shadow-sm)}
  .btn-download:hover{background:var(--accent-hover)}

  /* run history */
  .hist-bar{display:flex;align-items:center;gap:11px;margin:30px 0 13px;flex-wrap:wrap}
  .hist-bar h2{margin:0}
  .hist-refresh{font-size:12px;border:1px solid var(--line);background:#fff;color:var(--accent);padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer}
  .hist-refresh:hover{border-color:var(--accent);background:var(--accent-soft)}
  .hist-empty{color:var(--muted);font-size:13.5px}
  .hist-item{border-bottom:1px solid var(--line);padding:13px 0}
  .hist-item:first-child{padding-top:2px}
  .hist-item:last-child{border-bottom:none;padding-bottom:2px}
  .hist-head{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .hist-id{font-weight:650;font-size:14px;overflow-wrap:anywhere;word-break:break-word;min-width:0}
  .hist-ts{font-size:12px;color:var(--muted)}
  .hist-count{font-size:11.5px;color:var(--muted);background:#f3f4f0;padding:3px 9px;border-radius:6px}
  .hist-actions{margin-left:auto;display:flex;gap:8px}
  .hist-actions a,.hist-actions button{font-size:12.5px;border:1px solid var(--line);background:#fff;color:var(--accent);
    padding:6px 13px;border-radius:var(--radius-sm);text-decoration:none;cursor:pointer;transition:.15s}
  .hist-actions a:hover,.hist-actions button:hover{border-color:var(--accent);background:var(--accent-soft)}
  .hist-files{margin-top:10px;display:none}
  .hist-files.open{display:block}
  .hist-file{display:flex;align-items:baseline;gap:9px;font-size:12.5px;padding:4px 0;flex-wrap:wrap}
  .hist-file a{color:var(--accent);text-decoration:none;cursor:pointer;word-break:break-all;overflow-wrap:anywhere;min-width:0}
  .hist-file a:hover{text-decoration:underline}
  .hist-preview{margin-top:10px;border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;background:#fbfcfb;display:none}
  .hist-preview.open{display:block}
  .hist-preview img{max-width:100%;border-radius:8px}
  .hist-preview pre{margin:0;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;overflow-x:auto}
  .hist-preview .report{font-size:13px}
  .hist-preview .pv-close{float:right;font-size:12px;color:var(--muted);cursor:pointer;border:none;background:none}

  #history-section{display:none}
  #profile-section,#clean-section,#result-section{display:none}

  /* responsiveness */
  @media (max-width:680px){
    header{padding:12px 18px}
    header .tag{display:none}
    .wrap{padding:18px 18px 80px}
    .sc{grid-template-columns:repeat(2,1fr)}
    .qual{margin-left:0;flex-basis:100%}
    .run{margin-left:0}
    .hist-actions{margin-left:0;flex-basis:100%}
  }
  @media (max-width:420px){
    .sc{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>🔨 ResearchForge</h1>
    <span class="tag" data-i18n="tagline"></span>
  </div>
  <div class="grow"></div>
  <div class="lang-toggle" role="group" aria-label="Language / 语言">
    <button type="button" id="lang-zh" lang="zh" aria-pressed="false" onclick="setLang('zh')">中文</button>
    <button type="button" id="lang-en" lang="en" aria-pressed="false" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="wrap">
  <div id="error"></div>

  <!-- UPLOAD -->
  <h2 data-i18n="sec_upload"></h2>
  <div class="card">
    <div class="drop">
      <input type="file" id="csv-input" accept=".csv,.xlsx,.xls">
      <button class="btn-primary" id="btn-analyze" onclick="doAnalyze()" data-i18n="btn_analyze"></button>
      <span class="spinner" id="analyze-spinner" data-i18n="working"></span>
    </div>
    <div class="meta" style="margin-top:10px" data-i18n="upload_hint"></div>
  </div>

  <!-- PROFILE + RECS -->
  <div id="profile-section">
    <h2 data-i18n="sec_profile"></h2>
    <div class="card">
      <div class="databar" id="data-meta"></div>
      <div class="row-actions">
        <button class="btn-soft" id="btn-clean" onclick="doClean()" data-i18n="btn_clean"></button>
        <span class="spinner" id="clean-spinner" data-i18n="working"></span>
      </div>
    </div>

    <div id="issues-section" style="display:none">
      <h2 data-i18n="sec_issues"></h2>
      <div class="card" id="issues-list"></div>
    </div>

    <div id="plan-section" style="display:none">
      <h2 data-i18n="sec_plan"></h2>
      <div class="card" id="plan-list"></div>
    </div>

    <div id="clean-section">
      <h2 data-i18n="sec_clean"></h2>
      <div class="card">
        <div id="clean-plan"></div>
        <div id="clean-log-summary" class="meta" style="margin-top:8px"></div>
        <div class="row-actions">
          <button class="btn-soft" id="btn-reanalyze" onclick="doReanalyze()" data-i18n="btn_reanalyze"></button>
          <span class="spinner" id="reanalyze-spinner" data-i18n="working"></span>
        </div>
      </div>
    </div>

    <h2 data-i18n="sec_goals"></h2>
    <div class="goals" id="goal-chips"></div>

    <h2 data-i18n="sec_recs"></h2>
    <div id="rec-list"></div>
  </div>

  <!-- RESULT -->
  <div id="result-section">
    <h2 data-i18n="sec_result"></h2>
    <div class="card">
      <div id="result-summary" class="sumtext"></div>
      <h2 data-i18n="result_report"></h2>
      <div class="report" id="result-report"></div>
      <h2 data-i18n="result_files"></h2>
      <div class="file-links" id="result-files"></div>
      <div style="margin-top:14px">
        <a id="btn-download-all" class="btn-download" style="display:none;text-decoration:none" href="#" data-i18n="download_all"></a>
      </div>
    </div>
  </div>

  <!-- RUN HISTORY -->
  <div id="history-section">
    <div class="hist-bar">
      <h2 data-i18n="sec_history"></h2>
      <button class="hist-refresh" id="btn-hist-refresh" onclick="loadHistory()" data-i18n="hist_refresh"></button>
    </div>
    <div class="card" id="history-list"></div>
  </div>
</div>

<script>
// ==========================================================================
// i18n — lightweight dictionary + toggle. Static text uses [data-i18n] /
// [data-i18n-attr]; JS-rendered strings go through t(key, ...vars). No deps.
// ==========================================================================
const I18N = {
  zh: {
    tagline: '方法学大杂烩引擎 · 丢数据 → 识别 → 推荐(🟢🟡🔴 + 评分卡) → 跑 → 报告',
    working: '处理中…',
    busy: '…处理中',
    // sections
    sec_upload: '① 上传数据',
    sec_profile: '② 数据画像',
    sec_issues: '数据质量问题',
    sec_plan: '📋 数据诊断 → 选模建议',
    sec_clean: '清洗方案',
    sec_goals: '③ 分析目标',
    sec_recs: '④ 推荐方法 · 🟢可行 🟡需注意 🔴不匹配',
    sec_result: '⑤ 结果报告',
    sec_history: '运行历史',
    // buttons / hints
    btn_analyze: '识别 + 推荐',
    upload_hint: 'CSV / Excel · 自动识别类型、结构、质量，并给出按严谨度排序的可行分析。',
    btn_clean: '查看清洗方案',
    btn_reanalyze: '用清洗后数据重新分析',
    result_report: '报告',
    result_files: '输出文件',
    download_all: '⬇ 下载全部产物',
    hist_refresh: '↻ 刷新',
    // errors
    err_no_file: '请先选择一个 CSV / Excel 文件',
    err_analyze: '分析失败',
    err_clean: '清洗失败',
    err_reanalyze: '重新分析失败',
    err_run: '运行失败',
    err_network: '网络错误：',
    err_history: '无法加载运行历史：',
    err_preview: '无法预览：',
    // profile
    struct_panel: '面板数据',
    struct_ts: '时间序列',
    struct_cross: '截面数据',
    rows_cols: '{0} 行 × {1} 列',
    unit_col: '单位列 {0}',
    time_col: '时间列 {0}',
    qual_summary: '质量问题 <b>{0}</b> 项 · {1} 列已识别类型',
    // plan
    plan_prefer: '建议优先：',
    plan_over: '（而非 {0}）',
    plan_sep: '、',
    // goals
    goal_all: '全部',
    // recs
    rec_empty: '该目标下暂无可行推荐。',
    fit_label: '契合 {0}',
    run_go: '运行 →',
    run_override: '知情覆盖 →',
    bias_summary: '⚠ 偏差披露 / 假定（知情覆盖）',
    // scorecard dimension short labels
    sc_popularity: '流',
    sc_publishability: '发',
    sc_aesthetics: '美',
    sc_difficulty: '难',
    sc_fit: '合',
    sc_novelty: '新',
    // config form
    cfg_none: '此分析未声明可配置参数（按自动默认运行）。',
    cfg_hint: '配置参数（全部可留空 → 引擎用自动默认；<span class="req">*</span> 为关键参数）。',
    cfg_run: '运行 →',
    cfg_cancel: '取消',
    cfg_required: '必填',
    cfg_default: '默认：{0}',
    cfg_auto: '（自动 / 默认）',
    cfg_blank_default: '留空用默认',
    cfg_no_cols: '无可选列',
    cfg_enable: '启用',
    // clean
    clean_none: '无清洗步骤（数据已干净）',
    clean_log: '共 {0} 步，{1} 步已执行。清洗后文件已保存 (ID: {2})',
    clean_dash: '—',
    // result
    result_no_summary: '(无摘要)',
    result_no_report: '(无报告)',
    result_no_files: '无输出文件',
    file_interactive: '🔍 {0}（交互版）',

let LANG = (function(){
  try{ const s=localStorage.getItem('rf_lang'); if(s==='zh'||s==='en') return s; }catch(e){}
  return 'zh';
})();

// translate a key, with optional {0},{1}… positional substitution
function t(key, ...args){
  const dict=I18N[LANG]||I18N.zh;
  let s=(key in dict)?dict[key]:((key in I18N.zh)?I18N.zh[key]:key);
  args.forEach((a,i)=>{ s=s.split('{'+i+'}').join(String(a)); });
  return s;
}

// fill all static [data-i18n] / [data-i18n-attr] nodes for the current language
function applyStaticI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-attr]').forEach(el=>{
    el.getAttribute('data-i18n-attr').split(',').forEach(pair=>{
      const [attr,key]=pair.split(':');
      if(attr&&key) el.setAttribute(attr.trim(), t(key.trim()));
    });
  });
  // toggle highlight + a11y state
  const z=document.getElementById('lang-zh'), e=document.getElementById('lang-en');
  if(z){ z.classList.toggle('on', LANG==='zh'); z.setAttribute('aria-pressed', LANG==='zh'?'true':'false'); }
  if(e){ e.classList.toggle('on', LANG==='en'); e.setAttribute('aria-pressed', LANG==='en'?'true':'false'); }
}

// re-render whatever is currently on screen so dynamic strings switch language too
function rerenderDynamic(){
  if(document.getElementById('profile-section').style.display!=='none' && lastRecs!==null){
    if(lastFingerprint){ renderProfile(lastFingerprint); renderIssues(lastFingerprint.issues||[]); }
    renderPlan(lastPlan);
    renderGoals(); renderRecs();
  }
  if(lastResult) renderResult(lastResult);
  if(historyLoaded) renderHistory();
}

function setLang(lang){
  if(lang!=='zh'&&lang!=='en') return;
  LANG=lang;
  try{ localStorage.setItem('rf_lang', lang); }catch(e){}
  applyStaticI18n();
  rerenderDynamic();
}

function showError(msg){const el=document.getElementById('error');el.textContent=msg;el.style.display='block';}
function clearError(){const el=document.getElementById('error');el.textContent='';el.style.display='none';}
function spin(id,on){const el=document.getElementById(id);if(el)el.classList.toggle('show',!!on);}
function setBusy(id,l){const b=document.getElementById(id);if(b){b._o=b.textContent;b.textContent=l||t('busy');b.disabled=true;}}
function setIdle(id){const b=document.getElementById(id);if(b){b.textContent=b._o||b.textContent;b.disabled=false;}}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function mdToHtml(md){
  if(!md) return '<p>'+escHtml(t('result_no_report'))+'</p>';
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  const out=[];let ul=false;const closeUl=()=>{if(ul){out.push('</ul>');ul=false;}};
  for(const raw of md.split('\n')){const line=raw.trimEnd();
    if(/^### /.test(line)){closeUl();out.push(`<h3>${inl(line.slice(4))}</h3>`);}
    else if(/^## /.test(line)){closeUl();out.push(`<h2>${inl(line.slice(3))}</h2>`);}
    else if(/^# /.test(line)){closeUl();out.push(`<h1>${inl(line.slice(2))}</h1>`);}
    else if(/^- /.test(line)){if(!ul){out.push('<ul>');ul=true;}out.push(`<li>${inl(line.slice(2))}</li>`);}
    else if(line===''){closeUl();}
    else{closeUl();out.push(`<p>${inl(line)}</p>`);}
  }
  closeUl();return out.join('\n');
}

async function doAnalyze(){
  clearError();
  ['profile-section','result-section','issues-section','plan-section','clean-section'].forEach(id=>document.getElementById(id).style.display='none');
  cleanedFileId=null;lastResult=null;
  const input=document.getElementById('csv-input');
  if(!input.files.length){showError(t('err_no_file'));return;}
  setBusy('btn-analyze');spin('analyze-spinner',true);
  const fd=new FormData();fd.append('file',input.files[0]);
  let data;
  try{
    const res=await fetch('/api/analyze',{method:'POST',body:fd});
    data=await res.json();
    if(!res.ok){showError(data.detail||t('err_analyze'));setIdle('btn-analyze');spin('analyze-spinner',false);return;}
  }catch(e){showError(t('err_network')+e.message);setIdle('btn-analyze');spin('analyze-spinner',false);return;}
  setIdle('btn-analyze');spin('analyze-spinner',false);
  currentFileId=data.file_id;
  lastFingerprint=data.fingerprint;
  lastPlan=data.diagnostic_plan;
  renderProfile(data.fingerprint);
  renderIssues(data.fingerprint.issues||[]);
  renderPlan(data.diagnostic_plan);
  lastColumns=(data.fingerprint&&data.fingerprint.columns)||[];
  lastRecs=data.recommendations||[];
  goalList=data.goals||[];
  activeGoal='all';openCfgId=null;
  renderGoals();renderRecs();
  document.getElementById('profile-section').style.display='';
}

function renderGoals(){
  const el=document.getElementById('goal-chips');

  const present=new Set();
  for(const r of lastRecs) for(const k of (r.goals||[])) present.add(k);
  const chips=[{key:'all',label:t('goal_all')},...goalList.filter(g=>present.has(g.key))];
  el.innerHTML=chips.map(g=>`<span class="goal${g.key===activeGoal?' on':''}" onclick="pickGoal('${g.key}')">${escHtml(g.label)}</span>`).join('');

function colOptions(selected){
  // a blank "auto/default" option + every dataset column name
  const blank=`<option value="">${escHtml(t('cfg_auto'))}</option>`;
  const opts=lastColumns.map(c=>`<option value="${escHtml(c.name)}"${selected===c.name?' selected':''}>${escHtml(c.name)}${c.kind?' · '+escHtml(c.kind):''}</option>`).join('');
  return blank+opts;
}

function paramFieldHtml(p,idx){
  const fid=`cfgp-${idx}`;
  const req=p.required?`<span class="req" title="${escHtml(t('cfg_required'))}">*</span>`:'';
  const desc=p.description?`<span class="desc">${escHtml(p.description)}</span>`:'';
  const def=p.default?`<span class="def">${t('cfg_default',escHtml(p.default))}</span>`:'';
  const ph=escHtml(t('cfg_blank_default'));
  const t_=p.type||'column';
  let control='';
  if(t_==='column'){
    control=`<select id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="column">${colOptions('')}</select>`;
  }else if(t_==='columns'){
    const checks=lastColumns.map(c=>
      `<label><input type="checkbox" value="${escHtml(c.name)}">${escHtml(c.name)}</label>`).join('');
    control=`<div id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="columns" class="checks">${checks||`<span class="meta">${escHtml(t('cfg_no_cols'))}</span>`}</div>`;
  }else if(t_==='choice'){
    const opts=`<option value="">${escHtml(t('cfg_auto'))}</option>`+
      (p.choices||[]).map(ch=>`<option value="${escHtml(ch)}">${escHtml(ch)}</option>`).join('');
    control=`<select id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="choice">${opts}</select>`;
  }else if(t_==='int'){
    control=`<input type="number" step="1" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="int" placeholder="${escHtml(p.default||ph)}">`;
  }else if(t_==='float'){
    control=`<input type="number" step="any" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="float" placeholder="${escHtml(p.default||ph)}">`;
  }else if(t_==='bool'){
    control=`<label style="font-weight:400"><input type="checkbox" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="bool"> ${escHtml(t('cfg_enable'))}</label>`;
  }else{ // str (and any unknown type) -> text input
    control=`<input type="text" id="${fid}" data-pname="${escHtml(p.name)}" data-ptype="str" placeholder="${escHtml(p.default||ph)}">`;
  }
  return `<div class="cfg-field">
    <label for="${fid}">${escHtml(p.name)}${req}${desc}</label>
    ${control}
    ${def}
  </div>`;
}

function renderCfgForm(rec){
  const box=document.getElementById(`cfg-${rec.id}`);

// Collect a config object from the open form: only non-blank fields are included
// so the engine falls back to its auto defaults for anything left blank.
function collectConfig(analysisId){
  const box=document.getElementById(`cfg-${analysisId}`);
  if(!box)return {};
  const cfg={};
  // single-value controls (column / choice / int / float / str / bool)
  box.querySelectorAll('[data-pname]').forEach(el=>{
    const name=el.getAttribute('data-pname');
    const type=el.getAttribute('data-ptype');
    if(type==='columns'){
      const picked=[...el.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
      if(picked.length)cfg[name]=picked;
      return;
    }
    if(type==='bool'){
      if(el.checked)cfg[name]=true;   // unchecked => omit, engine uses its default
      return;
    }
    const raw=(el.value||'').trim();
    if(raw==='')return;               // blank => omit
    if(type==='int'){const n=parseInt(raw,10);if(!Number.isNaN(n))cfg[name]=n;}
    else if(type==='float'){const n=parseFloat(raw);if(!Number.isNaN(n))cfg[name]=n;}
    else cfg[name]=raw;               // column / choice / str
  });
  return cfg;
}

async function submitRun(analysisId,btn){
  const cfg=collectConfig(analysisId);
  await doRun(analysisId,btn,Object.keys(cfg).length?cfg:null);
}

async function doRun(analysisId,btn,config){
  if(!currentFileId)return;clearError();
  document.getElementById('result-section').style.display='none';
  if(btn){btn._o=btn.textContent;btn.textContent=t('busy');btn.disabled=true;}
  const payload={file_id:currentFileId,analysis_id:analysisId};
  if(config&&Object.keys(config).length)payload.config=config;  // omit entirely when empty
  let data;
  try{
    const res=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    data=await res.json();
    if(!res.ok){if(btn){btn.textContent=btn._o;btn.disabled=false;}showError(data.detail||t('err_run'));return;}
  }catch(e){if(btn){btn.textContent=btn._o;btn.disabled=false;}showError(t('err_network')+e.message);return;}
  if(btn){btn.textContent=btn._o;btn.disabled=false;}
  closeCfgForm();
  lastResult=data;
  renderResult(data);
  document.getElementById('result-section').style.display='';
  document.getElementById('result-section').scrollIntoView({behavior:'smooth'});
  loadHistory();  // a new run just landed — refresh the history panel
}

function renderResult(data){
  document.getElementById('result-summary').textContent=data.summary||t('result_no_summary');
  document.getElementById('result-report').innerHTML=mdToHtml(data.report||'');
  const base=data.output_dir.replace(/\\/g,'/').split('/').pop();
  const dl=document.getElementById('btn-download-all');
  dl.href=`/api/download/${encodeURIComponent(base)}`;dl.style.display='inline-block';
  const el=document.getElementById('result-files');
  if(data.files&&data.files.length){
    el.innerHTML=data.files.map(f=>{
      const url=`/outputs/${encodeURIComponent(base)}/${encodeURIComponent(f)}`;
      if(f.toLowerCase().endsWith('.png'))
        return `<div><img src="${url}" class="inline-fig" alt="${escHtml(f)}"><div class="meta" style="font-size:11.5px">${escHtml(f)}</div></div>`;
      if(f.toLowerCase().endsWith('.html'))
        return `<a href="${url}" target="_blank">${t('file_interactive',escHtml(f))}</a>`;
      return `<a href="${url}" target="_blank">${escHtml(f)}</a>`;
    }).join('');
  }else{el.innerHTML=`<span class="meta">${escHtml(t('result_no_files'))}</span>`;}
}

// --------------------------------------------------------------------------
// Run history + artifact browser
// --------------------------------------------------------------------------
let historyRuns = [];     // [{run_name,analysis_id,timestamp,files,n_files,...}]
let historyLoaded = false;

// Turn a dir-name timestamp (YYYYMMDD-HHMMSS-mmm) into a friendly string;
// fall back to the raw value when it doesn't match the convention.
function fmtTs(ts){
  const m=/^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})/.exec(ts||'');
  if(!m)return ts||'—';
  return `${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}:${m[6]}`;
}

async function loadHistory(){
  const sec=document.getElementById('history-section');
  const el=document.getElementById('history-list');
  let runs;
  try{
    const res=await fetch('/api/runs');
    if(!res.ok)throw new Error('HTTP '+res.status);
    runs=await res.json();
  }catch(e){
    // history is a non-critical panel — never block the main flow on its failure
    sec.style.display='';
    el.innerHTML=`<div class="hist-empty">${escHtml(t('err_history')+e.message)}</div>`;
    return;
  }
  historyRuns=Array.isArray(runs)?runs:[];
  historyLoaded=true;
  sec.style.display='';
  renderHistory();
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!historyRuns.length){
    el.innerHTML=`<div class="hist-empty">${escHtml(t('hist_empty'))}</div>`;
    return;
  }
  el.innerHTML=historyRuns.map((r,i)=>{
    const dl=`/api/download/${encodeURIComponent(r.run_name)}`;
    return `<div class="hist-item">
      <div class="hist-head">
        <span class="hist-id">${escHtml(r.analysis_id||r.run_name)}</span>
        <span class="hist-ts">${escHtml(fmtTs(r.timestamp))}</span>
        <span class="hist-count">${t('hist_files_n',r.n_files||0)}</span>
        <span class="hist-actions">
          <button onclick="toggleHistFiles(${i})" id="hist-toggle-${i}">${escHtml(t('hist_view_files'))}</button>
          <a href="${dl}">${escHtml(t('hist_download_zip'))}</a>
        </span>
      </div>
      <div class="hist-files" id="hist-files-${i}">
        ${(r.files||[]).map(f=>histFileRow(r.run_name,f)).join('')||`<div class="hist-empty">${escHtml(t('hist_no_files'))}</div>`}
      </div>
      <div class="hist-preview" id="hist-pv-${i}"></div>
    </div>`;
  }).join('');
}

function histFileRow(runName,fname){
  const url=`/api/runs/${encodeURIComponent(runName)}/file/${encodeURIComponent(fname)}`;
  // pass runName/fname via a click handler so we can render inline previews
  return `<div class="hist-file">
    <a href="#" onclick="previewArtifact('${encodeURIComponent(runName)}','${encodeURIComponent(fname)}');return false;">${escHtml(fname)}</a>
    <a href="${url}" target="_blank" class="meta" style="font-size:11.5px">${escHtml(t('hist_raw'))}</a>
  </div>`;
}

function toggleHistFiles(i){
  const box=document.getElementById(`hist-files-${i}`);
  const btn=document.getElementById(`hist-toggle-${i}`);
  if(!box)return;
  const open=box.classList.toggle('open');
  if(btn)btn.textContent=open?t('hist_hide_files'):t('hist_view_files');
}

// Find which rendered history item a run belongs to (preview targets it).
function histIndexFor(runName){
  return historyRuns.findIndex(r=>r.run_name===runName);
}

async function previewArtifact(encRun,encFile){
  const runName=decodeURIComponent(encRun);
  const fname=decodeURIComponent(encFile);
  const i=histIndexFor(runName);
  if(i<0)return;
  const pv=document.getElementById(`hist-pv-${i}`);
  if(!pv)return;
  const url=`/api/runs/${encodeURIComponent(runName)}/file/${encodeURIComponent(fname)}`;
  const close=`<button class="pv-close" onclick="document.getElementById('hist-pv-${i}').classList.remove('open')">${escHtml(t('hist_close'))}</button>`;
  const low=fname.toLowerCase();
  if(low.endsWith('.png')||low.endsWith('.jpg')||low.endsWith('.jpeg')||low.endsWith('.gif')||low.endsWith('.svg')){
    pv.innerHTML=`${close}<div style="clear:both"><img src="${url}" alt="${escHtml(fname)}"></div>`;
    pv.classList.add('open');pv.scrollIntoView({behavior:'smooth',block:'nearest'});
    return;
  }
  // text-ish: fetch and render (report.md as markdown, CSV head, else raw text)
  pv.innerHTML=`${close}<div class="meta" style="clear:both">${escHtml(t('hist_loading'))}</div>`;
  pv.classList.add('open');
  let text;
  try{
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    text=await res.text();
  }catch(e){
    pv.innerHTML=`${close}<div class="hist-empty" style="clear:both">${escHtml(t('err_preview')+e.message)}</div>`;
    return;
  }
  if(low.endsWith('.md')){
    pv.innerHTML=`${close}<div class="report" style="clear:both">${mdToHtml(text)}</div>`;
  }else if(low.endsWith('.csv')||low.endsWith('.tsv')){
    const lines=text.split(/\r?\n/).slice(0,21);  // header + 20 rows
    const more=text.split(/\r?\n/).length>21?t('hist_csv_more'):'';
    pv.innerHTML=`${close}<pre style="clear:both">${escHtml(lines.join('\n')+more)}</pre>`;
  }else{
    const head=text.length>4000?text.slice(0,4000)+t('hist_truncated'):text;
    pv.innerHTML=`${close}<pre style="clear:both">${escHtml(head)}</pre>`;
  }
  pv.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// Apply language to static text on first paint, then load run history.
applyStaticI18n();
loadHistory();
</script>
