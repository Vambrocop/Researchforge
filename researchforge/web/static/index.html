<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchForge</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1.5rem; background: #f8f9fa; color: #212529; }
  h1 { font-size: 1.6rem; margin-bottom: 1rem; }
  h2 { font-size: 1.1rem; margin: 1.2rem 0 0.5rem; border-bottom: 1px solid #dee2e6; padding-bottom: 0.3rem; }
  .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  input[type=file] { flex: 1; padding: 0.3rem; }
  button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  .btn-primary { background: #0d6efd; color: #fff; }
  .btn-primary:hover { background: #0b5ed7; }
  .btn-run { background: #198754; color: #fff; font-size: 0.8rem; padding: 0.2rem 0.6rem; }
  .btn-run:hover { background: #157347; }
  .btn-override { background: #dc3545; color: #fff; font-size: 0.8rem; padding: 0.2rem 0.6rem; }
  .btn-override:hover { background: #bb2d3b; }
  .card { background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 1rem; margin-top: 0.8rem; }
  .meta { color: #6c757d; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .rec-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; border-bottom: 1px solid #f1f3f5; flex-wrap: wrap; }
  .rec-row:last-child { border-bottom: none; }
  .dot { font-size: 1rem; line-height: 1; }
  .score { font-size: 0.8rem; color: #6c757d; width: 3ch; text-align: right; }
  .method { font-weight: 500; flex: 1; min-width: 120px; }
  .note { font-size: 0.8rem; color: #495057; flex: 2; min-width: 150px; }
  pre { background: #f1f3f5; padding: 0.8rem; border-radius: 4px; overflow: auto; font-size: 0.78rem; white-space: pre-wrap; word-break: break-word; max-height: 400px; }
  .file-links a { display: inline-block; margin: 0.2rem 0.4rem 0.2rem 0; font-size: 0.85rem; color: #0d6efd; text-decoration: none; }
  .file-links a:hover { text-decoration: underline; }
  .error { color: #dc3545; font-size: 0.9rem; margin-top: 0.5rem; }
  #error { background: #fff3f3; border: 1px solid #f5c6cb; border-radius: 4px; padding: 0.5rem 0.8rem; margin-top: 0.6rem; color: #842029; font-size: 0.9rem; display: none; }
  .spinner { display: none; color: #6c757d; font-size: 0.85rem; margin-left: 0.5rem; }
  #result-section { display: none; }
  #profile-section { display: none; }
  .issue-row { padding: 0.3rem 0; border-bottom: 1px solid #f1f3f5; font-size: 0.85rem; }
  .issue-row:last-child { border-bottom: none; }
  .issue-kind { font-weight: 600; color: #dc3545; min-width: 100px; display: inline-block; }
  .issue-col { color: #0d6efd; min-width: 100px; display: inline-block; }
  .issue-sev { font-size: 0.78rem; color: #6c757d; margin-left: 0.4rem; }
  .btn-clean { background: #fd7e14; color: #fff; margin-top: 0.6rem; }
  .btn-clean:hover { background: #e8681a; }
  .btn-reanalyze { background: #6f42c1; color: #fff; margin-top: 0.6rem; }
  .btn-reanalyze:hover { background: #5a32a3; }
  .btn-download { background: #0d6efd; color: #fff; font-size: 0.85rem; padding: 0.3rem 0.8rem; margin-top: 0.5rem; }
  .btn-download:hover { background: #0b5ed7; }
  .plan-row { padding: 0.25rem 0; font-size: 0.83rem; border-bottom: 1px solid #f1f3f5; }
  .plan-row:last-child { border-bottom: none; }
  .plan-action { font-weight: 600; color: #198754; min-width: 110px; display: inline-block; }
  .inline-fig { display: block; max-width: 100%; border: 1px solid #dee2e6; border-radius: 4px; margin: 0.5rem 0; }
  .report { font-size: 0.88rem; line-height: 1.6; }
  .report h1 { font-size: 1.15rem; margin: 0.8rem 0 0.3rem; }
  .report h2 { font-size: 1rem; margin: 0.7rem 0 0.25rem; border-bottom: 1px solid #dee2e6; padding-bottom: 0.15rem; }
  .report h3 { font-size: 0.92rem; margin: 0.6rem 0 0.2rem; }
  .report ul { margin: 0.2rem 0 0.4rem 1.4rem; padding: 0; }
  .report li { margin: 0.15rem 0; }
  .report p { margin: 0.3rem 0; }
  .report code { background: #f1f3f5; padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.85em; }
</style>
</head>
<body>
<h1>ResearchForge</h1>

<div class="row">
  <input type="file" id="csv-input" accept=".csv">
  <button class="btn-primary" id="btn-analyze" onclick="doAnalyze()">分析</button>
  <span class="spinner" id="analyze-spinner">处理中...</span>
</div>
<div id="error"></div>

<div id="profile-section">
  <h2>数据概览</h2>
  <div class="card">
    <div class="meta" id="data-meta"></div>
  </div>

  <div id="issues-section" style="display:none">
    <h2>数据质量问题</h2>
    <div class="card">
      <div id="issues-list"></div>
      <div style="margin-top:0.6rem">
        <button class="btn-clean" id="btn-clean" onclick="doClean()">清洗数据</button>
        <span class="spinner" id="clean-spinner">处理中...</span>
      </div>
    </div>
  </div>

  <div id="clean-section" style="display:none">
    <h2>清洗方案</h2>
    <div class="card">
      <div id="clean-plan"></div>
      <div id="clean-log-summary" class="meta" style="margin-top:0.5rem"></div>
      <div style="margin-top:0.6rem">
        <button class="btn-reanalyze" id="btn-reanalyze" onclick="doReanalyze()">用清洗后数据重新分析</button>
        <span class="spinner" id="reanalyze-spinner">处理中...</span>
      </div>
    </div>
  </div>

  <h2>推荐分析</h2>
  <div class="card" id="rec-list"></div>
</div>

<div id="result-section">
  <h2>分析结果</h2>
  <div class="card">
    <div id="result-summary" class="meta"></div>
    <h2 style="margin-top:0.8rem">报告</h2>
    <div class="report" id="result-report"></div>
    <h2>输出文件</h2>
    <div class="file-links" id="result-files"></div>
    <div style="margin-top:0.6rem">
      <a id="btn-download-all" class="btn-download" style="display:none;text-decoration:none" href="#">下载全部产物</a>
    </div>
  </div>
</div>

<script>
let currentFileId = null;
let cleanedFileId = null;

const DOTS = { green: '🟢', yellow: '🟡', red: '🔴' };

// ---------------------------------------------------------------------------
// Error banner
// ---------------------------------------------------------------------------
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearError() {
  const el = document.getElementById('error');
  el.textContent = '';
  el.style.display = 'none';
}

// ---------------------------------------------------------------------------
// Button loading state helpers
// ---------------------------------------------------------------------------
function setBusy(btnId, label) {
  const btn = document.getElementById(btnId);
  if (btn) { btn._origLabel = btn.textContent; btn.textContent = label || '…处理中'; btn.disabled = true; }
}
function setIdle(btnId) {
  const btn = document.getElementById(btnId);
  if (btn) { btn.textContent = btn._origLabel || btn.textContent; btn.disabled = false; }
}

// ---------------------------------------------------------------------------
// Markdown → HTML (no external lib)
// ---------------------------------------------------------------------------
function mdToHtml(md) {
  if (!md) return '<p>(无报告)</p>';

  // Escape raw HTML first to prevent injection
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Inline: **bold** and `code`
  function inlineFormat(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
  }

  const lines = md.split('\n');
  const out = [];
  let inUl = false;

  function closeUl() { if (inUl) { out.push('</ul>'); inUl = false; } }

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();

    if (/^### /.test(line)) {
      closeUl();
      out.push(`<h3>${inlineFormat(line.slice(4))}</h3>`);
    } else if (/^## /.test(line)) {
      closeUl();
      out.push(`<h2>${inlineFormat(line.slice(3))}</h2>`);
    } else if (/^# /.test(line)) {
      closeUl();
      out.push(`<h1>${inlineFormat(line.slice(2))}</h1>`);
    } else if (/^- /.test(line)) {
      if (!inUl) { out.push('<ul>'); inUl = true; }
      out.push(`<li>${inlineFormat(line.slice(2))}</li>`);
    } else if (line === '') {
      closeUl();
      // blank line = paragraph break; no tag needed
    } else {
      closeUl();
      out.push(`<p>${inlineFormat(line)}</p>`);
    }
  }
  closeUl();
  return out.join('\n');
}

// ---------------------------------------------------------------------------
// Main actions
// ---------------------------------------------------------------------------
async function doAnalyze() {
  clearError();
  document.getElementById('profile-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('issues-section').style.display = 'none';
  document.getElementById('clean-section').style.display = 'none';
  cleanedFileId = null;

  const input = document.getElementById('csv-input');
  if (!input.files.length) { showError('请先选择一个 CSV 文件'); return; }

  setBusy('btn-analyze', '…处理中');
  const spinner = document.getElementById('analyze-spinner');
  spinner.style.display = 'inline';

  const fd = new FormData();
  fd.append('file', input.files[0]);

  let data;
  try {
    const res = await fetch('/api/analyze', { method: 'POST', body: fd });
    data = await res.json();
    if (!res.ok) { showError(data.detail || '分析失败'); setIdle('btn-analyze'); spinner.style.display = 'none'; return; }
  } catch (e) {
    showError('网络错误：' + e.message);
    setIdle('btn-analyze'); spinner.style.display = 'none'; return;
  }
  setIdle('btn-analyze');
  spinner.style.display = 'none';

  currentFileId = data.file_id;
  renderProfile(data.fingerprint);
  renderIssues(data.fingerprint.issues || []);
  renderRecs(data.recommendations);
  document.getElementById('profile-section').style.display = '';
}

function renderProfile(fp) {
  const parts = [
    `${fp.n_rows} 行 × ${fp.n_cols} 列`,
    fp.is_panel ? '面板数据' : (fp.is_timeseries ? '时间序列' : '截面数据'),
    fp.time_col ? `时间列: ${fp.time_col}` : '',
    fp.unit_col ? `单位列: ${fp.unit_col}` : '',
    fp.n_issues ? `质量问题: ${fp.n_issues} 项` : '无质量问题',
  ].filter(Boolean);
  document.getElementById('data-meta').textContent = parts.join(' | ');
}

function renderIssues(issues) {
  const sec = document.getElementById('issues-section');
  if (!issues.length) { sec.style.display = 'none'; return; }
  const el = document.getElementById('issues-list');
  el.innerHTML = issues.map(iss => {
    const col = iss.column ? `<span class="issue-col">${escHtml(iss.column)}</span>` : '<span class="issue-col">—</span>';
    return `<div class="issue-row">
      <span class="issue-kind">${escHtml(iss.kind)}</span>${col}
      <span>${escHtml(iss.detail)}</span>
      <span class="issue-sev">[${escHtml(iss.severity)}]</span>
    </div>`;
  }).join('');
  sec.style.display = '';
}

async function doClean() {
  if (!currentFileId) return;
  clearError();
  document.getElementById('clean-section').style.display = 'none';
  setBusy('btn-clean', '…处理中');
  const spinner = document.getElementById('clean-spinner');
  spinner.style.display = 'inline';

  let data;
  try {
    const res = await fetch('/api/clean', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: currentFileId }),
    });
    data = await res.json();
    if (!res.ok) { showError(data.detail || '清洗失败'); setIdle('btn-clean'); spinner.style.display = 'none'; return; }
  } catch (e) {
    showError('网络错误：' + e.message);
    setIdle('btn-clean'); spinner.style.display = 'none'; return;
  }
  setIdle('btn-clean');
  spinner.style.display = 'none';

  cleanedFileId = data.cleaned_file_id;
  renderCleanResult(data);
  document.getElementById('clean-section').style.display = '';
  document.getElementById('clean-section').scrollIntoView({ behavior: 'smooth' });
}

function renderCleanResult(data) {
  const planEl = document.getElementById('clean-plan');
  if (data.plan && data.plan.length) {
    planEl.innerHTML = data.plan.map(s => {
      const col = s.column ? ` — <span style="color:#0d6efd">${escHtml(s.column)}</span>` : '';
      return `<div class="plan-row"><span class="plan-action">${escHtml(s.action)}</span>${col} <span style="color:#6c757d;font-size:0.8rem">${escHtml(s.reason)}</span></div>`;
    }).join('');
  } else {
    planEl.innerHTML = '<div class="meta">无清洗步骤（数据已干净）</div>';
  }

  const applied = (data.log || []).filter(l => l.applied).length;
  const total = (data.log || []).length;
  document.getElementById('clean-log-summary').textContent =
    `共 ${total} 步，${applied} 步已执行。清洗后文件已保存 (ID: ${cleanedFileId || '—'})`;
}

async function doReanalyze() {
  if (!cleanedFileId) return;
  clearError();
  setBusy('btn-reanalyze', '…处理中');
  const spinner = document.getElementById('reanalyze-spinner');
  spinner.style.display = 'inline';

  let data;
  try {
    const res = await fetch('/api/reanalyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: cleanedFileId }),
    });
    data = await res.json();
    if (!res.ok) { showError(data.detail || '重新分析失败'); setIdle('btn-reanalyze'); spinner.style.display = 'none'; return; }
  } catch (e) {
    showError('网络错误：' + e.message);
    setIdle('btn-reanalyze'); spinner.style.display = 'none'; return;
  }
  setIdle('btn-reanalyze');
  spinner.style.display = 'none';

  // Switch to cleaned file as the active file for subsequent runs
  currentFileId = cleanedFileId;
  cleanedFileId = null;

  document.getElementById('clean-section').style.display = 'none';
  document.getElementById('issues-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';

  renderProfile(data.fingerprint);
  renderIssues(data.fingerprint.issues || []);
  renderRecs(data.recommendations);
  document.getElementById('profile-section').style.display = '';
  document.getElementById('profile-section').scrollIntoView({ behavior: 'smooth' });
}

function renderRecs(recs) {
  const el = document.getElementById('rec-list');
  if (!recs.length) { el.innerHTML = '<div class="meta">无推荐分析</div>'; return; }
  el.innerHTML = recs.map(r => {
    const dot = DOTS[r.light] || r.light;
    const btnCls = r.feasible ? 'btn-run' : 'btn-override';
    const btnLabel = r.feasible ? '运行' : '知情覆盖';
    const biasesTip = r.biases.length ? ` title="${r.biases.join('、')}"` : '';
    return `<div class="rec-row">
      <span class="dot"${biasesTip}>${dot}</span>
      <span class="score">${r.score}</span>
      <span class="method">${escHtml(r.method)}</span>
      <span class="note">${escHtml(r.note)}</span>
      <button class="${btnCls}" onclick="doRun('${r.id}')">${btnLabel}</button>
    </div>`;
  }).join('');
}

async function doRun(analysisId) {
  if (!currentFileId) return;
  document.getElementById('result-section').style.display = 'none';
  clearError();

  // Find the clicked run button and mark it busy
  const runBtns = document.querySelectorAll('.btn-run, .btn-override');
  let activeBtn = null;
  for (const b of runBtns) {
    if (b.getAttribute('onclick') === `doRun('${analysisId}')`) { activeBtn = b; break; }
  }
  if (activeBtn) { activeBtn._origLabel = activeBtn.textContent; activeBtn.textContent = '…处理中'; activeBtn.disabled = true; }

  let data;
  try {
    const res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file_id: currentFileId, analysis_id: analysisId }),
    });
    data = await res.json();
    if (!res.ok) {
      if (activeBtn) { activeBtn.textContent = activeBtn._origLabel; activeBtn.disabled = false; }
      showError(data.detail || '运行失败'); return;
    }
  } catch (e) {
    if (activeBtn) { activeBtn.textContent = activeBtn._origLabel; activeBtn.disabled = false; }
    showError('网络错误：' + e.message); return;
  }
  if (activeBtn) { activeBtn.textContent = activeBtn._origLabel; activeBtn.disabled = false; }

  renderResult(data);
  document.getElementById('result-section').style.display = '';
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
}

function renderResult(data) {
  document.getElementById('result-summary').textContent = data.summary || '(无摘要)';
  document.getElementById('result-report').innerHTML = mdToHtml(data.report || '');

  const outDirBase = data.output_dir.replace(/\\/g, '/').split('/').pop();

  // Download-all button
  const dlBtn = document.getElementById('btn-download-all');
  dlBtn.href = `/api/download/${encodeURIComponent(outDirBase)}`;
  dlBtn.style.display = 'inline-block';

  const filesEl = document.getElementById('result-files');
  if (data.files && data.files.length) {
    filesEl.innerHTML = data.files.map(f => {
      const url = `/outputs/${encodeURIComponent(outDirBase)}/${encodeURIComponent(f)}`;
      if (f.toLowerCase().endsWith('.png')) {
        return `<div><img src="${url}" class="inline-fig" alt="${escHtml(f)}"><div style="font-size:0.8rem;color:#6c757d">${escHtml(f)}</div></div>`;
      }
      return `<a href="${url}" target="_blank">${escHtml(f)}</a>`;
    }).join('');
  } else {
    filesEl.innerHTML = '<span class="meta">无输出文件</span>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
