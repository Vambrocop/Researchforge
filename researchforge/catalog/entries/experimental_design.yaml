- id: rcbd
  method: Randomized complete block design (RCBD ANOVA)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Design-aware analysis of a randomized complete block design: one treatment factor
    with a blocking factor that controls a nuisance gradient (field / site / batch).
    Fits outcome ~ C(treatment) + C(block) (Type II ANOVA), tests the treatment effect
    controlling for block variation, reports per-treatment means, Tukey HSD pairwise
    comparisons, and a means±95%CI plot. Forces explicit treatment/block roles — set
    config outcome/treatment/block.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 6
  produces:
    - ANOVA table (treatment F-test controlling for block)
    - per-treatment means + Tukey HSD pairwise comparisons
    - treatment means with 95% CI plot
  executor_ref: statsmodels
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: treatment
      type: column
      description: 处理因子
      default: 名称匹配，否则低基数因子
    - name: block
      type: column
      description: 区组因子
      default: 名称含 block/rep 的因子
  biases:
    - assumes a complete balanced block design (each treatment once per block); imbalance is flagged
    - block is a nuisance factor controlling field/site variation, not of scientific interest
    - additive treatment + block — a single rep per cell cannot estimate the treatment x block interaction
    - residual normality / equal variance assumed; block may instead be modeled as a random effect (mixed model)
    - when roles are not set via config they are guessed from column names — disclosed in the run summary

- id: factorial_anova
  method: Two-way factorial ANOVA (main effects + interaction)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Two crossed treatment factors analyzed together: outcome ~ C(A) * C(B), testing both
    main effects AND their interaction (Type II ANOVA). Reports A / B / A×B F-tests, cell
    means, an interaction plot, and flags whether the interaction is significant (so main
    effects are read conditionally). Needs replication (>1 obs per A×B cell). Set config
    outcome/factor_a/factor_b.
  preconditions:
    requires_group: true
    # a FACTORIAL design needs ≥2 crossed factors (that's what distinguishes it from one-way
    # ANOVA); makes the method feasible only with two grouping columns present, and lets a
    # genuine factorial dataset surface it above generic single-factor group methods.
    min_categorical_cols: 2
    min_continuous: 1
    min_rows: 8
  produces:
    - ANOVA table (A, B, and A×B interaction F-tests)
    - cell means (A × B) + interaction plot
    - interaction-significance flag (conditional vs independent main effects)
  executor_ref: statsmodels
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: factor_a
      type: column
      description: 因子 A
      default: 名称匹配，否则低基数因子
    - name: factor_b
      type: column
      description: 因子 B
      default: 名称匹配，否则次低基数因子
  biases:
    - needs replication within each A×B cell; a single rep per cell cannot estimate the interaction error
    - Type II SS — for unbalanced designs with a real interaction, Type III (sum contrasts) is an alternative convention
    - when the interaction is significant, main effects are average/marginal effects and must be read in its context
    - residual normality / equal variance assumed
    - factor roles are guessed from columns when config doesn't set factor_a/factor_b — disclosed in the summary

- id: split_plot
  method: Split-plot ANOVA (two error strata)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Analysis of a split-plot design: a whole-plot factor applied to large plots within
    blocks, and a sub-plot factor applied to sub-plots inside each whole-plot. Correctly
    uses TWO error strata — the whole-plot factor is tested against the block×whole-plot
    error (lower power), while the sub-plot factor and the interaction are tested against
    the residual (higher power). Requires a complete balanced design. Set config
    outcome/block/whole_plot/sub_plot.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 8
  produces:
    - split-plot ANOVA table with both error strata (whole-plot vs sub-plot)
    - whole-plot / sub-plot / interaction F-tests against the correct error terms
    - cell means (whole-plot × sub-plot) + means plot
  executor_ref: statsmodels
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: block
      type: column
      description: 区组因子
      default: 名称含 block/rep 的因子
    - name: whole_plot
      type: column
      description: 主区因子
      default: 名称匹配（whole/main…）
    - name: sub_plot
      type: column
      description: 裂区因子
      default: 名称匹配（sub/split）
  biases:
    - requires a complete balanced design (one obs per block×whole-plot×sub-plot); unbalanced needs a mixed model
    - two error strata — the whole-plot factor has fewer error df and lower power than the sub-plot factor
    - whole-plot / sub-plot roles cannot be auto-detected reliably; set them via config
    - residual normality / equal variance assumed; block treated as fixed in the SS decomposition

- id: latin_square
  method: Latin square design ANOVA
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Analysis of a Latin square design: one treatment factor with TWO orthogonal blocking
    directions (rows and columns), each treatment appearing exactly once per row and once
    per column. Fits outcome ~ C(treatment) + C(row) + C(col) (Type II ANOVA), tests the
    treatment effect controlling both gradients, reports per-treatment means + Tukey HSD +
    a means plot. Requires a valid t×t Latin square. Set config outcome/treatment/row/col.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 9
  produces:
    - ANOVA table (treatment F-test controlling row + column)
    - per-treatment means + Tukey HSD
    - treatment means plot
  executor_ref: statsmodels
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: treatment
      type: column
      description: 处理因子（t 水平）
      default: 名称匹配（treatment/trt…）
    - name: row
      type: column
      description: 行区组（t 水平）
      default: 名称含 row 的因子
    - name: col
      type: column
      description: 列区组（t 水平）
      default: 名称含 col/column 的因子
  biases:
    - requires a valid t×t Latin square (treatments=rows=cols; each treatment once per row and per column)
    - rows and columns are nuisance blocking factors, not of scientific interest
    - residual df is only (t-1)(t-2) — small squares have low power; assumes no treatment×row/column interaction
    - residual normality / equal variance assumed; Tukey/CI are not adjusted for row/column
    - roles guessed from column names when config doesn't set treatment/row/col — disclosed in the summary

- id: power_analysis
  method: Power / sample-size for group comparison (DoE advisory)
  domain: experimental design
  family: experimental_design
  goal: plan
  description: >-
    Design advisory: required replications / sample size for a one-way (k-group)
    comparison. Reports required n per group for conventional Cohen's f effect sizes
    (small 0.10 / medium 0.25 / large 0.40) at 80% and 90% power — the sound planning
    output — plus the pilot data's observed effect as context (not "observed power").
    Set config outcome/group/alpha.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 6
  produces:
    - required n per group table (small/medium/large effect × 80%/90% power)
    - sample size vs effect-size curve
    - pilot observed Cohen's f (context only)
  executor_ref: statsmodels
  params:
    - name: environment
      type: column
      description: 环境/地点因子列（GE 设计）
      default: 按列名/基数推断
    - name: genotype
      type: column
      description: 基因型/品种因子列（GE 设计）
      default: 按列名/基数推断
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: group
      type: column
      description: 分组因子（k 组）
      default: 低基数分类列
    - name: alpha
      type: float
      description: 显著性水平
      default: "0.05"
  biases:
    - planning should use a meaningful TARGET effect size, not the observed pilot effect
    - post-hoc / observed power is a deterministic function of the p-value, so it is NOT reported as a planning tool
    - assumes a balanced one-way ANOVA design with normal, equal-variance groups
    - sample sizes are for the overall F-test, not pairwise comparisons

- id: ammi
  method: AMMI (Additive Main effects + Multiplicative Interaction)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Genotype × environment (G×E) analysis for multi-environment trials. Fits the
    additive two-way model (grand + genotype + environment main effects), then runs an
    SVD on the G×E interaction residual matrix to extract IPCA axes ranked by the
    percentage of interaction sum-of-squares they explain. Produces an AMMI-2 biplot
    (IPCA1 vs IPCA2 for genotypes and environments) and a per-genotype stability readout
    (AMMI stability value / interaction-residual norm). Set config outcome/genotype/environment.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 9
  produces:
    - IPCA variance table (% of G×E interaction SS per axis)
    - genotype stability table (IPCA1/IPCA2 scores, AMMI stability value)
    - AMMI-2 biplot (genotypes + environments)
  executor_ref: numpy
  params:
    - name: outcome
      type: column
      description: 连续结果变量（如产量）
      default: 第一个连续列
    - name: genotype
      type: column
      description: 基因型因子
      default: 名称匹配（genotype/variety…）
    - name: environment
      type: column
      description: 环境因子
      default: 名称匹配（environment/env/site…）
  biases:
    - descriptive multiplicative decomposition of the G×E interaction, not an inferential test
    - AMMI stability value / IPCA scores have several conventions; axis-retention (Gauch F) is not done — only % explained is reported
    - biplot interpretation is approximate (points far from the origin = large interaction / less stable)
    - needs a replicated multi-environment trial with a complete genotype×environment cell-mean table; missing cells drop whole rows/columns
    - genotype/environment roles are guessed from column names when config doesn't set them — disclosed in the summary

- id: gge_biplot
  method: GGE biplot (Genotype + Genotype×Environment)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    GGE biplot for multi-environment trials. Environment-centers the genotype×environment
    mean matrix (removing the environment main effect but KEEPING the genotype main effect
    plus G×E), then runs an SVD to build a genotype + G×E biplot. Reports the variance
    explained by PC1/PC2 and a which-won-where readout (the winning genotype per
    environment from the rank-2 biplot approximation). Set config outcome/genotype/environment.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 9
  produces:
    - PC variance table (% explained by each principal component)
    - which-won-where table (winning genotype per environment)
    - GGE biplot (genotypes as points, environments as vectors)
  executor_ref: numpy
  params:
    - name: outcome
      type: column
      description: 连续结果变量（如产量）
      default: 第一个连续列
    - name: genotype
      type: column
      description: 基因型因子
      default: 名称匹配（genotype/variety…）
    - name: environment
      type: column
      description: 环境因子
      default: 名称匹配（environment/env/site…）
  biases:
    - descriptive biplot of genotype + G×E, not an inferential test
    - centering / scaling choices (environment-centering, symmetric scaling) change the figure and its interpretation
    - the biplot is a low-rank approximation; which-won-where is an approximate projection, not a significance test
    - needs a replicated multi-environment trial with a complete genotype×environment cell-mean table; missing cells drop whole rows/columns
    - genotype/environment roles are guessed from column names when config doesn't set them — disclosed in the summary

- id: response_surface
  method: Response surface methodology (RSM, second-order)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Response Surface Methodology over 2+ continuous factors. Fits a second-order
    polynomial (response ~ linear + quadratic + cross terms), locates the stationary
    point by setting the gradient to zero (canonical analysis), and classifies it as a
    maximum / minimum / saddle from the Hessian eigenvalues. Draws a contour plot over
    the first two factors. Set config outcome + factors (list of >=2 continuous columns).
  preconditions:
    min_continuous: 3
    min_rows: 9
  produces:
    - second-order coefficient table + stationary point table
    - stationary-point classification (max / min / saddle) via Hessian eigenvalues
    - response-surface contour plot
  executor_ref: statsmodels
  params:
    - name: outcome
      type: column
      description: 响应变量
      default: 第一个连续列
    - name: factors
      type: columns
      description: 连续因子列（>=2）
      default: 其余连续列
  biases:
    - local quadratic approximation — valid only within the explored design region
    - the stationary point is meaningful only if it falls inside the factor box; outside it is extrapolation and is flagged
    - needs DESIGNED factor levels (e.g. central composite / Box-Behnken); observational factors are often collinear, giving an unestimable surface or a ridge
    - residual normality / equal variance assumed; the contour holds non-plotted factors fixed at the stationary/center value
