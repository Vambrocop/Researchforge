- id: rcbd
  method: Randomized complete block design (RCBD ANOVA)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Design-aware analysis of a randomized complete block design: one treatment factor
    with a blocking factor that controls a nuisance gradient (field / site / batch).
    Fits outcome ~ C(treatment) + C(block) (Type II ANOVA), tests the treatment effect
    controlling for block variation, reports per-treatment means, Tukey HSD pairwise
    comparisons, and a means±95%CI plot. Forces explicit treatment/block roles — set
    config outcome/treatment/block.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 6
  produces:
    - ANOVA table (treatment F-test controlling for block)
    - per-treatment means + Tukey HSD pairwise comparisons
    - treatment means with 95% CI plot
  executor_ref: statsmodels
  biases:
    - assumes a complete balanced block design (each treatment once per block); imbalance is flagged
    - block is a nuisance factor controlling field/site variation, not of scientific interest
    - additive treatment + block — a single rep per cell cannot estimate the treatment x block interaction
    - residual normality / equal variance assumed; block may instead be modeled as a random effect (mixed model)
    - when roles are not set via config they are guessed from column names — disclosed in the run summary

- id: factorial_anova
  method: Two-way factorial ANOVA (main effects + interaction)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Two crossed treatment factors analyzed together: outcome ~ C(A) * C(B), testing both
    main effects AND their interaction (Type II ANOVA). Reports A / B / A×B F-tests, cell
    means, an interaction plot, and flags whether the interaction is significant (so main
    effects are read conditionally). Needs replication (>1 obs per A×B cell). Set config
    outcome/factor_a/factor_b.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 8
  produces:
    - ANOVA table (A, B, and A×B interaction F-tests)
    - cell means (A × B) + interaction plot
    - interaction-significance flag (conditional vs independent main effects)
  executor_ref: statsmodels
  biases:
    - needs replication within each A×B cell; a single rep per cell cannot estimate the interaction error
    - Type II SS — for unbalanced designs with a real interaction, Type III (sum contrasts) is an alternative convention
    - when the interaction is significant, main effects are average/marginal effects and must be read in its context
    - residual normality / equal variance assumed
    - factor roles are guessed from columns when config doesn't set factor_a/factor_b — disclosed in the summary

- id: split_plot
  method: Split-plot ANOVA (two error strata)
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Analysis of a split-plot design: a whole-plot factor applied to large plots within
    blocks, and a sub-plot factor applied to sub-plots inside each whole-plot. Correctly
    uses TWO error strata — the whole-plot factor is tested against the block×whole-plot
    error (lower power), while the sub-plot factor and the interaction are tested against
    the residual (higher power). Requires a complete balanced design. Set config
    outcome/block/whole_plot/sub_plot.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 8
  produces:
    - split-plot ANOVA table with both error strata (whole-plot vs sub-plot)
    - whole-plot / sub-plot / interaction F-tests against the correct error terms
    - cell means (whole-plot × sub-plot) + means plot
  executor_ref: statsmodels
  biases:
    - requires a complete balanced design (one obs per block×whole-plot×sub-plot); unbalanced needs a mixed model
    - two error strata — the whole-plot factor has fewer error df and lower power than the sub-plot factor
    - whole-plot / sub-plot roles cannot be auto-detected reliably; set them via config
    - residual normality / equal variance assumed; block treated as fixed in the SS decomposition

- id: latin_square
  method: Latin square design ANOVA
  domain: experimental design
  family: experimental_design
  goal: explain
  description: >-
    Analysis of a Latin square design: one treatment factor with TWO orthogonal blocking
    directions (rows and columns), each treatment appearing exactly once per row and once
    per column. Fits outcome ~ C(treatment) + C(row) + C(col) (Type II ANOVA), tests the
    treatment effect controlling both gradients, reports per-treatment means + Tukey HSD +
    a means plot. Requires a valid t×t Latin square. Set config outcome/treatment/row/col.
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 9
  produces:
    - ANOVA table (treatment F-test controlling row + column)
    - per-treatment means + Tukey HSD
    - treatment means plot
  executor_ref: statsmodels
  biases:
    - requires a valid t×t Latin square (treatments=rows=cols; each treatment once per row and per column)
    - rows and columns are nuisance blocking factors, not of scientific interest
    - residual df is only (t-1)(t-2) — small squares have low power; assumes no treatment×row/column interaction
    - residual normality / equal variance assumed; Tukey/CI are not adjusted for row/column
    - roles guessed from column names when config doesn't set treatment/row/col — disclosed in the summary
