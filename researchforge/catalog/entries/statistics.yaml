# Statistics catalog entries — non-econometric statistical analyses.

- id: logistic_regression
  method: Logistic regression
  domain: statistics
  family: statistics
  goal: explain
  description: Logistic regression of a binary outcome on covariates.
  preconditions:
    requires_binary_outcome: true
    min_rows: 30
  produces:
    - regression table
    - odds ratios
  executor_ref: empirical-analysis-python
  biases:
    - perfect separation
    - omitted variable bias

- id: mediation
  method: Mediation analysis (X to M to Y)
  domain: statistics
  family: causal
  goal: explain
  description: Decompose the effect of X on Y into an indirect effect through a mediator M (ACME) and a direct effect (ADE), with Monte-Carlo confidence intervals (statsmodels Mediation, Imai et al.). Reports total effect and proportion mediated.
  preconditions:
    min_continuous: 3
    min_rows: 30
  produces:
    - indirect (ACME) / direct (ADE) / total effect with CIs
    - proportion mediated
  executor_ref: statsmodels
  biases:
    - X / M / Y are assigned by column order by default — set your hypothesized X to M to Y path
    - causal mediation assumes no unmeasured confounding of X-M, X-Y, and M-Y
    - linear models assume no X-by-M interaction (moderated mediation not modelled)

- id: bayesian_sem
  method: Bayesian confirmatory factor analysis (PyMC)
  domain: statistics
  family: sem
  goal: explain
  description: >-
    Bayesian confirmatory factor analysis (CFA) — the auto-runnable core of Bayesian SEM
    (a measurement model) — via modern PyMC NUTS, no R blavaan / JAGS / Stan compiler
    needed (the same unblocking applied to the Bayesian regression family). Default is a
    SINGLE-factor CFA on the continuous columns: standardized factor loadings with full
    posterior uncertainty (94% HDI), indicator residual variances, and McDonald's omega
    construct reliability. A lavaan-style model_spec defining TWO OR MORE factors
    ('F1 =~ a+b+c \n F2 =~ d+e+f') routes to a CORRELATED multi-factor CFA
    (marginalized Σ = Λ Φ Λᵀ + Ψ) that additionally reports the inter-factor correlations
    — the standardized structural associations between latents — and a per-factor omega.
    The factor scale is fixed (factor variance = 1) for identification; loadings are
    sign-identified (single-factor: predominantly-positive convention; multi-factor: a
    positive anchor loading per factor). Directed structural regressions (mediation /
    path models) between latents remain future work; for frequentist CB-SEM with fit
    indices use the sem analysis.
  preconditions:
    min_continuous: 3
    min_rows: 30
  produces:
    - standardized loadings per indicator + 94% HDI + residual SD (CSV)
    - McDonald's omega construct reliability + AVE (single-factor) or per-factor omega (multi-factor)
    - inter-factor correlation matrix (multi-factor model_spec) = standardized structural associations (CSV)
    - ArviZ forest plot of loadings + convergence (R-hat / ESS)
  executor_ref: py::bayesian_sem
  params:
    - name: indicators
      type: columns
      description: 测量指标列(单因子)
      default: 连续列(单因子)
    - name: model_spec
      type: text
      description: lavaan 风格声明;单因子取列名,≥2 因子(F1 =~ a+b+c)走相关多因子 CFA
      default: 自动单因子
    - name: draws
      type: int
      description: 后验抽样数
      default: "1000"
    - name: tune
      type: int
      description: 预热(tuning)步数
      default: "1000"
    - name: chains
      type: int
      description: MCMC 链数
      default: "2"
    - name: seed
      type: int
      description: 随机种子
      default: "42"
    - name: hdi_prob
      type: float
      description: HDI 可信区间概率(0.5-1)
      default: "0.94"
    - this is a CFA MEASUREMENT model (single- or correlated-multi-factor); it does NOT fit directed structural regressions / mediation between latents (those need a path-model spec, future work)
    - the factor scale is fixed at variance = 1 for identification; loadings are reported on the standardized-indicator scale
    - factor sign is not identified; single-factor uses a predominantly-positive convention, multi-factor anchors each factor's first loading positive (so inter-factor correlations are consistently signed)
    - inter-factor correlations are the standardized structural associations between latents (for two factors, equal to the standardized regression coefficient); they are associational, not directed causal paths
    - weakly-informative priors are used and indicators are standardized; check convergence (R-hat near 1.0, adequate ESS) and read omega as a construct-reliability summary, not a model-fit test

- id: pls_sem
  method: PLS-SEM (partial least squares SEM)
  domain: statistics
  family: sem
  goal: explain
  description: Variance-based, prediction-oriented structural equation modeling for latent constructs (small-sample / non-normal friendly). Needs a user-specified measurement model (indicators to latent constructs) + structural paths, which the engine cannot infer — surfaces guidance and auto-runnable alternatives (CB-SEM / EFA).
  preconditions:
    min_continuous: 4
    min_rows: 30
  produces:
    - guidance (requires a measurement-model spec)
  executor_ref: plspm / SmartPLS
  biases:
    - requires a theory-driven measurement + structural model — not auto-inferable
    - PLS-SEM is prediction-oriented; for covariance-fit / theory testing use CB-SEM (the sem analysis)

- id: survival_analysis
  method: Survival analysis (Kaplan-Meier + Cox PH)
  domain: statistics
  family: survival
  goal: explain
  description: Time-to-event analysis — Kaplan-Meier survival curves (with a log-rank test across a 2-level group) plus a Cox proportional-hazards model (hazard ratios + a proportional-hazards assumption test) when covariates are present. Auto-detects the duration and event (0/1) columns by name.
  preconditions:
    requires_binary_outcome: true
    min_continuous: 1
    min_rows: 15
  produces:
    - Kaplan-Meier survival curve + median survival
    - log-rank test (if a 2-level group)
    - Cox hazard ratios + PH assumption test (if covariates)
  executor_ref: lifelines
  params:
    - name: duration
      type: column
      description: 时长（time-to-event）列
      default: 名称匹配自动
    - name: event
      type: column
      description: 事件指示列（1=事件/0=删失）
      default: 名称匹配自动
    - name: group
      type: column
      description: 两水平分组（log-rank）列
      default: 第一个两水平分类列
  biases:
    - duration and event columns are auto-detected by name — verify they are correct
    - censoring is assumed random and non-informative (informative censoring biases estimates)
    - Cox assumes proportional hazards (tested) and a log-linear covariate effect

- id: sem
  method: Structural equation modeling (single-factor CFA template)
  domain: statistics
  family: sem
  goal: explain
  description: Fit a confirmatory-factor / structural equation model. The engine auto-fits an exploratory single-latent-factor measurement model over the continuous variables as a starting template; edit the model spec to your hypothesized structure.
  preconditions:
    min_continuous: 3
    min_rows: 50
  produces:
    - factor loadings
    - fit indices (CFI / TLI / RMSEA)
  executor_ref: semopy
  params:
    - name: model_spec
      type: str
      description: 测量/结构模型设定（lavaan/semopy 语法）
      default: 单潜因子探索性模板
    - name: sem_spec
      type: str
      description: model_spec 的别名
      default: 单潜因子探索性模板
  biases:
    - the single-factor template is exploratory, not your hypothesized model
    - SEM requires a theory-driven structure; auto-spec is only a starting point
    - fit indices are unreliable in small samples (n < ~100-200)

- id: efa
  method: Exploratory factor analysis (EFA)
  domain: statistics
  family: statistics
  goal: explore
  description: Uncover latent factors behind a set of continuous variables — factor loadings (varimax-rotated), variance explained, a scree plot, and sampling-adequacy diagnostics (KMO, Bartlett's test). Number of factors chosen by the Kaiser criterion (eigenvalue > 1).
  preconditions:
    min_continuous: 3
    min_rows: 50
  produces:
    - factor loadings (rotated)
    - scree plot + variance explained
    - KMO / Bartlett adequacy
  executor_ref: factor_analyzer
  biases:
    - the number of factors (Kaiser eigenvalue>1) is a heuristic — scree/parallel analysis may disagree
    - low KMO (<0.6) or a non-significant Bartlett test means the data is unsuitable for factoring
    - EFA is exploratory, not confirmatory — for a hypothesised structure use SEM/CFA

- id: multinomial_logit
  method: Multinomial logistic regression
  domain: statistics
  family: statistics
  goal: explain
  description: Model a nominal (unordered) outcome with 3+ categories on covariates via multinomial logit, reporting one coefficient set per non-baseline class with relative risk ratios (RRR), plus in-sample accuracy and McFadden pseudo-R².
  preconditions:
    requires_ordinal: true
    min_rows: 40
  produces:
    - per-class coefficients and relative risk ratios
    - accuracy and pseudo-R-squared
  executor_ref: statsmodels
  biases:
    - assumes the outcome is nominal/unordered — for ordered categories use ordered_logit
    - assumes independence of irrelevant alternatives (IIA)
    - many categories or rare classes need a large sample for stable estimates

- id: ordered_logit
  method: Ordered logistic regression (proportional odds)
  domain: statistics
  family: statistics
  goal: explain
  description: Model an ordinal outcome (e.g. Likert scale, satisfaction or adoption-intensity levels) on covariates via the proportional-odds cumulative logit.
  preconditions:
    requires_ordinal: true
    min_rows: 30
  produces:
    - proportional-odds coefficient table
    - threshold cutpoints
    - coefficient plot
  executor_ref: empirical-analysis-python
  biases:
    - proportional-odds (parallel lines) assumption may not hold
    - outcome level order is assumed, not verified
    - sparse top/bottom categories destabilize thresholds

- id: quantile_regression
  method: Quantile regression
  domain: statistics
  family: statistics
  goal: explain
  description: Regress conditional quantiles (median + tails) of a continuous outcome on covariates; robust to heteroskedasticity and outliers, reveals effects that differ across the outcome distribution.
  preconditions:
    min_continuous: 1
    min_rows: 30
  produces:
    - quantile coefficient table (tau=0.25/0.50/0.75)
    - median coefficient plot
  executor_ref: empirical-analysis-python
  biases:
    - quantile fits are independent across tau — no monotonicity/crossing correction
    - standard errors depend on kernel bandwidth (sparsity); unstable in small-n tails
    - extrapolation beyond data range

- id: glmm
  method: Generalized linear mixed model (GLMM, lme4)
  domain: statistics
  family: statistics
  goal: explain
  description: Mixed model for a non-Gaussian clustered outcome — binary (logistic, family binomial) or count (Poisson) — with fixed-effect predictors plus a random intercept for a grouping variable (e.g. site, farm, subject). Reports fixed-effect coefficients with odds/incidence-rate ratios, the random-intercept variance, ICC (binary), AIC, and a Poisson overdispersion check. Fit by R lme4 glmer. (Continuous outcomes use the linear mixed_effects analysis.)
  preconditions:
    requires_group: true
    min_rows: 40
  produces:
    - fixed-effect coefficients + OR/IRR
    - random-intercept variance + ICC
    - AIC + overdispersion (Poisson)
  executor_ref: lme4
  params:
    - name: outcome
      type: column
      description: 非高斯结果变量（二值或计数）
      default: 第一个二值列，否则第一个计数列
    - name: predictors
      type: columns
      description: 固定效应预测变量
      default: 其余连续/计数/二值列
    - name: group
      type: column
      description: 随机截距分组变量
      default: 面板单元，否则有真实聚类的分类/id 列
  biases:
    - outcome family auto-set (binary to binomial, count to Poisson) and the random-intercept grouping is auto-picked — set config outcome/group if wrong
    - assumes random effects are normally distributed and the link is correct; Poisson assumes no overdispersion (flagged if >1.5, approximate for mixed models)
    - Poisson models raw counts; rate outcomes (events per exposure) need offset(log(exposure)), which is not supported here
    - glmer can fail to converge / give singular fits with few groups (auto-pick needs >=5) or sparse cells — treat unstable fits cautiously; ICC is on the latent logit scale

- id: gamm
  method: Generalized additive mixed model (GAMM, mgcv)
  domain: statistics
  family: statistics
  goal: explain
  description: Combines GAM smooth (penalised-spline) terms for continuous predictors with a random intercept for a grouping variable (clustered / repeated-measures data), via mgcv's s(group, bs="re") in a single REML fit. Captures nonlinear covariate effects AND between-group heterogeneity at once. Reports smooth-term significance (edf), the random-intercept SD, deviance explained, adjusted R-squared, and partial-effect plots. (Pure smoothing -> gam; pure random effects on a linear model -> mixed_effects.)
  preconditions:
    requires_group: true
    min_continuous: 2
    min_rows: 50
  produces:
    - smooth-term table (edf + significance)
    - random-intercept SD
    - deviance explained / adjusted R-squared + partial-effect plots
  executor_ref: mgcv
  params:
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量（连续项作平滑）
      default: 其余数值列
    - name: group
      type: column
      description: 随机截距分组变量
      default: 面板单元/重复分类
    - name: family
      type: choice
      choices: [gaussian, binomial, poisson]
      description: 结果分布族
      default: 按结果类型自动
  biases:
    - grouping variable for the random intercept is auto-picked (panel unit / repeated category) — set config group if wrong
    - outcome may be Gaussian (identity), binary (logit) or count (log) — family auto-detected from the outcome type, override via config family; random intercepts assumed normal on the link scale; non-Gaussian smooth effects are on the link scale (deviance explained is the primary fit metric)
    - smooth basis (k=10) caps wiggliness; boundary extrapolation unreliable; needs enough groups (>=5) for a stable variance

- id: gam
  method: Generalized additive model (GAM, mgcv)
  domain: statistics
  family: statistics
  goal: explain
  description: Flexible regression that fits smooth (penalised-spline) functions of continuous predictors instead of forcing straight lines, revealing nonlinear / threshold relationships. Reports each smooth term's effective degrees of freedom (edf, 1 = linear) and significance, deviance explained, adjusted R-squared, and partial-effect plots. Low-cardinality / binary predictors enter as parametric terms. Fit by REML via R mgcv.
  preconditions:
    min_continuous: 2
    min_rows: 30
  produces:
    - smooth-term table (edf + significance)
    - parametric coefficients
    - deviance explained / adjusted R-squared
    - partial-effect smooth plots
  executor_ref: mgcv
  params:
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量（连续项作平滑）
      default: 其余数值列
  biases:
    - first continuous column is the outcome by default — set config outcome/predictors
    - assumes a Gaussian / identity-link continuous outcome; bounded [0,1] proportions, counts, or strongly skewed outcomes need betar / Poisson / Gamma (not auto-switched)
    - smooth basis dimension (k=10) caps wiggliness; boundary / sparse-region extrapolation is unreliable
    - GAM shows association, not causation; concurvity (nonlinear collinearity, flagged when worst > 0.8) can destabilise smooths

- id: joint_longitudinal_survival
  method: Joint longitudinal–survival model (JM)
  domain: statistics
  family: survival
  goal: explain
  description: Jointly models a longitudinal biomarker trajectory (linear mixed model) and a time-to-event outcome (Weibull proportional-hazards), linked by an association parameter that quantifies how the current marker value shifts the event hazard. Corrects the measurement error and informative-dropout bias that a naive time-varying Cox / two-stage approach suffers. Needs panel data — a subject id, repeated marker measurements over a visit-time column, and a per-subject event time + 0/1 event indicator. Uses R JM.
  preconditions:
    is_panel: true
    requires_binary_outcome: true
    min_rows: 60
  produces:
    - association parameter (marker value ↔ event hazard) + p
    - longitudinal-trajectory + survival submodel tables
    - AIC, subjects, events
  executor_ref: JM
  params:
    - name: id
      type: column
      description: 受试者标识列
      default: 面板单元列
    - name: time
      type: column
      description: 纵向测量的访视时间列
      default: 面板时间列
    - name: marker
      type: column
      description: 纵向生物标志物列（随时间变化的连续变量）
      default: 随时间变化的连续列
    - name: event_time
      type: column
      description: 每受试者事件时间列
      default: 每受试者恒定的连续列
    - name: event
      type: column
      description: 事件指示列（0/1）
      default: 每受试者 0/1 列
    - name: duration
      type: column
      description: event_time 的别名
      default: 名称匹配自动
    - name: group
      type: column
      description: 分组列
      default: 第一个分组列
    - name: covariates
      type: columns
      description: 生存子模型协变量
      default: 其余数值列
  biases:
    - roles auto-detected (varying continuous = marker, per-subject constant continuous = event time, per-subject 0/1 = event) — set config marker/event_time/event if wrong
    - assumes normal random effects, association via the current true marker value, and random (MAR) censoring
    - needs enough subjects/events (>=20 / >=10 here) and can fail to converge; a single linear marker trajectory may be too simple

- id: meta_regression
  method: Meta-regression (moderators, metafor)
  domain: statistics
  family: meta
  goal: synthesize
  description: Extends meta-analysis by regressing study-level effect sizes on one or more study-level moderators (covariates) to explain between-study heterogeneity. Reports the moderator coefficient table, the omnibus moderator test (QM), residual heterogeneity (I-squared / tau-squared), R-squared (proportion of heterogeneity explained), and a bubble plot. Same effect-size inputs as meta-analysis (pre-computed yi + vi/sei, raw two-group means, or 2x2 counts) plus moderator columns.
  preconditions:
    requires_effect_sizes: true
    min_rows: 5
  produces:
    - moderator coefficient table (estimate + CI + p)
    - omnibus moderator test (QM) + R-squared (heterogeneity explained)
    - residual heterogeneity + bubble plot
  executor_ref: metafor
  params:
    - name: measure
      type: str
      description: 效应量类型（如 SMD/OR）
      default: 自动（按输入格式）
    - name: method
      type: str
      description: 合并方法（REML/DL 随机；FE 固定）
      default: REML
    - name: study
      type: column
      description: 研究标识列
      default: 名称匹配自动
    - name: effect
      type: column
      description: 效应量列 yi
      default: 名称匹配自动
    - name: variance
      type: column
      description: 效应量方差列 vi
      default: 名称匹配自动
    - name: se
      type: column
      description: 效应量标准误列 sei
      default: 名称匹配自动
    - name: moderators
      type: columns
      description: 研究层面调节变量
      default: 其余研究层面列
    - name: predictors
      type: columns
      description: moderators 的别名
      default: 其余研究层面列
  biases:
    - meta-regression is observational at the study level — associations, not individual-level causation (ecological fallacy risk)
    - few studies relative to moderators overfits / inflates false positives (rule of thumb >=10 studies per moderator)
    - inherits the biases of the primary studies; residual heterogeneity may remain after moderators

- id: meta_analysis
  method: Meta-analysis (random/fixed-effects, metafor)
  domain: statistics
  family: meta
  goal: synthesize
  description: Pool effect sizes across studies (each row = one study) into a random-effects (REML, default) or fixed-effects summary effect with 95% CI, between-study heterogeneity (I-squared, tau-squared, Q test), a forest plot, and a funnel plot + Egger's test for publication bias. Accepts pre-computed effect sizes (yi + vi/sei), raw two-group means (m1,sd1,n1,m2,sd2,n2 to standardized mean difference), or 2x2 counts (ai,bi,ci,di to odds ratio). Lets several people each contribute study rows and merge them.
  preconditions:
    requires_effect_sizes: true
    min_rows: 2
  produces:
    - pooled effect + 95% CI
    - heterogeneity (I-squared / tau-squared / Q)
    - forest plot + funnel plot + Egger's test
  executor_ref: metafor
  params:
    - name: measure
      type: str
      description: 效应量类型（如 SMD/OR）
      default: 自动（按输入格式）
    - name: method
      type: str
      description: 合并方法（REML/DL 随机；FE 固定）
      default: REML
    - name: study
      type: column
      description: 研究标识列
      default: 名称匹配自动
    - name: effect
      type: column
      description: 效应量列 yi
      default: 名称匹配自动
    - name: variance
      type: column
      description: 效应量方差列 vi
      default: 名称匹配自动
    - name: se
      type: column
      description: 效应量标准误列 sei
      default: 名称匹配自动
  biases:
    - meta-analysis inherits the biases of the primary studies it pools (garbage in, garbage out)
    - high heterogeneity (I-squared > 50%) means a single pooled effect can mislead — investigate moderators
    - funnel asymmetry / Egger's test can flag publication bias but also reflects true small-study effects

- id: group_comparison
  method: Group comparison (t-test / ANOVA)
  domain: statistics
  family: statistics
  goal: explain
  description: Compare a continuous outcome across groups (t-test for 2 groups, one-way ANOVA for 3+).
  preconditions:
    requires_group: true
    min_continuous: 1
    min_rows: 10
  produces:
    - group means table
    - boxplot
    - test statistic
  executor_ref: empirical-analysis-python
  biases:
    - unequal variances
    - multiple comparisons
