# Bayesian conjugate-inference catalog entries (closed-form, no MCMC).
# Pure Python (scipy/numpy) closed-form conjugate posteriors. Any draw-based
# quantity (lift CI / expected loss / rate ratio) uses a FIXED seed (disclosed).
# Priors are ALWAYS stated; a posterior probability is NOT a frequentist p-value;
# a credible interval is a direct probability statement (not a confidence interval).

- id: bayesian_ab_test
  method: Bayesian A/B test (Beta-Binomial conjugate)
  domain: statistics
  family: bayesian
  goal: explain
  description: >-
    Bayesian A/B test for a binary outcome across two arms via the Beta-Binomial
    conjugate pair (Beta prior, Binomial likelihood). Input is a binary outcome
    column plus a 2-level group column (config outcome/group), or four count config
    keys (successes_a/trials_a/successes_b/trials_b). Prior defaults to the uniform
    Beta(1,1) (config prior_a/prior_b). Posteriors are Beta(a+successes, b+failures)
    per arm. Reports per-arm posterior mean conversion and 95% credible intervals,
    P(B greater than A) computed in closed form via the Beta-inequality sum (Cook /
    Evan Miller; falls back to fixed-seed posterior draws if posterior alpha is
    non-integer), the lift (B minus A) posterior with a credible interval (fixed-seed
    draws), and the decision-theoretic expected loss of choosing each arm. Plots the
    two Beta posterior densities.
  preconditions:
    requires_binary_outcome: true
    requires_group: true
    min_rows: 8
  produces:
    - per-arm posterior table (Beta alpha/beta, posterior mean, credible interval, expected loss)
    - P(B greater than A), lift posterior with credible interval, decision-theoretic expected loss
    - two Beta posterior density curves
  executor_ref: empirical-analysis-python
  params:
    - name: outcome
      type: column
      description: 二值结果列（1=成功）
      default: 第一个二值列
    - name: group
      type: column
      description: 两水平分组列（A/B 两臂）
      default: 第一个二值/两水平分类列
    - name: successes_a
      type: int
      description: A 臂成功数（与列输入二选一，直接给计数）
      default: 由 outcome×group 列汇总
    - name: trials_a
      type: int
      description: A 臂试验总数
      default: 由 outcome×group 列汇总
    - name: successes_b
      type: int
      description: B 臂成功数
      default: 由 outcome×group 列汇总
    - name: trials_b
      type: int
      description: B 臂试验总数
      default: 由 outcome×group 列汇总
    - name: prior_a
      type: float
      description: Beta 先验 α
      default: "1.0（均匀 Beta(1,1)）"
    - name: prior_b
      type: float
      description: Beta 先验 β
      default: "1.0（均匀 Beta(1,1)）"
    - name: ci
      type: float
      description: 可信区间水平（0-1）
      default: "0.95"
  biases:
    - priors are stated (default uniform Beta(1,1)) and matter at small n — report the prior
    - P(B greater than A) is a posterior probability, NOT a frequentist p-value
    - Bayesian inference needs no peeking/sequential-testing correction, but the prior still drives small-n results
    - assumes iid Bernoulli trials within each arm (no within-arm clustering / time drift)
    - lift credible interval and expected loss come from fixed-seed Monte-Carlo draws (resampling noise)

- id: bayesian_proportion
  method: Bayesian single-proportion estimation (Beta-Binomial conjugate)
  domain: statistics
  family: bayesian
  goal: describe
  description: >-
    Single-proportion Bayesian estimation via the Beta-Binomial conjugate pair. A
    binary column (config outcome) with k successes in n trials gives the posterior
    Beta(a+k, b+n-k). Default prior is the uniform Beta(1,1); the Jeffreys prior
    Beta(0.5,0.5) is available via config (prior=jeffreys), or set prior_a/prior_b
    directly. Reports the posterior mean, mode and median, a 95% equal-tail (or HPD
    via config interval=hpd) credible interval, and P(theta greater than ref) for a
    configurable reference (config ref, default 0.5). Plots the Beta posterior with
    the mean, credible interval and reference marked.
  preconditions:
    requires_binary_outcome: true
    min_rows: 8
  produces:
    - posterior summary table (mean/median/mode, credible interval, P(theta greater than ref))
    - Beta posterior density with mean, credible interval and reference marked
  executor_ref: empirical-analysis-python
  params:
    - name: outcome
      type: column
      description: 二值结果列（1=成功）
      default: 第一个二值列
    - name: group
      type: column
      description: 可选两水平分组列
      default: 不分组（单一比例）
    - name: prior
      type: str
      description: 先验快捷选择（jeffreys=Beta(0.5,0.5)，其余=均匀）
      default: uniform（Beta(1,1)）
    - name: prior_a
      type: float
      description: Beta 先验 α（覆盖 prior 快捷选择）
      default: "1.0"
    - name: prior_b
      type: float
      description: Beta 先验 β
      default: "1.0"
    - name: ci
      type: float
      description: 可信区间水平（0-1）
      default: "0.95"
    - name: ref
      type: float
      description: 比较参考值，报告 P(θ > ref)
      default: "0.5"
    - name: interval
      type: str
      description: 可信区间类型（hpd=最高后验密度，其余=等尾）
      default: equal_tail（等尾）
  biases:
    - prior choice matters at small n (uniform Beta(1,1) vs Jeffreys Beta(0.5,0.5) shifts the estimate) — report the prior
    - a credible interval is a direct probability statement about theta, NOT a confidence interval
    - the posterior mode is undefined when posterior alpha or beta is at most 1 (reported as NaN)
    - assumes iid Bernoulli observations (independent trials, constant probability)

- id: bayesian_poisson_rate
  method: Bayesian Poisson rate estimation (Gamma-Poisson conjugate)
  domain: statistics
  family: bayesian
  goal: describe
  description: >-
    Bayesian rate estimation for count data via the Gamma-Poisson conjugate pair
    (Gamma prior, Poisson likelihood). A count column (config outcome) with an
    optional exposure/offset column (config exposure) gives the posterior
    Gamma(a0+sum_y, b0+sum_exposure). Default prior is the weakly-informative
    Gamma(0.001,0.001) (config prior_a/prior_b). Reports the posterior mean rate and
    a 95% credible interval (cross-checked against the empirical rate sum_y/sum_exp),
    and an overdispersion flag when the count variance far exceeds the mean. If a
    2-level group is present it also reports the rate-ratio posterior and P(ratio
    greater than 1) from fixed-seed draws. Plots the Gamma posterior rate density.
  preconditions:
    requires_count_outcome: true
    min_rows: 8
  produces:
    - posterior rate summary table (Gamma shape/rate, posterior mean, credible interval, empirical rate, dispersion)
    - optional rate-ratio posterior with credible interval and P(ratio greater than 1)
    - Gamma posterior rate density curve
  executor_ref: empirical-analysis-python
  params:
    - name: outcome
      type: column
      description: 计数结果列
      default: 第一个计数列
    - name: exposure
      type: column
      description: 暴露/偏移列（events per exposure）
      default: 无（默认每行暴露为 1）
    - name: group
      type: column
      description: 可选两水平分组列（报告率比）
      default: 不分组
    - name: prior_a
      type: float
      description: Gamma 先验形状 α0
      default: "0.001（弱信息）"
    - name: prior_shape
      type: float
      description: Gamma 先验形状 α0（prior_a 的别名）
      default: "0.001"
    - name: prior_b
      type: float
      description: Gamma 先验率 β0
      default: "0.001（弱信息）"
    - name: prior_rate
      type: float
      description: Gamma 先验率 β0（prior_b 的别名）
      default: "0.001"
    - name: ci
      type: float
      description: 可信区间水平（0-1）
      default: "0.95"
  biases:
    - conjugate Gamma-Poisson assumes Poisson counts (constant rate, no overdispersion)
    - the prior is weakly informative by default (Gamma(0.001,0.001)) and is stated — report it
    - if the data are overdispersed (variance much greater than mean) the credible interval is too narrow — a flag fires; consider negative-binomial
    - a credible interval is a direct probability statement, NOT a confidence interval
    - the rate-ratio posterior and P(ratio greater than 1) come from fixed-seed Monte-Carlo draws

# ── Full Bayesian regression (PyMC NUTS, MCMC) — bayesian_mcmc.py ──────────────
# Modern PyMC needs no Stan/JAGS compiler; optional + graceful degrade when unavailable.

- id: bayesian_regression
  method: Bayesian linear regression (PyMC)
  domain: statistics
  family: bayesian
  goal: explain
  description: >-
    Full Bayesian linear regression via PyMC NUTS (no compiler needed). Outcome =
    first continuous column, predictors = the remaining numeric columns (config
    outcome/predictors). Weakly-informative Normal priors on the coefficients and a
    HalfNormal on the residual SD; predictors are standardized for stable sampling and
    coefficients are reported back on the raw scale. Reports each coefficient's
    posterior mean and 94% HDI credible interval, a Bayesian R-squared, and the
    convergence diagnostics (max R-hat, min ESS). A credible interval is a direct
    probability statement, not a frequentist confidence interval.
  preconditions:
    min_continuous: 1
    min_rows: 12
  produces:
    - coefficient table (posterior mean, 94% HDI low/high) as CSV
    - ArviZ forest plot of the coefficient posteriors
    - Bayesian R-squared and convergence diagnostics (R-hat, ESS)
  executor_ref: "py::bayesian_regression"
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量列表
      default: 其余数值列
    - name: draws
      type: int
      description: 每链后验抽样数
      default: "1000"
    - name: tune
      type: int
      description: 每链调参(warmup)步数
      default: "1000"
    - name: chains
      type: int
      description: MCMC 链数
      default: "2"
    - name: seed
      type: int
      description: 随机种子(可复现)
      default: "42"
    - name: hdi_prob
      type: float
      description: HDI 可信区间概率(0.5-1)
      default: "0.94"
  biases:
    - a credible interval (HDI) is a direct probability statement, NOT a frequentist confidence interval
    - results depend on the (weakly-informative) priors; the priors are stated and should be reported
    - predictors are standardized for sampling and coefficients back-transformed to the raw scale (a constant rescaling)
    - always check convergence (max R-hat should be near 1.0, ESS adequate) before trusting the posterior
    - Bayesian R-squared is computed at the posterior-mean fit and is descriptive, not a model-selection criterion

- id: bayesian_logistic_regression
  method: Bayesian logistic regression (PyMC)
  domain: statistics
  family: bayesian
  goal: explain
  description: >-
    Full Bayesian logistic regression via PyMC NUTS for a binary outcome. Outcome =
    a binary / two-level column (config outcome), predictors = the remaining numeric
    columns (config predictors). Gelman weakly-informative Normal(0, 2.5) priors on
    the standardized-predictor log-odds coefficients. Reports each predictor's odds
    ratio (posterior, back-transformed to the raw predictor scale) with a 94% HDI
    credible interval, and convergence diagnostics (max R-hat, min ESS). The higher
    outcome level is modelled as the positive class.
  preconditions:
    requires_binary_outcome: true
    min_rows: 12
  produces:
    - odds-ratio table (posterior OR, 94% HDI low/high) as CSV
    - ArviZ forest plot of the posterior log-odds
    - convergence diagnostics (R-hat, ESS)
  executor_ref: "py::bayesian_logistic_regression"
  params:
    - name: outcome
      type: column
      description: 二值结果变量(建模较高水平为阳性)
      default: 第一个二值列
    - name: predictors
      type: columns
      description: 预测变量列表
      default: 其余数值列
    - name: draws
      type: int
      description: 每链后验抽样数
      default: "1000"
    - name: tune
      type: int
      description: 每链调参(warmup)步数
      default: "1000"
    - name: chains
      type: int
      description: MCMC 链数
      default: "2"
    - name: seed
      type: int
      description: 随机种子(可复现)
      default: "42"
    - name: hdi_prob
      type: float
      description: HDI 可信区间概率(0.5-1)
      default: "0.94"
  biases:
    - an odds ratio's HDI is a credible interval (direct probability), NOT a confidence interval
    - the Gelman Normal(0, 2.5) priors are weakly informative on the standardized log-odds scale and are stated
    - odds ratios are back-transformed to the raw predictor scale (OR = exp(beta_std / sd_x))
    - check convergence (R-hat near 1.0, adequate ESS) before interpreting the posterior
    - separation or rare outcomes widen the posterior; consider more data or stronger priors

- id: bayesian_hierarchical
  method: Bayesian hierarchical model (varying intercepts, partial pooling)
  domain: statistics
  family: bayesian
  goal: explain
  description: >-
    Bayesian multilevel (varying-intercept) model via PyMC NUTS — the partial-pooling
    workhorse. Needs a grouping column (config group/unit, else the panel unit column
    or a low-cardinality categorical) plus a continuous outcome (config outcome) and
    an optional within-group predictor (config predictor). Group intercepts are drawn
    from a population Normal(mu_a, sigma_a) with a non-centered parameterization, so
    small groups borrow strength from the population (shrinkage). Reports the
    population mean, between-group and within-group SDs, the intra-class correlation
    (ICC), per-group partial-pooled intercepts vs observed group means, and
    convergence diagnostics.
  preconditions:
    min_continuous: 1
    min_rows: 12
  produces:
    - per-group table (n, observed mean, partial-pooled intercept) as CSV
    - ArviZ forest plot of the group intercepts (shrinkage)
    - population mean, between/within SD, ICC, and convergence diagnostics
  executor_ref: "py::bayesian_hierarchical"
  params:
    - name: group
      type: column
      description: 分组变量(个体/班级/地区等)
      default: 面板单位列或低基数分类列
    - name: unit
      type: column
      description: group 的别名(分组变量)
      default: 同 group
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: predictor
      type: column
      description: 组内连续预测变量(可选,加变截距上的斜率)
      default: 无(仅变截距)
    - name: draws
      type: int
      description: 每链后验抽样数
      default: "1000"
    - name: tune
      type: int
      description: 每链调参(warmup)步数
      default: "1000"
    - name: chains
      type: int
      description: MCMC 链数
      default: "2"
    - name: seed
      type: int
      description: 随机种子(可复现)
      default: "42"
    - name: hdi_prob
      type: float
      description: HDI 可信区间概率(0.5-1)
      default: "0.94"
  biases:
    - partial pooling shrinks group estimates toward the population mean — intended (more stable for small groups), but it is a modelling choice
    - the ICC and variance components depend on the (weakly-informative) priors, which are stated
    - a non-centered parameterization is used for sampling geometry; check convergence (R-hat near 1.0, ESS adequate)
    - this is a varying-INTERCEPT model by default; a single optional predictor adds a population (fixed) slope, not random slopes
    - credible intervals are direct probability statements, not confidence intervals
