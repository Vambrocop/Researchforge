# Multi-criteria evaluation (MCDA) / 综合评价 catalog entries.

- id: topsis
  method: Entropy-weighted TOPSIS (comprehensive evaluation)
  domain: evaluation
  family: mcda
  goal: describe
  description: Rank alternatives (rows) across multiple indicators by their closeness to the ideal-best vs ideal-worst (TOPSIS), with objective entropy weights. Common in agronomy comprehensive evaluation — ranking varieties, treatments, or regions.
  preconditions:
    min_continuous: 2
    min_rows: 3
  produces:
    - ranked closeness scores
    - entropy weights per indicator
  executor_ref: numpy
  biases:
    - assumes every indicator is benefit-type (higher is better) unless told otherwise — cost indicators must be reversed
    - entropy weights reflect data dispersion, not substantive importance
    - scores are relative to the current set of alternatives (adding/removing rows changes ranks)

- id: critic
  method: CRITIC objective-weight evaluation
  domain: evaluation
  family: mcda
  goal: describe
  description: Rank alternatives with CRITIC weights — each indicator's weight combines its contrast (standard deviation) and conflict (1 − correlation with other indicators), a fully objective weighting that, unlike entropy, rewards low-redundancy indicators. Weighted-sum composite + ranking.
  preconditions:
    min_continuous: 2
    min_rows: 3
  produces:
    - CRITIC weights per indicator
    - composite scores and ranking
  executor_ref: numpy
  biases:
    - assumes every indicator is benefit-type (higher is better); cost indicators must be reversed
    - weights reflect dispersion and correlation structure, not substantive importance
    - correlation-based, so sensitive to the set of indicators included

- id: membership_function
  method: Membership-function comprehensive evaluation (隶属函数法)
  domain: evaluation
  family: mcda
  goal: describe
  description: Classic agronomy comprehensive evaluation — min-max membership degree per indicator, then an equal-weight average into a composite score and ranking of alternatives (e.g. crop varieties).
  preconditions:
    min_continuous: 2
    min_rows: 3
  produces:
    - membership matrix
    - composite scores and ranking
  executor_ref: numpy
  biases:
    - assumes every indicator is benefit-type (higher is better); cost indicators must be reversed
    - equal weights treat all indicators as equally important
    - scores are relative to the current set of alternatives

- id: grey_relational
  method: Grey relational analysis (灰色关联分析)
  domain: evaluation
  family: mcda
  goal: describe
  description: Rank alternatives by their grey relational grade to an ideal reference sequence (distinguishing coefficient rho=0.5), on min-max normalised indicators. Robust with small samples — popular in agronomy and resource evaluation.
  preconditions:
    min_continuous: 2
    min_rows: 3
  produces:
    - grey relational grade and ranking
  executor_ref: numpy
  biases:
    - assumes every indicator is benefit-type (higher is better); cost indicators must be reversed
    - the distinguishing coefficient rho (default 0.5) affects the grades
    - scores are relative to the current set of alternatives
