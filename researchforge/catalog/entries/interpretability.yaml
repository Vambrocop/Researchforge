# Interpretability catalog entries — model-agnostic post-hoc explainers for a fitted
# predictive model (sklearn / shap; no R). Each id maps to a @register handler in
# executor/branches/interpretability.py. Family reuses ml (groups with the predictive
# methods these explain). All fit a default tree model on a continuous outcome
# (regression) or a binary outcome (classification); config outcome/predictors override.
#
# NOTE: produces/biases MUST be YAML lists (- lines); only description uses >-.

- id: partial_dependence
  method: Partial dependence (PDP + ICE)
  domain: ml
  family: ml
  goal: explain
  description: >-
    Explain a fitted tree model with Partial Dependence Plots: the marginal effect of
    each feature on the prediction, averaging over the other features
    (sklearn.inspection). Fits a gradient-boosting model (or random forest via config
    model) on the outcome, then computes the PDP for the most influential features (or
    a config-chosen set) and reports the PD range per feature (how much the prediction
    moves across that feature's range). Produces a long PDP table (CSV) and a small-
    multiples PDP plot (PNG). For seeing the SHAPE (linear / threshold / non-monotone)
    of each driver.
  preconditions:
    min_numeric_cols: 2
    min_rows: 30
  produces:
    - partial-dependence curve per explained feature (long CSV)
    - PD range per feature (how strongly it moves the prediction)
    - small-multiples PDP plot (PNG)
  executor_ref: py::partial_dependence
  biases:
    - PDP assumes the plotted feature is INDEPENDENT of the others; with correlated features it extrapolates to unrealistic combinations and is biased (use accumulated_local_effects / ALE instead)
    - it shows an associational marginal effect learned by the model, not a causal effect
    - the result reflects the fitted model (and its bias/variance), not ground truth
    - averaging hides heterogeneity across individuals (ICE curves expose it)
  params:
    - name: outcome
      type: column
      description: 结果变量（连续→回归；二值→分类）
      default: 第一个连续列，否则二值列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值/二值列
    - name: features
      type: columns
      description: 要画 PDP 的特征子集
      default: 模型重要性前 4 个
    - name: model
      type: choice
      choices: [gbm, rf]
      description: 基模型（梯度提升 / 随机森林）
      default: gbm
    - name: grid_resolution
      type: int
      description: PDP 网格点数
      default: "30"

- id: shap_values
  method: SHAP feature attribution
  domain: ml
  family: ml
  goal: explain
  description: >-
    Explain a fitted tree model with SHAP (Shapley Additive exPlanations) via the
    TreeExplainer. Reports global feature importance as the mean absolute SHAP value
    per feature, plus the sign of each feature's average effect (whether larger values
    push the prediction up or down). SHAP values additively decompose every individual
    prediction into a base value plus per-feature contributions, with strong
    game-theoretic consistency guarantees. Fits a gradient-boosting model (or random
    forest via config model). Produces a SHAP importance table (CSV) and a direction-
    coloured importance bar chart (PNG). Degrades honestly if the shap package is absent.
  preconditions:
    min_numeric_cols: 2
    min_rows: 30
  produces:
    - mean(|SHAP|) global importance + effect direction per feature (CSV)
    - model base (expected) value
    - direction-coloured SHAP importance bar chart (PNG)
  executor_ref: py::shap_values
  biases:
    - SHAP explains the MODEL's learned associations (including any bias/confounding it absorbed), not causal effects in the data
    - TreeExplainer uses conditional expectations, so attribution among strongly correlated features can shift between them
    - the explanation is only as trustworthy as the fitted model
    - requires the shap package; absent it the analysis degrades and points to feature-importance / partial_dependence alternatives
  params:
    - name: outcome
      type: column
      description: 结果变量（连续→回归；二值→分类）
      default: 第一个连续列，否则二值列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值/二值列
    - name: model
      type: choice
      choices: [gbm, rf]
      description: 基模型（梯度提升 / 随机森林）
      default: gbm

- id: accumulated_local_effects
  method: Accumulated local effects (ALE)
  domain: ml
  family: ml
  goal: explain
  description: >-
    Explain a fitted tree model with Accumulated Local Effects (Apley & Zhu 2020) — the
    correlation-robust alternative to PDP. ALE divides a feature's range into quantile
    bins, computes the model's LOCAL prediction difference across each bin (replacing the
    feature with the bin edges only for points actually in that bin), averages within the
    bin, accumulates across bins, and centers the curve to mean zero. Because it uses
    only local, in-distribution differences it does NOT extrapolate to unrealistic
    feature combinations the way PDP does under correlation. Fits a gradient-boosting
    model (or random forest via config model) and ALEs the top continuous features (or a
    config set). Produces an ALE table (CSV) and small-multiples ALE plot (PNG).
  preconditions:
    min_numeric_cols: 2
    min_rows: 30
  produces:
    - centered ALE curve per explained feature (long CSV)
    - ALE range per feature (effect magnitude)
    - small-multiples ALE plot (PNG)
  executor_ref: py::accumulated_local_effects
  biases:
    - ALE is robust to correlated features (its advantage over PDP) but the curve is only defined where data exist; sparsely populated bins are noisy
    - it explains the fitted model's associations, not causal effects
    - first-order ALE ignores interactions (a 2-D ALE would be needed to see them)
    - needs reasonably continuous features (enough distinct values to form quantile bins)
  params:
    - name: outcome
      type: column
      description: 结果变量（连续→回归；二值→分类）
      default: 第一个连续列，否则二值列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值/二值列
    - name: features
      type: columns
      description: 要画 ALE 的特征子集（需连续）
      default: 重要性前 4 的连续特征
    - name: model
      type: choice
      choices: [gbm, rf]
      description: 基模型（梯度提升 / 随机森林）
      default: gbm
    - name: n_bins
      type: int
      description: 分位分箱数
      default: "20"

- id: quantile_intervals
  method: Quantile-regression prediction intervals
  domain: ml
  family: ml
  goal: predict
  description: >-
    Distribution-aware prediction intervals from gradient-boosting QUANTILE regression.
    Fits separate GBM quantile regressors at the lower / median / upper quantiles
    (config lower/upper, default 0.05/0.95) and reports the interval per held-out point,
    its mean width, and the EMPIRICAL coverage on the holdout vs the nominal level — so
    you can see whether the model's stated uncertainty is honest. Regression only.
    Produces a per-point interval table (CSV) and a sorted actual-vs-interval band (PNG).
  preconditions:
    min_numeric_cols: 2
    min_rows: 30
  produces:
    - per-point lower/median/upper prediction interval + covered flag (CSV)
    - nominal vs empirical coverage + mean interval width
    - actual-vs-interval band plot (PNG)
  executor_ref: py::quantile_intervals
  biases:
    - quantile-regression intervals are MODEL estimates of conditional quantiles; their validity depends on model fit and there is no distribution-free coverage guarantee (use conformal_prediction for that)
    - quantile crossing is possible; the engine takes min/max of the lower/upper predictions to guard it
    - empirical coverage is measured on a single random holdout (n_test small -> noisy)
    - explains the fitted model's uncertainty, not the true data-generating process
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值列
    - name: model
      type: choice
      choices: [gbm, rf]
      description: 角色解析所用基模型（区间始终由 GBM 分位数回归给出）
      default: gbm
    - name: lower
      type: float
      description: 下分位（0-0.5）
      default: "0.05"
    - name: upper
      type: float
      description: 上分位（0.5-1）
      default: "0.95"

- id: feature_interaction
  method: Feature interaction (Friedman's H)
  domain: ml
  family: ml
  goal: explain
  description: >-
    Quantify pairwise feature INTERACTIONS in a fitted tree model via Friedman's H-statistic:
    H_jk = sqrt( Σ(PD_jk − PD_j − PD_k)² / Σ PD_jk² ) over centered partial-dependence
    functions evaluated at the data points. H≈0 means the two features act additively;
    H near 1 means their joint effect is dominated by interaction. Fits a gradient-boosting
    (or random-forest via config model) model on the outcome, then computes H for the top
    feature pairs (sub-sampled to bound cost). Produces an H table (CSV) and a ranked
    interaction bar chart (PNG).
  preconditions:
    min_numeric_cols: 3
    min_rows: 30
  produces:
    - pairwise Friedman's H-statistic per feature pair (CSV)
    - max H + ranked interaction bar chart (PNG)
  executor_ref: py::feature_interaction
  biases:
    - H is computed from the MODEL's partial dependence (estimated at data points, sub-sampled), so it reflects interactions the model learned, not necessarily causal interactions in the data
    - correlated features make partial dependence extrapolate, which can inflate H
    - H is a relative, unitless measure; compare pairs within a run, not across datasets
    - first-order pairwise H ignores higher-order (3-way+) interactions
  params:
    - name: outcome
      type: column
      description: 结果变量（连续→回归；二值→分类）
      default: 第一个连续列，否则二值列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值/二值列
    - name: model
      type: choice
      choices: [gbm, rf]
      description: 基模型
      default: gbm
    - name: features
      type: columns
      description: 要计算交互的特征子集
      default: 重要性前 4
    - name: sample
      type: int
      description: 计算 PD 的子采样点数
      default: "120"

- id: surrogate_model
  method: Global surrogate model (interpretable tree)
  domain: ml
  family: ml
  goal: explain
  description: >-
    Explain a black-box model by fitting a single shallow, human-readable DECISION TREE
    to mimic the black box's predictions (a global surrogate). Reports the FIDELITY — how
    well the surrogate reproduces the black box (R² for regression, accuracy for
    classification) — the surrogate's feature importances, and the exported tree rules.
    High fidelity means the simple tree can be trusted as an explanation; low fidelity
    means the black box relies on structure the tree cannot capture (do NOT over-simplify).
    Fits a gradient-boosting (or random-forest) black box, then a depth-≤config tree.
  preconditions:
    min_numeric_cols: 2
    min_rows: 30
  produces:
    - surrogate fidelity (R² / accuracy vs the black box)
    - surrogate feature importances (CSV) + exported tree rules (TXT)
    - surrogate decision-tree plot (PNG)
  executor_ref: py::surrogate_model
  biases:
    - the surrogate explains the BLACK-BOX MODEL, not the real data relationships
    - the explanation is trustworthy ONLY when fidelity is high; low fidelity means the tree misrepresents the model
    - a shallow tree necessarily simplifies — interactions/non-linearities beyond its depth are lost
    - fidelity is measured in-sample on the training features
  params:
    - name: outcome
      type: column
      description: 结果变量（连续→回归；二值→分类）
      default: 第一个连续列，否则二值列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值/二值列
    - name: model
      type: choice
      choices: [gbm, rf]
      description: 黑箱基模型
      default: gbm
    - name: max_depth
      type: int
      description: 代理树最大深度（2-6）
      default: "3"
