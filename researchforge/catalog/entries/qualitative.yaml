# Configurational / necessity / qualitative-comparative methods.

- id: fsqca
  method: Fuzzy-set Qualitative Comparative Analysis (fsQCA)
  domain: social science
  family: configurational
  goal: explain
  description: Find configurations (combinations) of conditions that are sufficient for an outcome via fuzzy-set calibration, a truth table, and Boolean minimization (Ragin). Uses the gold-standard R QCA package; reports consistency and coverage. Captures equifinality and conjunctural causation that regression misses.
  preconditions:
    min_continuous: 3
    min_rows: 12
  produces:
    - sufficient configurations (solution)
    - consistency and coverage
  executor_ref: QCA (R)
  biases:
    - results hinge on calibration anchors — the auto percentile anchors (crossover at the median is mechanical) are only a starting point; set them from theory
    - reports the complex solution (no counterfactuals/remainders); parsimonious/intermediate may differ
    - asymmetric causation — explaining Y is not explaining not-Y; sufficiency is not causal proof
    - limited diversity / remainders; sensitive to the consistency cutoff

- id: csqca
  method: Crisp-set QCA (csQCA)
  domain: social science
  family: configurational
  goal: explain
  description: Find combinations of conditions sufficient for an outcome using crisp (0/1) set membership — binary conditions used directly, continuous ones dichotomised at the median — then a truth table and Boolean minimization (Ragin). The dichotomous counterpart to fsQCA.
  preconditions:
    min_continuous: 3
    min_rows: 12
  produces:
    - sufficient configurations (solution)
    - consistency and coverage
  executor_ref: QCA (R)
  biases:
    - median dichotomisation discards information — for continuous conditions fsQCA is usually preferable
    - on skewed/discrete data the median split can be very unbalanced (mass at the median ties to 0), making a condition near-constant
    - the dichotomisation threshold drives the result; set it from theory, not the median by default
    - asymmetric causation; complex solution; sufficiency is not causal proof; sensitive to limited diversity

- id: qca_necessity
  method: QCA necessity analysis (superSubset)
  domain: social science
  family: configurational
  goal: explain
  description: Set-theoretic test of which conditions (or disjunctions) are necessary for an outcome — the outcome is a subset of the condition — using fuzzy calibration and R QCA's superSubset, reporting inclusion (consistency), RoN, and coverage. The set-relational complement to NCA's ceiling logic.
  preconditions:
    min_continuous: 3
    min_rows: 12
  produces:
    - necessary conditions / expressions
    - inclusion (consistency), RoN, coverage
  executor_ref: QCA (R)
  biases:
    - high inclusion but low RoN = trivial necessity (a condition that is almost always high)
    - results hinge on calibration anchors (auto percentile, mechanical crossover)
    - necessity is not sufficiency and not causal proof

- id: nca
  method: Necessary Condition Analysis (NCA)
  domain: social science
  family: configurational
  goal: explain
  description: Identify necessary-but-not-sufficient conditions — a high outcome requires a high level of the condition — via the CE-FDH ceiling line and effect size d (Dul 2016). Complements regression's average-effect logic with bottleneck logic.
  preconditions:
    min_continuous: 2
    min_rows: 20
  produces:
    - effect size d per condition
    - ceiling scatter plots
  executor_ref: numpy
  biases:
    - necessity is not sufficiency and not causal evidence
    - ceiling is sensitive to single upper-left outliers
    - small samples inflate the empty zone and effect size
