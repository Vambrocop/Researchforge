# GIS / spatial catalog entries.

- id: moran_i
  method: Moran's I (spatial autocorrelation)
  domain: gis
  family: spatial
  goal: explain
  description: Test whether a variable is spatially clustered (nearby locations hold similar values) via Moran's I with k-nearest-neighbour, row-standardised weights and a permutation test.
  preconditions:
    requires_geo: true
    min_continuous: 1
    min_rows: 20
  produces:
    - Moran's I statistic
    - permutation p-value
    - Moran scatterplot
  executor_ref: numpy
  biases:
    - result depends on the spatial weights definition (k, distance metric)
    - euclidean distance on lat/lon approximates true geodesic neighbours
    - non-stationarity and edge effects
  params:
    - name: knn_k
      type: int
      description: >-
        k-NN 空间权重的近邻数（行标准化）；越大邻域越平滑。坐标与连续值变量由 profiler 自动识别，无需配置。
      default: 约 √n、上限 8（钳到 [1, n-1]）

- id: kriging
  method: Ordinary kriging (geostatistical interpolation)
  domain: gis
  family: spatial
  goal: predict
  description: Geostatistical interpolation that fits a variogram to the spatial autocorrelation structure, then predicts a value surface by ordinary kriging — unlike IDW it is a best linear unbiased predictor and also yields a kriging-variance (uncertainty) map. Leave-one-out cross-validation RMSE. Uses R gstat.
  preconditions:
    requires_geo: true
    min_continuous: 1
    min_rows: 30
  produces:
    - kriged surface + kriging-variance (uncertainty) map
    - fitted variogram
    - leave-one-out cross-validation RMSE
  executor_ref: gstat (R)
  biases:
    - assumes intrinsic stationarity — a strong spatial trend should be modelled (universal kriging), not ignored
    - the variogram model and its fit drive predictions; the auto-fit may be suboptimal
    - euclidean distance on lat/lon approximates the true geodesic distance

- id: spatial_regression
  method: Spatial regression (SAR / SEM)
  domain: gis
  family: spatial
  goal: explain
  description: Regression that accounts for spatial dependence — tests OLS residuals for spatial autocorrelation, then fits spatial-lag (SAR) and spatial-error (SEM) models on k-nearest-neighbour weights and picks the better by AIC. Goes beyond descriptive Moran/Gi*/LISA to corrected coefficient estimates.
  preconditions:
    requires_geo: true
    min_continuous: 2
    min_rows: 25
  produces:
    - SAR/SEM coefficients
    - residual-autocorrelation diagnostic
    - AIC model comparison
  executor_ref: spdep / spatialreg (R)
  biases:
    - result depends on the spatial weights definition (k, distance metric)
    - SAR vs SEM choice is data-driven (AIC) — confirm against theory
    - euclidean distance on lat/lon approximates true geodesic distance
  params:
    - name: knn_k
      type: int
      description: >-
        k-NN 空间权重的近邻数（行标准化），用于 SAR/SEM 的空间权重矩阵。结果变量/预测变量/经纬度由 profiler 自动识别（第一个连续列为结果），无需配置。
      default: 默认 6（钳到 [1, n-1]）

- id: local_moran
  method: Local Moran's I (LISA)
  domain: gis
  family: spatial
  goal: explain
  description: Decompose global spatial autocorrelation into per-location clusters — high-high / low-low concentrations and high-low / low-high spatial outliers — via Anselin's LISA with conditional-permutation significance.
  preconditions:
    requires_geo: true
    min_continuous: 1
    min_rows: 20
  produces:
    - local Moran's I per location
    - HH/LL/HL/LH cluster classification
    - LISA cluster map
  executor_ref: numpy
  biases:
    - per-location tests are not corrected for multiple comparisons
    - result depends on the spatial weights definition (k, distance metric)
    - cluster labels meaningful only where p < 0.05
  params:
    - name: knn_k
      type: int
      description: >-
        k-NN 空间权重的近邻数（行标准化）；影响每点局部簇判定。坐标与连续值变量由 profiler 自动识别，无需配置。
      default: 约 √n、上限 8（钳到 [1, n-2]）

- id: getis_ord_gi
  method: Getis-Ord Gi* (hotspot analysis)
  domain: gis
  family: spatial
  goal: explain
  description: Locate statistically significant spatial clusters of high values (hotspots) and low values (coldspots) with the Getis-Ord Gi* local z-score and k-nearest-neighbour weights.
  preconditions:
    requires_geo: true
    min_continuous: 1
    min_rows: 20
  produces:
    - Gi* z-score per location
    - hotspot/coldspot classification
    - hotspot map
  executor_ref: numpy
  biases:
    - z-scores not corrected for multiple testing (FDR inflates apparent hotspots)
    - result depends on the spatial weights definition (k, distance metric)
    - euclidean distance on lat/lon approximates true geodesic neighbours
  params:
    - name: knn_k
      type: int
      description: >-
        k-NN 空间权重的近邻数（Gi* 含自身焦点）；影响热点/冷点判定。坐标与连续值变量由 profiler 自动识别，无需配置。
      default: 约 √n、上限 8（钳到 [1, n-2]）
