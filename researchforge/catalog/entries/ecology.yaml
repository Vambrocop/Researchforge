# Ecology catalog entries (ecology wave: Mantel / IndVal / RDA).

- id: mantel_test
  method: Mantel test (distance-matrix correlation)
  domain: ecology
  family: ecology
  goal: explain
  description: Permutation test of the correlation between two distance matrices — e.g. community dissimilarity (Bray-Curtis over species counts) vs environmental/spatial distance (Euclidean over continuous variables). Reports the standardized Mantel r and a permutation p-value.
  preconditions:
    min_count_cols: 2
    min_continuous: 1
    min_rows: 4
  produces:
    - Mantel r
    - permutation p-value
    - distance-distance scatter
  executor_ref: scipy
  params:
    - name: community
      type: columns
      description: 群落（物种计数）列
      default: 计数列
    - name: species
      type: columns
      description: community 的别名
      default: 计数列
    - name: env
      type: columns
      description: 环境/空间变量列
      default: 连续列
    - name: spatial
      type: columns
      description: env 的别名
      default: 连续列
    - name: metric
      type: choice
      choices: [braycurtis, euclidean]
      description: 群落矩阵的距离度量
      default: braycurtis
    - name: corr
      type: choice
      choices: [pearson, spearman]
      description: Mantel 相关类型
      default: pearson
    - name: n_perm
      type: int
      description: 置换次数
      default: "999"
  biases:
    - tests correlation between distance matrices, not causation
    - distance-metric choice (Bray-Curtis vs Euclidean) changes the conclusion
    - distances are non-independent — significance relies on the permutation null, not parametric tests
    - spatial autocorrelation can inflate apparent community-environment association

- id: indicator_species
  method: Indicator species analysis (IndVal)
  domain: ecology
  family: ecology
  goal: explain
  description: Dufrene-Legendre indicator value (IndVal = specificity x fidelity x 100) for each taxon against a grouping variable, with a permutation p-value. Identifies which taxa characterize each group.
  preconditions:
    min_count_cols: 1
    requires_group: true
    min_rows: 6
  produces:
    - per-taxon IndVal / best group / p-value table
    - indicator-value bar chart
  executor_ref: numpy
  params:
    - name: group
      type: column
      description: 分组列
      default: 第一个分组列
    - name: species
      type: columns
      description: 物种/丰度列
      default: 计数列
    - name: abundance
      type: columns
      description: species 的别名
      default: 计数列
    - name: n_perm
      type: int
      description: 置换次数
      default: "999"
  biases:
    - permutation-based — p-values depend on sampling and the permutation null
    - the group definition drives the result (different groupings yield different indicators)
    - descriptive association, not causal — a high IndVal means a taxon both prefers and is common within a group
    - rare taxa and small per-group n give unstable indicator values

- id: rda
  method: Redundancy analysis (constrained ordination)
  domain: ecology
  family: ecology
  goal: explain
  description: Constrained ordination via R vegan::rda — a community matrix constrained by environmental predictors. Reports constrained vs unconstrained variance, global + axis/term significance (anova.cca permutation tests), and a triplot. Optional R bridge (vegan) with honest graceful degrade to nmds / permanova.
  preconditions:
    min_count_cols: 2
    min_continuous: 1
    min_rows: 6
  produces:
    - constrained vs unconstrained variance table
    - global / axis / term significance table
    - RDA triplot
  executor_ref: R vegan
  params:
    - name: community
      type: columns
      description: 群落（物种）矩阵列
      default: 计数列
    - name: species
      type: columns
      description: community 的别名
      default: 计数列
    - name: predictors
      type: columns
      description: 约束的环境预测变量
      default: 连续列
    - name: env
      type: columns
      description: predictors 的别名
      default: 连续列
  biases:
    - linear constrained ordination — assumes a linear species response to gradients; long gradients (unimodal response) prefer CCA
    - constrained-variance fraction inflates with more predictors (overfitting; inspect adjusted R-squared)
    - statistical association, not causal
    - sensitive to predictor scaling and collinearity among environmental variables
