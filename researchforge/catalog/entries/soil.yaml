# Soil science catalog entries.

- id: soil_texture
  method: USDA soil texture classification (质地三角)
  domain: soil
  family: soil
  goal: describe
  description: Classify each soil sample into one of the 12 USDA texture classes (sand … clay) from its sand/silt/clay percentages via the standard texture-triangle boundary rules; rows are renormalised to sum 100%. Outputs per-sample class, a class distribution, and a texture-triangle plot.
  preconditions:
    requires_soil_texture: true
    min_rows: 1
  produces:
    - per-sample USDA texture class
    - class distribution
    - soil texture triangle plot
  executor_ref: numpy
  biases:
    - needs sand/silt/clay as percentages of the fine-earth fraction (gravel excluded); rows auto-renormalised to 100%
    - boundary samples near class edges are sensitive to measurement error
    - USDA system — other systems (ISSS/USDA-old) draw different boundaries

- id: idw_interpolation
  method: IDW spatial interpolation
  domain: soil
  family: spatial
  goal: predict
  description: Interpolate a measured variable (e.g. soil nutrient, pH, organic matter) across space from scattered sample points using inverse-distance weighting, with leave-one-out cross-validated RMSE.
  preconditions:
    requires_geo: true
    min_continuous: 1
    min_rows: 15
  produces:
    - interpolated surface map
    - leave-one-out cross-validation RMSE
  executor_ref: numpy
  biases:
    - smooths toward local sample mean — never predicts beyond the observed range
    - sensitive to the power parameter and to clustered/uneven sampling
    - euclidean distance on lat/lon approximates true geodesic distance
