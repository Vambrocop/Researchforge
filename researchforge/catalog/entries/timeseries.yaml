# Time-series catalog entries.

- id: arima
  method: ARIMA forecast
  domain: time series
  family: time-series
  goal: predict
  description: Fit an ARIMA model to a single time series and forecast future periods.
  preconditions:
    is_timeseries: true
    min_rows: 30
  produces:
    - forecast
    - model summary
  executor_ref: statsmodels
  biases:
    - non-stationarity
    - model-order misspecification

- id: var_granger
  method: VAR + Granger causality
  domain: economics
  family: time-series
  goal: explain
  description: Fit a vector autoregression to multiple time-ordered series (lag chosen by AIC), then test Granger causality for every directed pair (a predictive-causality p-value matrix + heatmap) and produce impulse-response functions. For multivariate macro / eco-environmental series.
  preconditions:
    min_continuous: 2
    min_rows: 30
  produces:
    - VAR lag order
    - Granger causality p-value matrix + heatmap
    - impulse-response functions
  executor_ref: statsmodels
  biases:
    - assumes (weakly) stationary series — non-stationary data yields spurious causality; difference first
    - Granger causality is predictive, not structural / true causality
    - sensitive to the chosen lag order and to omitted variables

- id: cointegration_vecm
  method: Cointegration (Johansen / Engle-Granger) + VECM
  domain: economics
  family: time-series
  goal: explain
  description: For several non-stationary I(1) time series, test whether they share a long-run equilibrium (cointegration) and, if so, fit a vector error-correction model (VECM). Runs the Johansen trace test for the number of cointegrating relations and an Engle-Granger test on the first pair, checks the I(1) precondition with ADF tests on levels and differences, and — when cointegrated — reports the normalized long-run relation (cointegrating vector), the short-run adjustment speeds (alpha), and the (mean-reverting) error-correction term with a plot. For macro / eco-environmental series that drift together (e.g. prices, yields, emissions vs drivers).
  preconditions:
    min_continuous: 2
    min_rows: 30
  produces:
    - Johansen trace test + number of cointegrating relations
    - long-run equilibrium relation (cointegrating vector) + adjustment speeds (VECM)
    - error-correction term plot + ADF stationarity checks
  executor_ref: statsmodels
  biases:
    - requires the series to be I(1) (non-stationary in levels, stationary in first differences) — the engine runs ADF checks and flags violations; I(0) or I(2) series invalidate the analysis
    - the Johansen result is sensitive to the chosen lag order and deterministic-term specification (constant inside vs outside the cointegration)
    - a cointegrating relation is a statistical long-run equilibrium, NOT structural causality; direction/structure needs theory
    - low power in short samples — few observations can miss a true cointegration or find a spurious one

- id: garch
  method: GARCH(1,1) volatility model
  domain: economics
  family: time-series
  goal: explain
  description: Model time-varying volatility (conditional heteroskedasticity / volatility clustering) in a single series with a GARCH(1,1) via the arch package. Reports the ARCH and GARCH coefficients, the volatility persistence (alpha+beta — how long shocks to volatility last), an ARCH-LM test that justifies whether GARCH is needed at all, the unconditional volatility, and a conditional-volatility plot over time. For returns / prices / any series where calm and turbulent periods cluster (finance, commodity prices, climate variability).
  preconditions:
    is_timeseries: true
    min_rows: 50
  produces:
    - GARCH(1,1) coefficients (omega, alpha, beta) + volatility persistence
    - ARCH-LM test for volatility clustering + unconditional volatility
    - conditional-volatility time-series plot
  executor_ref: arch
  biases:
    - models the VARIANCE, not the mean — assumes the mean equation (here a constant) is adequate; a trending/serially-correlated mean should be modelled first (e.g. ARIMA) and GARCH applied to residuals/returns
    - if the ARCH-LM test is not significant there is no volatility clustering and GARCH is unnecessary (the engine flags this)
    - assumes (weak) stationarity; alpha+beta>=1 implies an integrated (IGARCH) process with no finite unconditional variance (flagged)
    - normal innovations by default — fat-tailed financial series may need a Student-t distribution

- id: structural_breaks
  method: Structural break detection (change points, ruptures)
  domain: economics
  family: time-series
  goal: explain
  description: Detect multiple structural breaks (change points in the MEAN level) of a series via the ruptures PELT algorithm with a BIC-style penalty that auto-selects the number of breaks (Bai-Perron style). The noise variance is estimated from first differences (immune to the breaks themselves), and a strong-linear-trend confound is flagged. Reports the break locations (mapped to the time column), the per-segment means/SDs, the largest mean jump, and a plot with break lines and segment levels. For spotting regime shifts / policy or event impacts in macro, environmental, or yield series. Set config value / penalty_mult / n_breaks.
  preconditions:
    is_timeseries: true
    min_rows: 30
  produces:
    - number + locations of structural breaks (change points in the mean)
    - per-segment means/SDs + largest mean jump
    - series plot with break lines and segment levels
  executor_ref: ruptures
  biases:
    - detects MEAN-level shifts only (not changes in slope/trend or variance) — a strong linear trend gets approximated by spurious steps; the engine flags high trend correlation and suggests detrending/differencing first
    - the number of breaks depends on the penalty (config penalty_mult) or a fixed n_breaks — more penalty means fewer breaks
    - break points are data-driven and exploratory — corroborate with known event/policy dates; they are descriptive, not causal
    - needs enough observations per segment (min segment size scales with n) for stable estimates

- id: stl_decomposition
  method: STL seasonal-trend decomposition
  domain: time series
  family: time-series
  goal: explain
  description: Decompose a single series into trend + seasonal + residual components via STL (Seasonal-Trend decomposition using Loess, robust), and quantify how strong the seasonality and trend are (Hyndman seasonal/trend strength F_s, F_t). The seasonal period is auto-detected from the periodogram (peak must stand out and span >=3 cycles) or supplied via config period. Reports the component series (CSV), the strength measures, and a four-panel decomposition plot. For understanding the structure of monthly/quarterly/weekly series before modelling. Descriptive only — not a forecast.
  preconditions:
    is_timeseries: true
    min_rows: 20
  produces:
    - trend / seasonal / residual components (CSV)
    - seasonal strength F_s + trend strength F_t
    - four-panel STL decomposition plot
  executor_ref: statsmodels
  biases:
    - the seasonal period must be correct — auto-detected from the periodogram (verify it), or set config period (monthly=12, quarterly=4, weekly=7); a wrong period gives a meaningless seasonal component (the engine flags weak seasonal strength)
    - STL is a DESCRIPTIVE decomposition, not a forecast or a statistical test
    - assumes a single dominant seasonal period; multiple/changing seasonality is not captured
    - robust fitting reduces but does not remove the influence of outliers / level shifts

- id: ardl_bounds
  method: ARDL bounds test (Pesaran-Shin-Smith) + error-correction
  domain: economics
  family: time-series
  goal: explain
  description: Test for a long-run (level) relationship between a dependent series and one or more regressors using the ARDL bounds-testing approach (Pesaran-Shin-Smith), which — unlike Johansen cointegration — is valid when the variables are a MIX of I(0) and I(1). Auto-selects the ARDL lag orders by AIC, fits the unrestricted error-correction (UECM) form, runs the F bounds test against the I(0)/I(1) critical bounds, and reports the error-correction speed of adjustment and the implied long-run coefficients. For small-sample macro / eco-environmental relationships where you are unsure of the integration orders. Set config outcome / predictors.
  preconditions:
    min_continuous: 2
    min_rows: 30
  produces:
    - bounds-test F statistic vs the I(0)/I(1) critical bounds + verdict
    - error-correction speed of adjustment + long-run coefficients
    - UECM model summary
  executor_ref: statsmodels
  biases:
    - valid for a mix of I(0)/I(1) variables, but breaks down if ANY series is I(2) — difference or check first
    - the bounds test can be INCONCLUSIVE when F falls between the lower (I(0)) and upper (I(1)) bounds — reported honestly, not forced to a verdict
    - sensitive to the chosen lag orders (AIC here) and the deterministic case (case 3 = unrestricted constant)
    - the long-run relationship is a statistical equilibrium, not structural causality; assumes a single dependent variable (regressors weakly exogenous)
