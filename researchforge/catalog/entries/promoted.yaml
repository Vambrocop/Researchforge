- id: xgboost
  method: XGBoost (prediction)
  domain: machine learning
  family: ml
  goal: predict
  description: Gradient-boosted trees for regression (continuous outcome) or classification
    (binary outcome), with feature importances.
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 50
    min_continuous: null
    requires_binary_outcome: null
    requires_group: null
  produces:
  - test-set score
  - feature importances
  executor_ref: xgboost
  biases:
  - not causal (predictive only)
  - overfitting if untuned
- id: pca
  method: Principal component analysis (ordination)
  domain: machine learning
  family: ml
  goal: explore
  description: Unsupervised dimension reduction / ordination over standardized continuous
    features.
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 20
    min_continuous: 3
    requires_binary_outcome: null
    requires_group: null
  produces:
  - explained variance
  - loadings
  - biplot
  executor_ref: scikit-learn
  biases:
  - scale sensitivity
  - linear-structure assumption
- id: mixed_effects
  method: Linear mixed-effects model
  domain: statistics
  family: statistics
  goal: explain
  description: Fixed effects + random effects for grouped / nested / repeated-measures
    data (e.g. split-plot field trials).
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 20
    min_continuous: 1
    requires_binary_outcome: null
    requires_group: true
  produces:
  - fixed-effect estimates
  - variance components
  executor_ref: statsmodels
  biases:
  - random-effects structure misspecification
- id: poisson_regression
  method: Poisson regression (count outcome)
  domain: statistics
  family: statistics
  goal: explain
  description: GLM for non-negative count outcomes (e.g. insect / weed / species counts).
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 20
    min_continuous: null
    requires_binary_outcome: null
    requires_group: null
    requires_count_outcome: true
  produces:
  - rate ratios
  - coefficient table
  executor_ref: statsmodels
  biases:
  - overdispersion (consider negative binomial)
  - excess zeros
- id: negative_binomial_regression
  method: Negative binomial regression (overdispersed counts)
  domain: statistics
  family: statistics
  goal: explain
  description: GLM for overdispersed count outcomes where variance exceeds the mean.
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 30
    min_continuous: null
    requires_binary_outcome: null
    requires_group: null
    requires_count_outcome: true
  produces:
  - rate ratios
  - dispersion estimate
  executor_ref: statsmodels
  biases:
  - model-family choice (Poisson vs NB)
- id: diversity_indices
  method: Ecological diversity indices
  domain: ecology
  family: ecology
  goal: describe
  description: Shannon / Simpson / richness over a site x species abundance matrix.
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 2
    min_continuous: null
    requires_binary_outcome: null
    requires_group: null
    requires_count_outcome: null
    min_count_cols: 2
  produces:
  - per-site diversity table
  executor_ref: numpy
  biases:
  - sampling-effort dependence
- id: beta_diversity
  method: Beta diversity (Bray-Curtis dissimilarity)
  domain: ecology
  family: ecology
  goal: describe
  description: Pairwise Bray-Curtis dissimilarity between sites over a species-abundance
    matrix.
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 2
    min_continuous: null
    requires_binary_outcome: null
    requires_group: null
    requires_count_outcome: null
    min_count_cols: 2
  produces:
  - site x site dissimilarity matrix
  executor_ref: scipy
  biases:
  - sampling-effort dependence
  - abundance weighting
- id: hierarchical_clustering
  method: Hierarchical clustering (Ward)
  domain: machine learning
  family: ml
  goal: explore
  description: Agglomerative clustering of samples over standardized continuous features,
    with a dendrogram.
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 5
    min_continuous: 2
    requires_binary_outcome: null
    requires_group: null
    requires_count_outcome: null
    min_count_cols: null
  produces:
  - cluster assignments
  - dendrogram
  executor_ref: scipy
  biases:
  - linkage choice
  - scale sensitivity
- id: nmds
  method: Non-metric multidimensional scaling (NMDS)
  domain: ecology
  family: ecology
  goal: explore
  description: Ordinate sites into 2D preserving rank dissimilarities (community-ecology
    standard).
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 4
    min_continuous: null
    requires_binary_outcome: null
    requires_group: null
    requires_count_outcome: null
    min_count_cols: 2
  produces:
  - 2D ordination coordinates
  - stress
  executor_ref: scikit-learn
  biases:
  - local minima / stress
  - dimensionality choice
- id: permanova
  method: PERMANOVA (group composition test)
  domain: ecology
  family: ecology
  goal: explain
  description: Permutation test of whether community composition differs between groups
    (distance-based).
  preconditions:
    is_panel: null
    is_timeseries: null
    requires_treatment: null
    requires_time: null
    min_rows: 10
    min_continuous: null
    requires_binary_outcome: null
    requires_group: true
    requires_count_outcome: null
    min_count_cols: 2
  produces:
  - pseudo-F
  - p-value
  executor_ref: numpy
  biases:
  - dispersion heterogeneity (check betadisper)
  - unbalanced groups
