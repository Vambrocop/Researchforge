# Initial agricultural-economics / statistics catalog entries (day-1 core).
# Each maps a feasible analysis to its data preconditions, outputs, executor, biases.

- id: descriptive_stats
  method: Descriptive statistics & Table 1
  domain: economics
  family: statistics
  goal: describe
  description: Summary statistics, distributions, and a descriptive/balance table.
  preconditions:
    min_rows: 1
  produces:
    - Table 1 (descriptives)
  executor_ref: empirical-analysis-python
  biases: []

- id: correlation
  method: Correlation analysis
  domain: economics
  family: statistics
  goal: describe
  description: Pairwise Pearson/Spearman correlations among continuous variables.
  preconditions:
    min_continuous: 2
    min_rows: 5
  produces:
    - correlation matrix
  executor_ref: empirical-analysis-python
  biases:
    - correlation is not causation

- id: ols_regression
  method: OLS regression
  domain: economics
  family: econometrics
  goal: explain
  description: Linear regression of an outcome on covariates, with diagnostics.
  preconditions:
    min_rows: 10
    min_continuous: 1
  produces:
    - regression table
    - coefficient plot
  executor_ref: empirical-analysis-python
  params:
    - name: outcome
      type: column
      description: 结果（因变量）
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量（自变量）
      default: 其余连续/计数/二值列
  biases:
    - omitted variable bias
    - heteroskedasticity

- id: panel_fixed_effects
  method: Panel two-way fixed effects
  domain: economics
  family: econometrics
  goal: explain
  description: Unit and time fixed-effects regression for panel data.
  preconditions:
    is_panel: true
    min_rows: 20
  produces:
    - fixed-effects regression table
  executor_ref: empirical-analysis-python
  params:
    - name: outcome
      type: column
      description: 结果（因变量）
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量（自变量）；单元/时间自动作固定效应
      default: 其余连续/计数/二值列
  biases:
    - time-varying confounders
    - serial correlation

- id: causal_forest
  method: Causal forest (heterogeneous treatment effects, econml)
  domain: economics
  family: causal
  goal: explain
  description: Estimate how a treatment effect VARIES across individuals (conditional average treatment effect, CATE) using econml's CausalForestDML — a causal-forest double-ML estimator. Residualizes outcome and treatment on the covariates, then grows a causal forest over the effect-modifiers. Reports the overall ATE + CI, the CATE distribution, the share of individuals with a significant effect, which covariates drive heterogeneity (feature importances), and CATE plots. Complements double_ml (which gives only the average effect).
  preconditions:
    requires_treatment: true
    min_rows: 200
  produces:
    - overall ATE + 95% CI
    - CATE distribution + share with significant effect
    - heterogeneity drivers (feature importances) + CATE plots
  executor_ref: econml
  params:
    - name: treatment
      type: column
      description: 处理变量
      default: 第一个二值列
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: effect_modifiers
      type: columns
      description: 异质性效应调节变量（CATE 维度）
      default: 其余数值列
    - name: controls
      type: columns
      description: 控制变量（用于残差化）
      default: 其余数值列
    - name: predictors
      type: columns
      description: controls 的别名
      default: 其余数值列
    - name: n_folds
      type: int
      description: 交叉拟合折数
      default: "5"
    - name: seed
      type: int
      description: 随机种子
      default: 固定种子
    - name: fdr_method
      type: choice
      choices: [fdr_bh, fdr_by]
      description: 多重检验校正方法
      default: fdr_bh
  biases:
    - same causal assumptions as DML — unconfoundedness + overlap; not auto-satisfied
    - CATE is exploratory — subgroup / effect-modifier findings risk false positives and need pre-registration or external validation
    - the per-individual significant share is reported both uncorrected AND BH/FDR-corrected; the corrected share assumes positive/independent dependence among the CATE tests (use config fdr_method=fdr_by for an arbitrary-dependence, more conservative guarantee)
    - ML forest + cross-fitting add randomness (seed-pinned); needs a fairly large sample for stable heterogeneity

- id: double_ml
  method: Double / debiased machine learning (DML, doubleml)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the average treatment effect (ATE) of a treatment on an outcome while flexibly controlling for many (possibly nonlinear) confounders, using machine-learning nuisance models (outcome + treatment/propensity) with Neyman-orthogonal moments and cross-fitting (Chernozhukov et al.). Binary treatment uses the interactive regression model (IRM, a fully nonparametric ATE); continuous treatment uses the partially-linear model (PLR). RandomForest learners. Reports ATE + robust 95% CI and a propensity-overlap check.
  preconditions:
    requires_treatment: true
    min_rows: 100
  produces:
    - ATE + 95% CI (orthogonal, cross-fitted)
    - propensity-overlap warning
    - ATE point + CI plot
  executor_ref: doubleml
  params:
    - name: treatment
      type: column
      description: 处理变量
      default: 第一个二值列
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: controls
      type: columns
      description: 控制变量（混杂）
      default: 其余数值列
    - name: predictors
      type: columns
      description: controls 的别名
      default: 其余数值列
    - name: n_folds
      type: int
      description: 交叉拟合折数
      default: "5"
    - name: seed
      type: int
      description: 随机种子
      default: 固定种子
  biases:
    - causal ATE only under unconfoundedness (all confounders measured + included as controls) and overlap/positivity — not auto-satisfied
    - treatment auto-detected as a binary column / set via config treatment; controls default to the other numeric columns
    - ML nuisance fits + cross-fitting add randomness; near-0/1 propensities (poor overlap) make the ATE unstable (flagged)

- id: psm
  method: Propensity score matching (PSM, ATT)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the average treatment effect on the treated (ATT) of a binary treatment by matching each treated unit to a control with a similar propensity score — logistic propensity on covariates, greedy 1:1 nearest-neighbor on the logit linear predictor within a 0.2σ caliper. Reports ATT + SE/p, covariate balance (standardized mean differences before/after matching), common-support overlap, and a propensity overlap plot. Set config treatment/outcome/covariates.
  preconditions:
    requires_treatment: true
    min_rows: 30
  produces:
    - ATT estimate + SE / p-value
    - covariate balance table (SMD before vs after matching)
    - propensity overlap (common support) plot
  executor_ref: statsmodels
  params:
    - name: treatment
      type: column
      description: 二值处理变量
      default: 第一个二值列
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: covariates
      type: columns
      description: 倾向得分协变量
      default: 其余数值列
  biases:
    - causal ATT only under ignorability / selection-on-observables (no unobserved confounding) — untestable; PSM cannot fix unobserved confounding
    - estimates ATT (effect on the treated), not the ATE; requires common support + post-matching balance (both reported)
    - treatment auto-detected as a binary column / set via config; covariates default to the other numeric columns
    - SE is a simple paired-difference estimate (ignores propensity-estimation uncertainty; Abadie-Imbens variance is stricter)

- id: ipw
  method: Inverse-probability weighting (IPW, ATE)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the average treatment effect (ATE) of a binary treatment by reweighting units by the inverse of their treatment propensity (stabilized weights), then fitting a marginal structural model (WLS of outcome on treatment, HC1 robust SE). Reports ATE + SE/p, effective sample size and max weight (positivity diagnostics), extreme-propensity fraction, and a propensity overlap plot. Set config treatment/outcome/covariates.
  preconditions:
    requires_treatment: true
    min_rows: 30
  produces:
    - ATE estimate + HC1 robust SE / p-value
    - positivity diagnostics (effective sample size, max weight, extreme-propensity fraction)
    - propensity overlap plot
  executor_ref: statsmodels
  params:
    - name: treatment
      type: column
      description: 二值处理变量
      default: 第一个二值列
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: covariates
      type: columns
      description: 倾向得分协变量
      default: 其余数值列
  biases:
    - causal ATE only under ignorability (no unobserved confounding) AND positivity/overlap (propensities away from 0/1) — both untestable / flagged
    - extreme weights from poor overlap inflate variance and bias; effective sample size + extreme-propensity fraction are reported
    - treatment auto-detected as a binary column / set via config; covariates default to the other numeric columns
    - HC1 SE ignores propensity-estimation uncertainty (bootstrap / sandwich variance is stricter)

- id: event_study
  method: Event-study (dynamic difference-in-differences)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the dynamic treatment effects of a treatment onset in panel data — coefficients on event-time (periods relative to treatment) with unit and time two-way fixed effects, SE clustered by unit, and the period before treatment (k=-1) as the omitted reference. Reports the event-study coefficient plot (leads test pre-trends, lags trace the dynamic effect), the post-treatment average effect, and a pre-trends flag. Set config unit/time/treatment/outcome (+ window).
  preconditions:
    is_panel: true
    requires_treatment: true
    min_rows: 40
  produces:
    - event-study coefficients (leads + lags) with 95% CI + plot
    - pre-trends check (are pre-treatment leads ≈ 0?)
    - post-treatment average effect
  executor_ref: statsmodels
  params:
    - name: unit
      type: column
      description: 单元（个体）标识列
      default: 面板单元列
    - name: time
      type: column
      description: 时间列
      default: 面板时间列
    - name: treatment
      type: column
      description: 处理指示列（处理开启）
      default: 第一个二值列
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: window
      type: int
      description: 事件时间窗口（相对处理的前后期数）
      default: 自动（数据可及范围）
  biases:
    - identification rests on parallel trends — the pre-treatment lead coefficients are reported as a check, not a proof
    - with staggered onset, two-way fixed effects can be biased under heterogeneous effects (negative weighting) — use Callaway-Sant'Anna / de Chaisemartin
    - never-treated / not-yet-treated units are the comparison group; treatment must switch on within units over time
    - the post-treatment "average effect" is a descriptive mean of lag coefficients, not a formally weighted ATT
    - SE clustered by unit; the reference period is k=-1 (or the earliest available lead)

- id: staggered_did
  method: Staggered DiD — Sun-Abraham interaction-weighted estimator
  domain: economics
  family: causal
  goal: explain
  description: Heterogeneity-robust difference-in-differences for STAGGERED treatment adoption (units treated at different times). The pooled two-way-fixed-effects event study is biased when treatment effects vary across cohorts or over time (already-treated units act as "bad" controls, producing negative weights). The Sun & Abraham (2021) interaction-weighted estimator fixes this by fitting cohort-specific event-study coefficients CATT(g,e) via a saturated cohort x relative-time interaction (period k=-1 omitted, never-treated units as the clean control), then aggregates ATT(e) = Σ_g (cohort share) x CATT(g,e). Reports the event-study IW-ATT path + plot, an overall post-treatment ATT with delta-method SE, and a pre-trends check. Pure Python (statsmodels); no R needed. Set config unit/time/treatment/outcome (+ window).
  preconditions:
    is_panel: true
    requires_treatment: true
    min_rows: 60
  produces:
    - interaction-weighted event-study ATT(e) (leads + lags) with 95% CI + plot
    - overall post-treatment ATT + delta-method SE (cluster-robust)
    - pre-trends check + cohort / treated / never-treated counts
  executor_ref: statsmodels
  params:
    - name: unit
      type: column
      description: 单元（个体）标识列
      default: 面板单元列
    - name: time
      type: column
      description: 时间列
      default: 面板时间列
    - name: treatment
      type: column
      description: 处理指示列
      default: 第一个二值列
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: window
      type: int
      description: 事件时间窗口（相对处理的前后期数）
      default: 自动（数据可及范围）
  biases:
    - requires a never-treated control group — if every unit is eventually treated the engine fails honestly and points to R did (Callaway-Sant'Anna, which can use not-yet-treated controls)
    - identification still rests on parallel trends — the pre-treatment lead ATTs are reported as a check, not a proof; assumes no anticipation
    - the overall ATT is a simple average of post-period event-study ATTs (not observation-weighted); endpoints (±window) are binned cumulative periods
    - SE via delta method on the unit-clustered covariance; few cohorts or small cohorts make CATT(g,e) and the aggregate noisy

- id: changes_in_changes
  method: Changes-in-changes (distributional DID, qte)
  domain: economics
  family: causal
  goal: explain
  description: A distributional generalization of difference-in-differences (Athey & Imbens 2006) for a treated vs control group over two periods. Instead of just a mean effect it estimates quantile treatment effects (QTE) across the whole outcome distribution plus the overall ATT, relaxing parallel-trends to a monotonicity / rank-invariance assumption. Uses R qte::CiC with bootstrap inference; reports the QTE-by-quantile curve. Treated group / time / periods come from a treatment indicator + time column or config.
  preconditions:
    requires_treatment: true
    requires_time: true
    min_rows: 100
  produces:
    - overall ATT + 95% CI
    - quantile treatment effects (QTE) across the distribution + CIs
    - QTE-by-quantile plot
  executor_ref: qte
  params:
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: treatment
      type: column
      description: 处理组指示列（二值）
      default: 第一个二值列
    - name: time
      type: column
      description: 时间列（两期，数值）
      default: 时间列
    - name: periods
      type: str
      description: 前后两期 [pre, post] 的时间取值
      default: 最后两个不同的时间值
    - name: probs
      type: str
      description: 分位点列表（0-1）
      default: "0.1, 0.2, …, 0.9"
    - name: treated_group
      type: str
      description: 处理组在指示列中的取值（决定符号方向）
      default: "{0,1} 约定或字典序（披露方向）"
  biases:
    - needs a treated-group indicator + a numeric 2-period time column (group coding auto-normalized to 0/1; verify the direction)
    - relaxes parallel-trends to monotonicity / rank-invariance of the outcome — still assumes no anticipation and stable group composition
    - bootstrap SEs; small groups or few mass points make the tails / QTE unstable

- id: rdd
  method: Regression discontinuity design (RDD, rdrobust)
  domain: economics
  family: causal
  goal: explain
  description: Sharp regression discontinuity — estimates the causal jump in an outcome at a cutoff of a continuous running/assignment variable (e.g. a test score, age, or eligibility threshold), where treatment switches on. Uses rdrobust (Calonico-Cattaneo-Titiunik) local-linear estimation with an MSE-optimal bandwidth and robust bias-corrected confidence intervals, plus a binned RD plot. The running variable and cutoff are design-specific and supplied via config.
  preconditions:
    min_continuous: 2
    min_rows: 100
  produces:
    - RD effect (local treatment effect) + robust 95% CI
    - MSE-optimal bandwidth + effective sample size
    - binned RD plot
  executor_ref: rdrobust
  params:
    - name: running
      type: column
      description: 驱动/分配变量（连续）
      default: 无（需用户指定）
    - name: running_var
      type: column
      description: running 的别名
      default: 无（需用户指定）
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: cutoff
      type: float
      description: 断点阈值
      default: "0"
  biases:
    - requires config running (assignment variable) + cutoff — the engine cannot infer the design
    - sharp design only — assumes treatment probability jumps 0 to 1 at the cutoff (full compliance); a fuzzy threshold (take-up < 100%) needs fuzzy RDD (not enabled) or the estimate is biased
    - identifies only a LOCAL effect at the cutoff (limited external validity away from it)
    - assumes potential-outcome means are continuous at the cutoff (no other policy/confounder jumps there) and the running variable cannot be precisely manipulated (run a McCrary density / sorting test)

- id: fuzzy_rdd
  method: Fuzzy regression discontinuity design (fuzzy RDD, rdrobust)
  domain: economics
  family: causal
  goal: explain
  description: Fuzzy regression discontinuity — when crossing the cutoff of a continuous running variable only CHANGES THE PROBABILITY of treatment (take-up < 100%, e.g. an eligibility threshold that nudges but does not force enrollment), estimates the local average treatment effect (LATE) for compliers as (outcome jump) / (treatment-probability jump) at the cutoff. Uses rdrobust local-linear estimation with MSE-optimal bandwidth and robust bias-corrected inference, reports the first-stage treatment-probability jump (a weak first stage makes the LATE unreliable), and writes a binned RD plot. Running variable, cutoff, and the actually-received treatment column are design-specific and supplied via config.
  preconditions:
    min_continuous: 2
    min_rows: 100
  produces:
    - fuzzy LATE (complier local treatment effect) + robust 95% CI
    - first-stage treatment-probability jump at the cutoff (weak-instrument check)
    - MSE-optimal bandwidth + effective sample size + binned RD plot
  executor_ref: rdrobust
  params:
    - name: running
      type: column
      description: 驱动/分配变量（连续）
      default: 无（需用户指定）
    - name: running_var
      type: column
      description: running 的别名
      default: 无（需用户指定）
    - name: treatment
      type: column
      description: 实际接受的处理列（0/1）
      default: 无（需用户指定）
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: cutoff
      type: float
      description: 断点阈值
      default: "0"
  biases:
    - requires config running (assignment variable) + cutoff + treatment (the actually-received 0/1 treatment) — the engine cannot infer the design
    - LATE identifies the effect ONLY for compliers local to the cutoff (limited external validity)
    - relies on a real first-stage jump in treatment probability at the cutoff — a weak first stage makes the LATE severely unstable (the engine flags this)
    - assumes potential outcomes AND the first stage are continuous at the cutoff (no other policy/confounder jumps there) and the running variable cannot be precisely manipulated (run a McCrary density / sorting test)

- id: gsynth
  method: Generalized synthetic control (interactive fixed effects)
  domain: economics
  family: causal
  goal: explain
  description: Generalized synthetic control (Xu 2017) — estimates the average treatment effect on treated units via an interactive fixed-effects counterfactual (latent factors x loadings), handling MULTIPLE treated units and staggered adoption that the classic single-treated synthetic control cannot. The number of latent factors is chosen by cross-validation; inference via parametric bootstrap. Reports the overall ATT + CI, the number of factors, and a dynamic-ATT plot. Needs panel data + a 0/1 treatment indicator.
  preconditions:
    is_panel: true
    requires_treatment: true
    requires_time: true
    min_rows: 100
  produces:
    - average ATT + 95% CI (interactive fixed effects)
    - number of latent factors (CV) + treated/control counts
    - dynamic ATT-by-time plot
  executor_ref: gsynth
  params:
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: treatment
      type: column
      description: 处理指示列（0/1，1=该期受处理）
      default: 第一个二值列
    - name: nboots
      type: int
      description: 参数自助次数（推断）
      default: "200"
    - name: seed
      type: int
      description: 随机种子
      default: 固定种子
  biases:
    - treatment must be a 0/1 indicator (1 = that unit is under treatment that period); set config treatment if auto-detect is wrong
    - assumes time-varying confounding is captured by a low-dimensional factor structure and donor units are unaffected by spillovers
    - cross-validated factor count + bootstrap inference add randomness; seed-pinned, but in SMALL samples the CV-chosen factor count (and hence the ATT) can be seed-sensitive — check robustness across seeds
    - needs enough control units (>=5) and sufficient pre-treatment periods per treated unit (gsynth silently drops treated units with <5 pre-periods; disclosed when it happens)

- id: synthetic_control
  method: Synthetic control method (Abadie)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the effect of an intervention on a single treated unit by building a "synthetic" counterfactual — a weighted average of untreated donor units that best matches the treated unit's pre-intervention outcome path. The post-intervention gap (treated minus synthetic) is the treatment effect (ATT). Reports donor weights, ATT, pre-treatment fit (RMSPE), and a gaps plot. Treated unit / intervention time come from a treatment indicator column or config.
  preconditions:
    is_panel: true
    requires_treatment: true
    requires_time: true
    min_rows: 30
  produces:
    - donor weights (synthetic counterfactual)
    - ATT (post-intervention gap)
    - pre-treatment RMSPE (fit quality)
    - gaps plot
  executor_ref: pysyncon
  params:
    - name: outcome
      type: column
      description: 结果变量
      default: 第一个连续列
    - name: treated_unit
      type: str
      description: 处理单元的取值（单元列中的标签）
      default: 由处理列推断
    - name: treatment_time
      type: str
      description: 干预开始的时间取值
      default: 由处理列推断
    - name: predictors
      type: columns
      description: 用于匹配预处理路径的预测变量
      default: 其余连续列
  biases:
    - one treated unit only; treated unit / intervention time auto-detected from the treatment column or set via config
    - validity hinges on close pre-treatment fit (low RMSPE) and donors not themselves affected by the intervention
    - the built-in SE is approximate — credible inference needs placebo (in-space / in-time) tests, not yet automated

- id: did
  method: Difference-in-differences / event study
  domain: economics
  family: causal
  goal: explain
  description: Exploit a treatment that switches on over time across units.
  preconditions:
    is_panel: true
    requires_treatment: true
    requires_time: true
    min_rows: 20
  produces:
    - DID estimate
    - event-study plot
  executor_ref: empirical-analysis-python
  params:
    - name: outcome
      type: column
      description: 结果（因变量）
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量；处理与单元/时间固定效应自动加入
      default: 自动（处理候选 + 单元/时间固定效应）
  biases:
    - parallel-trends violation
    - anticipation effects

- id: iv_regression
  method: Instrumental variables (2SLS)
  domain: economics
  family: causal
  goal: explain
  description: Two-stage least squares to address endogeneity using an instrument.
  preconditions:
    min_rows: 30
    min_continuous: 1
  produces:
    - IV / 2SLS table
    - first-stage diagnostics
  executor_ref: empirical-analysis-python
  biases:
    - weak instrument
    - exclusion-restriction violation
