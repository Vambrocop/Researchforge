# Initial agricultural-economics / statistics catalog entries (day-1 core).
# Each maps a feasible analysis to its data preconditions, outputs, executor, biases.

- id: descriptive_stats
  method: Descriptive statistics & Table 1
  domain: economics
  family: statistics
  goal: describe
  description: Summary statistics, distributions, and a descriptive/balance table.
  preconditions:
    min_rows: 1
  produces:
    - Table 1 (descriptives)
  executor_ref: empirical-analysis-python
  biases: []

- id: correlation
  method: Correlation analysis
  domain: economics
  family: statistics
  goal: describe
  description: Pairwise Pearson/Spearman correlations among continuous variables.
  preconditions:
    min_continuous: 2
    min_rows: 5
  produces:
    - correlation matrix
  executor_ref: empirical-analysis-python
  biases:
    - correlation is not causation

- id: ols_regression
  method: OLS regression
  domain: economics
  family: econometrics
  goal: explain
  description: Linear regression of an outcome on covariates, with diagnostics.
  preconditions:
    min_rows: 10
    min_continuous: 1
  produces:
    - regression table
    - coefficient plot
  executor_ref: empirical-analysis-python
  biases:
    - omitted variable bias
    - heteroskedasticity

- id: panel_fixed_effects
  method: Panel two-way fixed effects
  domain: economics
  family: econometrics
  goal: explain
  description: Unit and time fixed-effects regression for panel data.
  preconditions:
    is_panel: true
    min_rows: 20
  produces:
    - fixed-effects regression table
  executor_ref: empirical-analysis-python
  biases:
    - time-varying confounders
    - serial correlation

- id: causal_forest
  method: Causal forest (heterogeneous treatment effects, econml)
  domain: economics
  family: causal
  goal: explain
  description: Estimate how a treatment effect VARIES across individuals (conditional average treatment effect, CATE) using econml's CausalForestDML — a causal-forest double-ML estimator. Residualizes outcome and treatment on the covariates, then grows a causal forest over the effect-modifiers. Reports the overall ATE + CI, the CATE distribution, the share of individuals with a significant effect, which covariates drive heterogeneity (feature importances), and CATE plots. Complements double_ml (which gives only the average effect).
  preconditions:
    requires_treatment: true
    min_rows: 200
  produces:
    - overall ATE + 95% CI
    - CATE distribution + share with significant effect
    - heterogeneity drivers (feature importances) + CATE plots
  executor_ref: econml
  biases:
    - same causal assumptions as DML — unconfoundedness + overlap; not auto-satisfied
    - CATE is exploratory — subgroup / effect-modifier findings risk false positives and need pre-registration or external validation
    - ML forest + cross-fitting add randomness (seed-pinned); needs a fairly large sample for stable heterogeneity

- id: double_ml
  method: Double / debiased machine learning (DML, doubleml)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the average treatment effect (ATE) of a treatment on an outcome while flexibly controlling for many (possibly nonlinear) confounders, using machine-learning nuisance models (outcome + treatment/propensity) with Neyman-orthogonal moments and cross-fitting (Chernozhukov et al.). Binary treatment uses the interactive regression model (IRM, a fully nonparametric ATE); continuous treatment uses the partially-linear model (PLR). RandomForest learners. Reports ATE + robust 95% CI and a propensity-overlap check.
  preconditions:
    requires_treatment: true
    min_rows: 100
  produces:
    - ATE + 95% CI (orthogonal, cross-fitted)
    - propensity-overlap warning
    - ATE point + CI plot
  executor_ref: doubleml
  biases:
    - causal ATE only under unconfoundedness (all confounders measured + included as controls) and overlap/positivity — not auto-satisfied
    - treatment auto-detected as a binary column / set via config treatment; controls default to the other numeric columns
    - ML nuisance fits + cross-fitting add randomness; near-0/1 propensities (poor overlap) make the ATE unstable (flagged)

- id: changes_in_changes
  method: Changes-in-changes (distributional DID, qte)
  domain: economics
  family: causal
  goal: explain
  description: A distributional generalization of difference-in-differences (Athey & Imbens 2006) for a treated vs control group over two periods. Instead of just a mean effect it estimates quantile treatment effects (QTE) across the whole outcome distribution plus the overall ATT, relaxing parallel-trends to a monotonicity / rank-invariance assumption. Uses R qte::CiC with bootstrap inference; reports the QTE-by-quantile curve. Treated group / time / periods come from a treatment indicator + time column or config.
  preconditions:
    requires_treatment: true
    requires_time: true
    min_rows: 100
  produces:
    - overall ATT + 95% CI
    - quantile treatment effects (QTE) across the distribution + CIs
    - QTE-by-quantile plot
  executor_ref: qte
  biases:
    - needs a treated-group indicator + a numeric 2-period time column (group coding auto-normalized to 0/1; verify the direction)
    - relaxes parallel-trends to monotonicity / rank-invariance of the outcome — still assumes no anticipation and stable group composition
    - bootstrap SEs; small groups or few mass points make the tails / QTE unstable

- id: rdd
  method: Regression discontinuity design (RDD, rdrobust)
  domain: economics
  family: causal
  goal: explain
  description: Sharp regression discontinuity — estimates the causal jump in an outcome at a cutoff of a continuous running/assignment variable (e.g. a test score, age, or eligibility threshold), where treatment switches on. Uses rdrobust (Calonico-Cattaneo-Titiunik) local-linear estimation with an MSE-optimal bandwidth and robust bias-corrected confidence intervals, plus a binned RD plot. The running variable and cutoff are design-specific and supplied via config.
  preconditions:
    min_continuous: 2
    min_rows: 100
  produces:
    - RD effect (local treatment effect) + robust 95% CI
    - MSE-optimal bandwidth + effective sample size
    - binned RD plot
  executor_ref: rdrobust
  biases:
    - requires config running (assignment variable) + cutoff — the engine cannot infer the design
    - sharp design only — assumes treatment probability jumps 0 to 1 at the cutoff (full compliance); a fuzzy threshold (take-up < 100%) needs fuzzy RDD (not enabled) or the estimate is biased
    - identifies only a LOCAL effect at the cutoff (limited external validity away from it)
    - assumes potential-outcome means are continuous at the cutoff (no other policy/confounder jumps there) and the running variable cannot be precisely manipulated (run a McCrary density / sorting test)

- id: gsynth
  method: Generalized synthetic control (interactive fixed effects)
  domain: economics
  family: causal
  goal: explain
  description: Generalized synthetic control (Xu 2017) — estimates the average treatment effect on treated units via an interactive fixed-effects counterfactual (latent factors x loadings), handling MULTIPLE treated units and staggered adoption that the classic single-treated synthetic control cannot. The number of latent factors is chosen by cross-validation; inference via parametric bootstrap. Reports the overall ATT + CI, the number of factors, and a dynamic-ATT plot. Needs panel data + a 0/1 treatment indicator.
  preconditions:
    is_panel: true
    requires_treatment: true
    requires_time: true
    min_rows: 100
  produces:
    - average ATT + 95% CI (interactive fixed effects)
    - number of latent factors (CV) + treated/control counts
    - dynamic ATT-by-time plot
  executor_ref: gsynth
  biases:
    - treatment must be a 0/1 indicator (1 = that unit is under treatment that period); set config treatment if auto-detect is wrong
    - assumes time-varying confounding is captured by a low-dimensional factor structure and donor units are unaffected by spillovers
    - cross-validated factor count + bootstrap inference add randomness; seed-pinned, but in SMALL samples the CV-chosen factor count (and hence the ATT) can be seed-sensitive — check robustness across seeds
    - needs enough control units (>=5) and sufficient pre-treatment periods per treated unit (gsynth silently drops treated units with <5 pre-periods; disclosed when it happens)

- id: synthetic_control
  method: Synthetic control method (Abadie)
  domain: economics
  family: causal
  goal: explain
  description: Estimate the effect of an intervention on a single treated unit by building a "synthetic" counterfactual — a weighted average of untreated donor units that best matches the treated unit's pre-intervention outcome path. The post-intervention gap (treated minus synthetic) is the treatment effect (ATT). Reports donor weights, ATT, pre-treatment fit (RMSPE), and a gaps plot. Treated unit / intervention time come from a treatment indicator column or config.
  preconditions:
    is_panel: true
    requires_treatment: true
    requires_time: true
    min_rows: 30
  produces:
    - donor weights (synthetic counterfactual)
    - ATT (post-intervention gap)
    - pre-treatment RMSPE (fit quality)
    - gaps plot
  executor_ref: pysyncon
  biases:
    - one treated unit only; treated unit / intervention time auto-detected from the treatment column or set via config
    - validity hinges on close pre-treatment fit (low RMSPE) and donors not themselves affected by the intervention
    - the built-in SE is approximate — credible inference needs placebo (in-space / in-time) tests, not yet automated

- id: did
  method: Difference-in-differences / event study
  domain: economics
  family: causal
  goal: explain
  description: Exploit a treatment that switches on over time across units.
  preconditions:
    is_panel: true
    requires_treatment: true
    requires_time: true
    min_rows: 20
  produces:
    - DID estimate
    - event-study plot
  executor_ref: empirical-analysis-python
  biases:
    - parallel-trends violation
    - anticipation effects

- id: iv_regression
  method: Instrumental variables (2SLS)
  domain: economics
  family: causal
  goal: explain
  description: Two-stage least squares to address endogeneity using an instrument.
  preconditions:
    min_rows: 30
    min_continuous: 1
  produces:
    - IV / 2SLS table
    - first-stage diagnostics
  executor_ref: empirical-analysis-python
  biases:
    - weak instrument
    - exclusion-restriction violation
