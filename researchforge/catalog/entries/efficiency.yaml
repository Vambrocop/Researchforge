# Efficiency / productivity catalog entries.

- id: dea
  method: Data Envelopment Analysis (DEA, CCR/BCC)
  domain: economics
  family: efficiency
  goal: explain
  description: Measure the relative technical efficiency of decision-making units (rows — e.g. farms, regions) that convert inputs into outputs, via input-oriented CCR (constant returns) and BCC (variable returns) frontier LPs; scale efficiency = CCR/BCC. Foundation for Malmquist TFP.
  preconditions:
    min_continuous: 2
    min_rows: 4
  produces:
    - CCR / BCC / scale efficiency scores
    - efficiency ranking
  executor_ref: scipy
  params:
    - name: inputs
      type: columns
      description: 投入指标列
      default: 除第一列外的数值列
    - name: outputs
      type: columns
      description: 产出指标列
      default: 第一个数值列
  biases:
    - input/output designation is assumed (first numeric column = output, the rest = inputs) — verify it matches reality
    - deterministic frontier (no noise) — outliers / measurement error are read as "efficient"; SFA is the stochastic alternative
    - efficiency is relative to this sample and inflates with few DMUs; needs strictly positive inputs and outputs

- id: sfa
  method: Stochastic Frontier Analysis (SFA)
  domain: economics
  family: efficiency
  goal: explain
  description: Parametric production-frontier model that separates technical inefficiency from random noise (composed error v − u), estimating a Cobb-Douglas frontier by maximum likelihood plus per-unit technical efficiency. The stochastic counterpart to DEA's deterministic frontier. Uses the R frontier package.
  preconditions:
    min_continuous: 2
    min_rows: 30
  produces:
    - frontier elasticities
    - technical efficiency per unit
    - inefficiency variance ratio gamma = sigma_u^2/(sigma_u^2+sigma_v^2) + one-sided LR test of no inefficiency
  executor_ref: frontier (R)
  params:
    - name: inputs
      type: columns
      description: 投入指标列
      default: 除第一列外的数值列
    - name: outputs
      type: columns
      description: 产出指标列
      default: 第一个数值列
  biases:
    - assumes a functional form (Cobb-Douglas, logs) and a half-normal inefficiency distribution
    - needs strictly positive inputs/outputs and a moderate sample for stable ML
    - first numeric column assumed output, the rest inputs

- id: malmquist
  method: Malmquist productivity index (TFP change)
  domain: economics
  family: efficiency
  goal: explain
  description: Decompose total factor productivity (TFP) change between two periods for each panel unit into efficiency change (catch-up) and technical change (frontier shift), via CRS DEA distance functions (Färe et al. 1994). Index > 1 means productivity growth.
  preconditions:
    is_panel: true
    min_continuous: 2
    min_rows: 6
  produces:
    - per-unit Malmquist TFP index
    - efficiency-change / technical-change decomposition
  executor_ref: scipy
  params:
    - name: inputs
      type: columns
      description: 投入指标列
      default: 除第一列外的数值列
    - name: outputs
      type: columns
      description: 产出指标列
      default: 第一个数值列
    - name: periods
      type: str
      description: 比较的起止两期 [start, end]
      default: 首期 vs 末期
  biases:
    - input/output designation is assumed (first numeric column = output, rest = inputs)
    - deterministic frontier (no noise); sensitive to outliers and to having few units
    - uses first vs last period; needs strictly positive inputs/outputs and units present in both periods
