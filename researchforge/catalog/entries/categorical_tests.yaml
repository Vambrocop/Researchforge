# Classical categorical hypothesis tests (pure Python; scipy / statsmodels).
# DISTINCT from the `categorical` family (loglinear / cmh_test / ordinal_association),
# which model association strength — these are the textbook independence / exact /
# paired hypothesis tests.

- id: chi_square_test
  method: Chi-square test (independence + goodness-of-fit)
  domain: statistics
  family: categorical_tests
  goal: explain
  description: >-
    Pearson chi-square test for two low-cardinality categorical/binary columns.
    With two columns it tests INDEPENDENCE on the r-by-c contingency table,
    reporting chi-square, df = (r-1)(c-1), p, and the bias-corrected (Bergsma 2013)
    Cramer's V effect size, plus the independence-model expected counts and a flag
    for cells with expected below 5 (where the asymptotic approximation is unreliable
    and Fisher's exact test is preferable). For a 2x2 table it also reports the
    Yates continuity-corrected chi-square. With only one usable column it runs in
    goodness-of-fit mode, testing the observed category frequencies against a uniform
    distribution (or a config-supplied expected distribution). Pick the columns with
    config var1 / var2; set config expected={category: prob} for a custom GoF null.
  preconditions:
    min_categorical_cols: 1
    min_rows: 4
  produces:
    - Pearson chi-square test of independence (chi-square, df, p) with bias-corrected Cramer's V effect size, or a goodness-of-fit chi-square against uniform / config-supplied expected
    - observed + expected count tables (CSV) with sparse-cell (expected below 5) flag and a Yates note for 2x2
    - contingency heatmap with observed and expected counts, or observed-vs-expected goodness-of-fit bar chart (PNG)
  executor_ref: py::chi_square_test
  params:
    - name: var1
      type: column
      description: 第一个分类/二值列
      default: 第一个低基数分类/二值列
    - name: var2
      type: column
      description: 第二个分类/二值列（缺则做拟合优度）
      default: 第二个低基数分类/二值列
    - name: expected
      type: str
      description: "拟合优度的期望分布 {类别: 概率/计数}"
      default: 均匀分布
  biases:
    - the asymptotic chi-square approximation is unreliable when expected counts are small; cells with expected below 5 are counted and flagged (merge sparse categories or use fisher_exact)
    - tests only whether the two variables are associated, not the direction or form of the association; Cramer's V quantifies the strength
    - assumes the observations are independent (each unit counted once); for paired / repeated binary measures use mcnemar_test instead
    - the first two low-cardinality categorical/binary columns are used for the independence test and a single column triggers goodness-of-fit; set config var1 / var2 (and expected) if wrong

- id: fisher_exact
  method: Fisher's exact test
  domain: statistics
  family: categorical_tests
  goal: explain
  description: >-
    Fisher's exact test of association for two categorical/binary columns. For a
    2x2 table it uses scipy.stats.fisher_exact to return the conditional-MLE odds
    ratio and the exact two-sided p-value (plus the one-sided p), based on the
    hypergeometric distribution and so valid for small / sparse samples without any
    large-sample assumption. Because scipy's Fisher implementation is 2x2 only, an
    r-by-c table is degraded honestly to a fixed-margin Monte-Carlo permutation
    p-value (and, if that fails, the asymptotic Pearson chi-square) with a bias-corrected
    Cramer's V effect size, all clearly noted; the odds ratio is reported only for
    2x2 (it is undefined for larger tables). Pick the columns with config var1 / var2.
  preconditions:
    min_categorical_cols: 2
    min_rows: 4
  produces:
    - exact odds ratio + two-sided and one-sided exact p-values for a 2x2 table (hypergeometric, no large-sample assumption)
    - for r-by-c tables an honest degrade to a fixed-margin Monte-Carlo permutation p (or asymptotic chi-square) with bias-corrected Cramer's V, since scipy's Fisher is 2x2 only
    - the contingency table (CSV) plus a 2x2 grouped bar chart or an r-by-c count heatmap (PNG)
  executor_ref: py::fisher_exact
  params:
    - name: var1
      type: column
      description: 第一个分类/二值列
      default: 第一个低基数分类/二值列
    - name: var2
      type: column
      description: 第二个分类/二值列
      default: 第二个低基数分类/二值列
  biases:
    - preferred over the chi-square test for small or sparse 2x2 tables because it is exact (no large-sample / expected-count assumption)
    - scipy's exact test handles 2x2 only; for r-by-c the exact test is computationally expensive and is replaced here by a Monte-Carlo permutation p-value or the asymptotic chi-square, which is disclosed in the summary
    - the odds ratio is defined only for 2x2 tables and is the conditional MLE, which differs slightly from the naive ad/bc sample odds ratio
    - the first two low-cardinality categorical/binary columns are used by default; set config var1 / var2 if wrong

- id: mcnemar_test
  method: McNemar's test (paired binary)
  domain: statistics
  family: categorical_tests
  goal: explain
  description: >-
    McNemar's test for PAIRED binary data — two binary measurements on the same
    units (before/after, rater1/rater2, two diagnostic tests). It builds the paired
    2x2 table and tests marginal homogeneity (whether the positive rate changed
    between the two measurements) using statsmodels.stats.contingency_tables.mcnemar:
    the exact binomial test when the discordant count is small (below 25) and the
    continuity-corrected chi-square otherwise. Only the discordant pairs b (0 then 1)
    and c (1 then 0) drive the test; the concordant pairs are ignored. Reports the
    discordant counts b and c, the statistic, p, and the odds of change b/c. The
    larger sorted label of each column is taken as positive (disclosed). Pick the
    columns with config var1 / var2.
  preconditions:
    min_categorical_cols: 2
    min_rows: 4
  produces:
    - McNemar statistic + p-value (exact binomial when discordant count is small, else continuity-corrected chi-square) testing paired marginal homogeneity
    - discordant pair counts b (0 to 1) and c (1 to 0) and the odds of change b/c, plus the full paired 2x2 table (CSV)
    - discordant-pairs bar chart (PNG)
  executor_ref: py::mcnemar_test
  params:
    - name: var1
      type: column
      description: 第一个二值列（如 before / rater1）
      default: 第一个二值列
    - name: var2
      type: column
      description: 第二个二值列（同一单元的配对测量）
      default: 第二个二值列
  biases:
    - tests MARGINAL HOMOGENEITY in paired binary data (whether the positive rate changed), NOT independence; only the discordant pairs (b, c) carry information and the concordant pairs are ignored
    - requires two binary columns measured on the SAME units (paired / repeated); applying it to two independent samples is invalid (use chi_square_test or fisher_exact there)
    - the larger sorted label of each column is coded as positive, so verify the coding direction matches the substantive before/after orientation
    - the exact binomial test is used when the discordant count is below 25 and the continuity-corrected chi-square otherwise; with very few discordant pairs power is low; set config var1 / var2 to pick the paired columns
