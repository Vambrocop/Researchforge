# Machine-learning catalog entries — predictive (non-causal) methods.

- id: bart
  method: Bayesian additive regression trees (BART, dbarts)
  domain: machine learning
  family: ml
  goal: predict
  description: A sum-of-trees Bayesian nonparametric regression for a continuous outcome — automatically captures nonlinearities and interactions with regularizing priors and gives posterior uncertainty. Reports in-sample R-squared / RMSE, the residual sigma, and a variable-importance ranking from posterior split counts, plus an importance plot. Uses R dbarts.
  preconditions:
    min_continuous: 2
    min_rows: 50
  produces:
    - in-sample R-squared / RMSE / residual sigma
    - variable importance (posterior split share) + plot
  executor_ref: dbarts
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量
      default: 其余数值列
    - name: ntree
      type: int
      description: 树的数量
      default: dbarts 默认
    - name: seed
      type: int
      description: 随机种子
      default: 固定种子
  biases:
    - first continuous column is the outcome by default — set config outcome/predictors
    - in-sample R-squared is optimistic (no cross-validation); split-share importance is rough and splits credit among correlated predictors
    - BART is predictive, not causal; MCMC adds randomness (seed-pinned)

- id: conformal_prediction
  method: Conformal prediction (distribution-free prediction intervals)
  domain: machine learning
  family: ml
  goal: predict
  description: Split (inductive) conformal prediction — wraps a RandomForest regressor to produce prediction intervals with a finite-sample, distribution-free marginal coverage guarantee (>= 1-alpha), for any base model. Splits data into train / calibration / test, calibrates the conformity threshold on held-out absolute residuals, and reports target vs empirical coverage, mean interval width, and a coverage plot. alpha (miscoverage) is configurable.
  preconditions:
    min_continuous: 2
    min_rows: 40
  produces:
    - prediction intervals with coverage guarantee (>= 1-alpha) when the calibration set is large enough; otherwise a max-residual fallback bound (flagged at run time)
    - target vs empirical coverage + mean interval width
    - coverage plot
  executor_ref: scikit-learn
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量
      default: 其余数值列
    - name: alpha
      type: float
      description: 误覆盖率（区间覆盖为 1-alpha）
      default: "0.1"
    - name: seed
      type: int
      description: 随机种子
      default: 固定种子
  biases:
    - first continuous column is the outcome by default — set config outcome/predictors/alpha
    - coverage is MARGINAL (averaged over the population), not conditional on x; intervals are equal-width (non-adaptive)
    - validity assumes the data are exchangeable (i.i.d.); covariate shift / time order breaks the guarantee
    - the guarantee needs a large-enough calibration set (n_cal >= 1/alpha - 1); too small and it degrades to the max-residual bound (coverage ceiling n/(n+1) < 1-alpha) — the run flags this

- id: network_analysis
  method: Network / graph analysis (networkx)
  domain: network science
  family: ml
  goal: explore
  description: Build a graph from an edge list (two node-identifier columns, optional edge weight) and analyse its structure — graph-level metrics (density, average degree, clustering, components, diameter / average path length), node centralities (degree, betweenness, closeness, eigenvector), and Louvain community detection (modularity). Renders a community-coloured network plot. Deterministic (seeded community detection).
  preconditions:
    requires_edgelist: true
    min_rows: 3
  produces:
    - graph metrics (density / clustering / components / diameter)
    - node centralities (degree / betweenness / closeness / eigenvector)
    - communities (Louvain) + modularity + network plot
  executor_ref: networkx
  params:
    - name: source
      type: column
      description: 边的源节点列
      default: 第一个 id/分类列
    - name: target
      type: column
      description: 边的目标节点列
      default: 第二个 id/分类列
    - name: weight
      type: column
      description: 边权重列
      default: 无（无权图）
    - name: directed
      type: bool
      description: 是否有向图
      default: "false"
  biases:
    - first two id/categorical columns are taken as edge source/target — set config source/target/weight if wrong
    - metrics are structural/descriptive, not causal; treats the data as a single static graph
    - community detection depends on the algorithm and resolution; Louvain is stochastic (seed-pinned here)

- id: random_forest
  method: Random forest (prediction)
  domain: machine learning
  family: ml
  goal: predict
  description: Random-forest regression (continuous outcome) or classification (binary outcome) with feature importances.
  preconditions:
    min_rows: 50
  produces:
    - test-set score
    - feature importances
  executor_ref: scikit-learn
  biases:
    - not causal (predictive only)
    - overfitting if untuned

- id: kmeans_clustering
  method: K-means clustering
  domain: machine learning
  family: ml
  goal: explore
  description: Unsupervised K-means clustering over standardized continuous features; k auto-selected by silhouette.
  preconditions:
    min_continuous: 2
    min_rows: 30
  produces:
    - cluster assignments
    - cluster profile
    - PCA scatter
  executor_ref: scikit-learn
  biases:
    - scale sensitivity
    - arbitrary k
    - count/categorical features are ignored
