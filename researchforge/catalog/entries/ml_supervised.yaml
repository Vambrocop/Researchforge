# Supervised machine-learning catalog entries — predictive (non-causal) methods
# with HONEST cross-validated performance (pure Python, scikit-learn; no R).
# Auto-discovered (catalog loads every *.yaml here). Each id maps to a @register
# handler in executor/branches/ml_supervised.py. Outcome = first continuous column
# (regression) or a binary/categorical column (classification), config-overridable.

- id: regularized_regression
  method: Regularized regression (lasso / ridge / elastic-net)
  domain: machine learning
  family: ml
  goal: predict
  description: >-
    Penalized linear regression for a continuous outcome — fits lasso, ridge, or
    elastic-net (config method, default elastic-net) inside a StandardScaler pipeline,
    with the penalty strength alpha chosen by cross-validation (LassoCV / RidgeCV /
    ElasticNetCV; config alphas / l1_ratio overridable). Reports the chosen alpha
    (and l1_ratio), cross-validated R-squared and RMSE (k-fold, out-of-sample), and
    the standardized coefficients showing which predictors were shrunk to zero
    (sparsity / variable selection), with a coefficient bar plot (zeros greyed).
  preconditions:
    min_continuous: 1
    min_numeric_cols: 2
    min_rows: 20
  produces:
    - cross-validated R-squared / RMSE (out-of-sample)
    - chosen penalty alpha (+ l1_ratio) and number of non-zero coefficients
    - standardized coefficients + selected flag (CSV) and coefficient bar plot
  executor_ref: py::regularized_regression
  params:
    - name: outcome
      type: column
      description: 连续结果变量
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 预测变量
      default: 其余数值列
    - name: method
      type: choice
      choices: [lasso, ridge, elasticnet]
      description: 惩罚类型
      default: elasticnet
    - name: alphas
      type: str
      description: 候选惩罚强度网格（列表）
      default: 由 *CV 自动
    - name: l1_ratio
      type: float
      description: 弹性网的 L1 占比
      default: 由 ElasticNetCV 自动
  biases:
    - coefficients are on STANDARDIZED features (magnitudes comparable, not in original units)
    - lasso's variable selection is unstable under correlated predictors (it arbitrarily keeps one and zeros the rest)
    - the cross-validated R-squared is the honest generalization estimate (in-sample is optimistic)
    - first continuous column is the outcome by default — set config outcome / predictors / method / alphas

- id: svm_model
  method: Support vector machine (SVC / SVR)
  domain: machine learning
  family: ml
  goal: predict
  description: >-
    Support vector machine — classification (SVC) when the outcome is binary or
    categorical, regression (SVR) when it is continuous (detected by outcome kind).
    Runs inside a StandardScaler pipeline (rbf kernel by default; config kernel / C /
    gamma) and reports k-fold cross-validated performance — accuracy + macro-F1 for
    classification, R-squared + RMSE for regression — plus the number of support
    vectors and a class-balance note. Renders a CV confusion-matrix heatmap
    (classification) or a predicted-vs-actual scatter (regression).
  preconditions:
    min_numeric_cols: 2
    min_rows: 20
  produces:
    - cross-validated performance (accuracy + macro-F1, or R-squared + RMSE)
    - number of support vectors + class-balance note
    - per-fold scores (CSV), confusion matrix (CSV) and plot
  executor_ref: py::svm_model
  params:
    - name: outcome
      type: column
      description: 结果变量（分类→SVC，连续→SVR）
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值列
    - name: kernel
      type: choice
      choices: [rbf, linear, poly, sigmoid]
      description: 核函数
      default: rbf
    - name: C
      type: float
      description: 正则化强度 C
      default: "1.0"
    - name: gamma
      type: str
      description: 核系数（scale/auto 或数值）
      default: scale
  biases:
    - SVM needs feature scaling (done here via StandardScaler)
    - the rbf C and gamma matter a lot and are NOT auto-tuned beyond defaults (to keep it fast) unless set via config
    - cross-validated performance is reported, never in-sample
    - imbalanced classes inflate accuracy, so macro-F1 is reported alongside
    - to CLASSIFY a categorical target you must set config outcome — otherwise the first continuous column is used (regression) and a categorical label is treated as a feature; set config outcome / predictors / kernel / C / gamma

- id: gradient_boosting
  method: Gradient boosting (sklearn GBM) with permutation importance
  domain: machine learning
  family: ml
  goal: predict
  description: >-
    Gradient-boosted decision trees (sklearn GradientBoostingClassifier when the
    outcome is binary/categorical, GradientBoostingRegressor when continuous). Reports
    k-fold cross-validated performance (accuracy + macro-F1, or R-squared + RMSE) and
    PERMUTATION importance computed on a held-out split (model-agnostic and far less
    biased than impurity importance, which favours high-cardinality features), with an
    importance bar plot (mean +/- sd). Defaults used unless overridden by config
    (n_estimators / learning_rate / max_depth).
  preconditions:
    min_numeric_cols: 2
    min_rows: 20
  produces:
    - cross-validated performance (accuracy + macro-F1, or R-squared + RMSE)
    - per-predictor permutation importance (mean +/- sd, CSV) + bar plot
    - top-importance predictor
  executor_ref: py::gradient_boosting
  params:
    - name: outcome
      type: column
      description: 结果变量（分类→GBC，连续→GBR）
      default: 第一个连续列
    - name: predictors
      type: columns
      description: 特征列
      default: 其余数值列
    - name: n_estimators
      type: int
      description: 提升树数量
      default: sklearn 默认
    - name: learning_rate
      type: float
      description: 学习率
      default: sklearn 默认
    - name: max_depth
      type: int
      description: 单棵树最大深度
      default: sklearn 默认
  biases:
    - importance is PERMUTATION-based (not impurity-based, which is biased toward high-cardinality features)
    - permutation importance is from a single held-out split, so at small n its sd is wide and the ranking can be unstable (see the sd column)
    - the cross-validated performance is the honest out-of-sample estimate (in-sample is optimistic)
    - gradient boosting can overfit small datasets (n is disclosed)
    - to CLASSIFY a categorical target you must set config outcome — otherwise the first continuous column is used (regression); set config outcome / predictors / n_estimators / learning_rate / max_depth
