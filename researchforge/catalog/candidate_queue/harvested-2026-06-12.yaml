- entry:
    id: mixed_effects
    method: Linear mixed-effects model
    domain: statistics
    family: statistics
    goal: explain
    description: Fixed effects + random effects for grouped / nested / repeated-measures data (e.g. split-plot field trials).
    preconditions:
      requires_group: true
      min_continuous: 1
      min_rows: 20
    produces:
      - fixed-effect estimates
      - variance components
    executor_ref: statsmodels
    biases:
      - random-effects structure misspecification
  source: "CRAN Environmetrics; agronomy split-plot practice"
  status: pending
  notes: "待接执行器: statsmodels MixedLM (outcome ~ fixed + group RE); 适合田间试验/嵌套/重复测量"

- entry:
    id: poisson_regression
    method: Poisson regression (count outcome)
    domain: statistics
    family: statistics
    goal: explain
    description: GLM for non-negative count outcomes (e.g. insect / weed / species counts).
    preconditions:
      min_continuous: 1
      min_rows: 20
    produces:
      - rate ratios
      - coefficient table
    executor_ref: statsmodels
    biases:
      - overdispersion (consider negative binomial)
      - excess zeros
  source: "agronomy count-data practice (MDPI; Springer GLMM)"
  status: pending
  notes: "待接执行器: statsmodels GLM(family=Poisson); 需 count 类结果变量(待加 requires_count_outcome 前提)"

- entry:
    id: negative_binomial_regression
    method: Negative binomial regression (overdispersed counts)
    domain: statistics
    family: statistics
    goal: explain
    description: GLM for overdispersed count outcomes where variance exceeds the mean.
    preconditions:
      min_continuous: 1
      min_rows: 30
    produces:
      - rate ratios
      - dispersion estimate
    executor_ref: statsmodels
    biases:
      - model-family choice (Poisson vs NB)
  source: "agronomy count-data practice"
  status: pending
  notes: "待接执行器: statsmodels GLM(family=NegativeBinomial); 与 poisson 配套(过度离散时)"

